<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#202058">
  <title>Business Profile · Settings · RentalOS</title>
  <link rel="preconnect" href="https://rentalos-api.vercel.app" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%234f46e5'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='%23ffffff'%3ER%3C/text%3E%3C/svg%3E">
  <!--
    Slice 2 · Business Profile (substrate: settings_business_profile.dc.html).
    New self-contained page carrying the unified Settings shell (Slice 1). Wired
    to the EXISTING /api/workspace GET + PATCH /api/workspace/settings for the real
    fields (legal_name, gstin, pan, place_of_supply, address, phone, email, bank
    details). Fields with no backend yet (business type, tagline, CIN, alt
    contacts, socials, currency/FY/timezone/number-format, signatory, uploads,
    document-series prefixes) render as DISABLED stubs with a "Soon" badge —
    stub, never fake-saved. Nav cut-over (pointing settings.html's "Business
    profile" here + retiring the workspace tab's identity fields) is a later step.
  -->
  <style>
    :root{
      --ink:#202058; --head:#26235a; --muted:#8a8780; --muted2:#9ca3af; --sub:#6b6860;
      --indigo:#4f46e5; --indigo-hover:#3f37c9; --indigo-soft:#eef2ff;
      --green:#059669; --amber:#d97706; --red:#dc2626;
      --page:#f4f2ee; --card:#fff; --rail:#faf9f7; --line:#ece9e3; --line2:#f0ede8; --field:#fff;
      --disp:'Space Grotesk',system-ui,sans-serif; --body:'Manrope',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--page);font-family:var(--body);color:var(--head);-webkit-font-smoothing:antialiased}
    a{color:var(--indigo);text-decoration:none} a:hover{color:var(--indigo-hover)}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--indigo);box-shadow:0 0 0 3px rgba(79,70,229,.12)}
    .shell{display:flex;min-height:100vh}
    /* app sidebar (matches settings.html) */
    .sb{width:60px;flex:none;background:var(--rail);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:6px;position:sticky;top:0;height:100vh}
    .sb .logo{width:32px;height:32px;border-radius:8px;background:var(--ink);color:#fff;font:600 16px var(--disp);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
    .sb a{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#9a9690}
    .sb a:hover{background:#f0ede8;color:var(--head)} .sb a.active{background:var(--indigo-soft);color:var(--indigo)}
    .main{flex:1;min-width:0;display:flex;flex-direction:column}
    .topbar{height:56px;flex:none;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 22px;position:sticky;top:0;z-index:40}
    .crumb{font:400 12.5px var(--body);color:var(--muted2);display:flex;align-items:center;gap:8px}
    .crumb .cur{color:var(--head);font-weight:600}
    .tb-actions{margin-left:auto;display:flex;align-items:center;gap:9px}
    .btn{height:38px;padding:0 16px;border-radius:9px;font:600 12.5px var(--body);cursor:pointer;border:1px solid transparent}
    .btn.primary{background:var(--indigo);color:#fff;box-shadow:0 1px 2px rgba(79,70,229,.28)} .btn.primary:hover{background:var(--indigo-hover)}
    .btn.ghost{background:#fff;color:var(--sub);border-color:#e4e0d9} .btn.ghost:hover{background:var(--rail);color:var(--head)}
    .unsaved{display:flex;align-items:center;gap:6px;font:600 11px var(--mono);letter-spacing:.02em;color:var(--amber);background:rgba(217,118,6,.1);padding:3px 8px;border-radius:7px}
    .unsaved .d{width:6px;height:6px;border-radius:50%;background:var(--amber)}
    /* settings-body */
    .settings-body{display:flex;align-items:flex-start;min-height:calc(100vh - 56px)}
    .settings-nav{width:238px;flex:none;background:var(--rail);border-right:1px solid var(--line);align-self:stretch;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;padding:16px 12px 30px}
    .snav-title{font:600 12px var(--disp);letter-spacing:.1em;color:#9a9690;padding:0 6px 10px}
    .snav-cat-head{display:flex;align-items:center;gap:9px;padding:8px 7px;border-radius:8px}
    .snav-cat-ic{display:flex;color:#8a8780}
    .snav-cat-name{flex:1;font:600 12px var(--disp);letter-spacing:.05em;text-transform:uppercase;color:var(--sub)}
    .snav-items{display:flex;flex-direction:column;gap:1px;padding:2px 0 6px}
    .snav-item{display:flex;align-items:center;gap:10px;padding:7px 10px 7px 28px;border-radius:8px;cursor:pointer;font:500 13.5px var(--body);color:#4a4760;text-decoration:none}
    .snav-item:hover{background:var(--indigo-soft)}
    .snav-item.active{background:var(--indigo);color:#fff;font-weight:600}
    .snav-dot{width:7px;height:7px;border-radius:50%;flex:none;border:1.5px solid #c9c6d9}
    .snav-item.active .snav-dot{background:#fff;border:none}
    .snav-ext{margin-left:auto;opacity:.55;font-size:11px}
    .content{flex:1;min-width:0;padding:30px 40px 90px}
    .wrap{max-width:760px}
    h1{margin:0;font:600 24px var(--disp);color:var(--ink);letter-spacing:-.01em}
    .subtitle{margin:7px 0 0;font:400 13px var(--body);color:var(--muted)}
    .hr{height:1px;background:var(--line);margin:20px 0 26px}
    .sec{margin-bottom:30px}
    .sec-label{display:flex;align-items:center;gap:9px;margin-bottom:15px}
    .sec-label span:first-child{font:600 11px var(--mono);letter-spacing:.06em;color:#9a9690}
    .sec-label .rule{flex:1;height:1px;background:var(--line2)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 20px}
    .panel{background:var(--rail);border:1px solid var(--line);border-radius:14px;padding:18px 20px}
    .panel-sub{font:600 11px var(--mono);letter-spacing:.06em;color:#9a9690;margin-bottom:14px}
    .field{min-width:0} .field.full{grid-column:1 / -1}
    .field label{display:flex;align-items:center;gap:7px;font:600 12.5px var(--body);color:var(--head);margin-bottom:7px}
    .field .req{color:var(--red)}
    .field .soon{font:600 8.5px var(--mono);letter-spacing:.04em;color:#9a9690;background:var(--line);padding:2px 6px;border-radius:5px;text-transform:uppercase}
    .field input,.field select{width:100%;height:40px;border:1px solid #e4e0d9;border-radius:10px;padding:0 13px;font:500 13.5px var(--body);color:var(--head);background:var(--field)}
    .field input.mono{font:400 12.5px var(--mono);letter-spacing:.02em}
    .field input:disabled,.field select:disabled{background:var(--field);color:#b0aca4;cursor:not-allowed}
    .field .hint{font:400 11.5px var(--body);color:#9a9690;margin-top:6px;line-height:1.45}
    .sec-foot{font:400 11.5px var(--body);color:#9a9690;line-height:1.5;margin-top:14px}
    .loading,.errbox{padding:50px;text-align:center;color:var(--muted2);font:400 13px var(--body)}
    .errbox{margin:30px auto;max-width:520px;background:#fff;border:1px solid var(--line);border-radius:14px}
    @media(max-width:760px){ .settings-body{flex-direction:column} .settings-nav{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--line)} .content{padding:22px} .grid{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sb">
      <div class="logo">R</div>
      <a href="/dashboard.html" title="Dashboard"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="6" height="6" rx="1.2"/><rect x="11" y="3" width="6" height="6" rx="1.2"/><rect x="3" y="11" width="6" height="6" rx="1.2"/><rect x="11" y="11" width="6" height="6" rx="1.2"/></svg></a>
      <a href="/orders.html" title="Orders"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2.2 17 6v8l-7 3.8L3 14V6z"/><path d="M3 6l7 3.8L17 6"/><path d="M10 9.8V17.8"/></svg></a>
      <a href="/inventory.html" title="Inventory"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2.5 17.5 6 10 9.5 2.5 6z"/><path d="M2.5 10 10 13.5 17.5 10"/><path d="M2.5 14 10 17.5 17.5 14"/></svg></a>
      <a href="/people-list.html" title="People"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="6.5" r="2.6"/><path d="M2.4 16c0-2.9 2-4.5 4.6-4.5S11.6 13.1 11.6 16"/><path d="M12.6 4.2a2.5 2.5 0 0 1 0 4.8M14 11.6c2 .4 3.5 1.9 3.5 4.4"/></svg></a>
      <a href="/analytics.html" title="Analytics"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17V3"/><path d="M3 17h14"/><rect x="6" y="10" width="2.6" height="4"/><rect x="10.5" y="6.5" width="2.6" height="7.5"/></svg></a>
      <div style="flex:1"></div>
      <a href="/settings.html" class="active" title="Settings"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="2.6"/><path d="M10 2.5v2.2M10 15.3v2.2M4.7 4.7l1.6 1.6M13.7 13.7l1.6 1.6M2.5 10h2.2M15.3 10h2.2M4.7 15.3l1.6-1.6M13.7 6.3l1.6-1.6"/></svg></a>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="crumb"><span>Settings</span><span style="color:#cfcbc3">›</span><span>General</span><span style="color:#cfcbc3">›</span><span class="cur">Business profile</span></div>
        <div class="tb-actions" id="tb-actions"></div>
      </header>

      <div class="settings-body">
        <nav class="settings-nav">
          <div class="snav-title">SETTINGS</div>
          <div id="snav-list"></div>
        </nav>
        <div class="content">
          <div class="wrap">
            <h1>Business Profile</h1>
            <p class="subtitle">Core identity and registration for your rental business — appears on every document you issue.</p>
            <div class="hr"></div>
            <div id="loading" class="loading">Loading…</div>
            <div id="error" class="errbox" style="display:none"></div>
            <div id="sections" style="display:none"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { api, ensureAuth } from '/_lib/api.js';

    function escapeHtml(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function escapeAttr(s){ return escapeHtml(s).replace(/`/g,'&#96;'); }
    function getByPath(o,p){ return p.split('.').reduce((x,k)=>(x==null?x:x[k]),o); }
    function setByPath(o,p,v){ const ks=p.split('.'); const last=ks.pop(); const t=ks.reduce((x,k)=>(x[k]??={}),o); t[last]=v; }

    const state = { data:null, form:null, baseline:null, navCollapsed:{} };

    // ---- unified settings nav (mirrors settings.html; other items link back there) ----
    const SNAV_ICON = (p)=>'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';
    const SETTINGS_NAV = [
      { id:'general', name:'General', icon:'<rect x="4" y="4" width="7" height="7" rx="1.4"/><rect x="13" y="4" width="7" height="7" rx="1.4"/><rect x="4" y="13" width="7" height="7" rx="1.4"/><rect x="13" y="13" width="7" height="7" rx="1.4"/>', items:[['business','Business profile','']] },
      { id:'financial', name:'Financial', icon:'<rect x="3" y="6" width="18" height="12" rx="2"/><path d="M3 10h18"/><circle cx="16.5" cy="14" r="1.4"/>', items:[['coupons','Coupons','/settings.html#coupons']] },
      { id:'team', name:'Team & Access', icon:'<circle cx="9" cy="8" r="3.2"/><path d="M3.5 20c0-3.3 2.7-6 6-6"/><path d="M16 4.5a3 3 0 0 1 0 6"/><path d="M15 14c2.5.5 4.5 2.8 4.5 6"/>', items:[['users','Team members','/settings.html#users']] },
      { id:'assets', name:'Assets', icon:'<path d="M12 3l8 4.5v9L12 21l-8-4.5v-9z"/><path d="M4 7.5l8 4.5 8-4.5"/><path d="M12 12v9"/>', items:[['locations','Locations','/settings.html#locations'],['tags','Tags','/settings.html#tags'],['custom-fields','Custom fields','/settings.html#custom-fields']] },
      { id:'rental', name:'Rental Rules', icon:'<path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v4h-4"/>', items:[['order-policies','Order policies','/settings-order-policies.html']] },
      { id:'advanced', name:'Advanced', icon:'<path d="M4 6h10M18 6h2M4 12h2M10 12h10M4 18h7M15 18h5"/><circle cx="16" cy="6" r="2"/><circle cx="8" cy="12" r="2"/><circle cx="13" cy="18" r="2"/>', items:[['features','Feature flags','/settings.html#features'],['integrations','Integrations','/settings.html#integrations']] },
    ];
    function renderSettingsNav(){
      const host=document.getElementById('snav-list'); if(!host) return;
      let html='';
      for(const cat of SETTINGS_NAV){
        const open=!state.navCollapsed[cat.id];
        html+='<div class="snav-cat"><div class="snav-cat-head" data-snav-cat="'+cat.id+'"><span class="snav-cat-ic">'+SNAV_ICON(cat.icon)+'</span><span class="snav-cat-name">'+cat.name+'</span><span style="color:#c0bdb4;font-size:10px">'+(open?'▾':'▸')+'</span></div>';
        if(open){ html+='<div class="snav-items">';
          for(const it of cat.items){ const [key,label,href]=it;
            if(!href) html+='<div class="snav-item active"><span class="snav-dot"></span>'+escapeHtml(label)+'</div>';
            else html+='<a class="snav-item" href="'+href+'"><span class="snav-dot"></span>'+escapeHtml(label)+(href.indexOf('#')<0?'<span class="snav-ext">↗</span>':'')+'</a>';
          }
          html+='</div>';
        }
        html+='</div>';
      }
      host.innerHTML=html;
      host.querySelectorAll('[data-snav-cat]').forEach(el=>el.addEventListener('click',()=>{ const id=el.dataset.snavCat; state.navCollapsed[id]=!state.navCollapsed[id]; renderSettingsNav(); }));
    }

    // ---- form ----
    function resetForm(){
      const w=state.data.workspace, s=state.data.settings, bd=s.bank_details||{};
      state.form={
        workspace:{ legal_name:w.legal_name??'', gstin:w.gstin??'', pan:w.pan??'', place_of_supply:w.place_of_supply??'',
          phone:w.phone??'', email:w.email??'', address_line1:w.address_line1??'', address_line2:w.address_line2??'',
          city:w.city??'', state:w.state??'', postal_code:w.postal_code??'' },
        settings:{ bank_details:{ account_name:bd.account_name??'', bank_name:bd.bank_name??'', account_number:bd.account_number??'', ifsc:bd.ifsc??'', branch:bd.branch??'', upi_id:bd.upi_id??'' } },
      };
      state.baseline=JSON.parse(JSON.stringify(state.form));
    }
    function isDirty(){ return JSON.stringify(state.form)!==JSON.stringify(state.baseline); }

    const INDIAN_STATES=['Andhra Pradesh','Assam','Bihar','Chhattisgarh','Delhi','Goa','Gujarat','Haryana','Himachal Pradesh','Jharkhand','Karnataka','Kerala','Madhya Pradesh','Maharashtra','Odisha','Punjab','Rajasthan','Tamil Nadu','Telangana','Uttar Pradesh','Uttarakhand','West Bengal'];

    // field renderers
    function inp(path,label,o={}){
      const v=getByPath(state.form,path)??'';
      return `<div class="field${o.full?' full':''}"><label>${escapeHtml(label)}${o.req?'<span class="req">*</span>':''}</label>
        <input type="${o.type||'text'}" data-field="${path}" class="${o.mono?'mono':''}" value="${escapeAttr(v)}" placeholder="${escapeAttr(o.ph||'')}" autocomplete="off">
        ${o.hint?`<div class="hint">${escapeHtml(o.hint)}</div>`:''}</div>`;
    }
    function sel(path,label,opts,o={}){
      const v=getByPath(state.form,path)??'';
      return `<div class="field${o.full?' full':''}"><label>${escapeHtml(label)}${o.req?'<span class="req">*</span>':''}</label>
        <select data-field="${path}">${opts.map(op=>`<option${op===v?' selected':''}>${escapeHtml(op)}</option>`).join('')}</select>
        ${o.hint?`<div class="hint">${escapeHtml(o.hint)}</div>`:''}</div>`;
    }
    // stub: disabled input with a "Soon" badge (no fake save)
    function stub(label,o={}){
      return `<div class="field${o.full?' full':''}"><label>${escapeHtml(label)}<span class="soon">Soon</span></label>
        <input type="text" disabled placeholder="${escapeAttr(o.ph||'Coming in a later update')}" title="Not available yet">
        ${o.hint?`<div class="hint">${escapeHtml(o.hint)}</div>`:''}</div>`;
    }
    function secLabel(t){ return `<div class="sec-label"><span>${t}</span><span class="rule"></span></div>`; }

    function renderSections(){
      const el=document.getElementById('sections');
      el.innerHTML =
        // IDENTITY
        `<div class="sec">${secLabel('IDENTITY')}<div class="grid">
          ${inp('workspace.legal_name','Legal name',{req:1,full:1,hint:'Appears on tax invoices and legal documents. Must match your GSTIN registration.'})}
          ${stub('Business type')}
          ${stub('Tagline',{full:1,ph:'Appears on printed documents below your name'})}
        </div></div>` +
        // TAX REGISTRATION
        `<div class="sec">${secLabel('TAX REGISTRATION')}<div class="panel"><div class="grid">
          ${inp('workspace.gstin','GSTIN',{req:1,mono:1,ph:'24AAAAA1234A1Z5',hint:'Errors here invalidate every invoice you issue.'})}
          ${inp('workspace.pan','PAN',{mono:1,ph:'AAAAA1234A'})}
          ${sel('workspace.place_of_supply','State of registration',INDIAN_STATES,{req:1,hint:'Drives place-of-supply (CGST+SGST vs IGST) across all invoices.'})}
          ${stub('Composition scheme')}
        </div></div></div>` +
        // CONTACT
        `<div class="sec">${secLabel('CONTACT')}<div class="grid">
          ${inp('workspace.phone','Primary phone',{req:1,mono:1,ph:'98227 12345'})}
          ${stub('Alternate phone')}
          ${inp('workspace.email','Primary email',{req:1,mono:1,ph:'hello@example.com'})}
          ${stub('Alternate email')}
          ${stub('Website',{full:1})}
          ${stub('Instagram')}
          ${stub('YouTube')}
        </div></div>` +
        // REGISTERED ADDRESS
        `<div class="sec">${secLabel('REGISTERED ADDRESS')}<div class="grid">
          ${inp('workspace.address_line1','Street address line 1',{req:1,full:1,ph:'Building, street'})}
          ${inp('workspace.address_line2','Street address line 2',{full:1,ph:'Area, landmark'})}
          ${inp('workspace.city','City',{req:1,ph:'Vadodara'})}
          ${inp('workspace.postal_code','PIN code',{req:1,mono:1,ph:'390020'})}
          ${sel('workspace.state','State',INDIAN_STATES)}
          ${stub('Country',{ph:'India · locked in v1'})}
        </div><div class="sec-foot">This is the address that appears on all tax invoices. Update your GSTIN registration first if your registered address changes.</div></div>` +
        // FINANCIAL IDENTITY
        `<div class="sec">${secLabel('FINANCIAL IDENTITY')}<div class="grid" style="margin-bottom:16px">
          ${stub('Currency',{ph:'INR — locked in v1'})}
          ${stub('Financial year start')}
          ${stub('Time zone')}
          ${stub('Number format')}
        </div>
        <div class="panel"><div class="panel-sub">BANK DETAILS FOR INVOICING</div><div class="grid">
          ${inp('settings.bank_details.account_name','Account holder name',{full:1,ph:'As per bank records'})}
          ${inp('settings.bank_details.account_number','Account number',{mono:1})}
          ${inp('settings.bank_details.ifsc','IFSC code',{mono:1,ph:'HDFC0001234'})}
          ${inp('settings.bank_details.bank_name','Bank name')}
          ${inp('settings.bank_details.branch','Branch')}
          ${inp('settings.bank_details.upi_id','UPI ID for invoicing',{mono:1,ph:'name@bank',hint:'Appears on invoices as a payment option.'})}
        </div></div>
        <div class="sec-foot">Bank details appear on invoices under “Payment Instructions”. Leave blank to share separately.</div></div>` +
        // BRANDING
        `<div class="sec">${secLabel('BRANDING')}<div class="grid">
          ${stub('Logo',{full:1,ph:'Upload arrives in a later update'})}
          ${stub('Authorized signatory name')}
          ${stub('Authorized signatory title')}
        </div></div>` +
        // DOCUMENT SERIES
        `<div class="sec">${secLabel('DOCUMENT SERIES')}<div class="panel"><div class="grid">
          ${stub('Invoice series prefix')}
          ${stub('Quote series prefix')}
          ${stub('Booking series prefix')}
          ${stub('Payment receipt prefix')}
        </div></div><div class="sec-foot">Per-document series prefixes arrive in a later update. Invoice numbering is currently configured under Financial → Invoice format.</div></div>`;

      el.querySelectorAll('[data-field]').forEach(node=>{
        const evt=node.tagName==='SELECT'?'change':'input';
        node.addEventListener(evt,()=>{ setByPath(state.form,node.dataset.field,node.value); renderTopbar(); });
      });
    }

    function renderTopbar(){
      const wrap=document.getElementById('tb-actions');
      if(state.data && isDirty()){
        wrap.innerHTML='<span class="unsaved"><span class="d"></span>UNSAVED</span><button class="btn ghost" id="btn-discard">Discard</button><button class="btn primary" id="btn-save">Save changes</button>';
        document.getElementById('btn-discard').addEventListener('click',()=>{ resetForm(); renderSections(); renderTopbar(); });
        document.getElementById('btn-save').addEventListener('click',save);
      } else wrap.innerHTML='';
    }

    async function save(){
      const btn=document.getElementById('btn-save'); if(btn){ btn.disabled=true; btn.textContent='Saving…'; }
      const payload={ workspace:{...state.form.workspace}, settings:{ bank_details:{...state.form.settings.bank_details} } };
      try{
        const res=await api.patch('/api/workspace/settings',payload);
        state.data=res; resetForm(); renderSections(); renderTopbar();
        toast('Business profile saved');
      }catch(err){
        if(btn){ btn.disabled=false; btn.textContent='Save changes'; }
        toast('Save failed: '+((err.body&&err.body.error)||err.message),true);
      }
    }
    function toast(msg,bad){
      const t=document.createElement('div'); t.textContent=msg;
      t.style.cssText='position:fixed;bottom:24px;right:26px;z-index:130;background:#fff;border:1px solid '+(bad?'#f5c9c9':'#cdeede')+';border-left:4px solid '+(bad?'#dc2626':'#059669')+';border-radius:11px;padding:12px 16px;box-shadow:0 12px 30px rgba(32,32,88,.16);font:600 13px var(--body);color:#26235a';
      document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
    }

    (async function(){
      renderSettingsNav();
      try{ await ensureAuth(); state.data=await api.get('/api/workspace'); }
      catch(err){
        document.getElementById('loading').style.display='none';
        const e=document.getElementById('error'); e.style.display=''; e.textContent='Could not load settings — '+((err.body&&err.body.error)||err.message||'error');
        return;
      }
      resetForm(); renderSections(); renderTopbar();
      document.getElementById('loading').style.display='none';
      document.getElementById('sections').style.display='';
      window.addEventListener('beforeunload',(e)=>{ if(isDirty()){ e.preventDefault(); e.returnValue=''; } });
    })();
  </script>
</body>
</html>
