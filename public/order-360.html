<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Order 360 · RentalOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#202058; --head:#26235a;
  --neutral:#6b7280; --neutral-bg:#f3f4f6; --neutral-border:#d1d5db;
  --info:#4f46e5; --info-bg:#eef2ff; --info-border:#c7d2fe;
  --progress:#2563eb; --progress-bg:#eff6ff; --progress-border:#bfdbfe;
  --success:#059669; --success-bg:#ecfdf5; --success-border:#a7f3d0;
  --attention:#d97706; --attention-bg:#fffbeb; --attention-border:#fde68a;
  --danger:#dc2626; --danger-bg:#fef2f2; --danger-border:#fecaca;
  --bg:#ffffff; --surface-1:#faf9f7; --surface-2:#f4f2ee; --border:#ece9e3;
  --info-hover:#4338ca;
  --head-font:'Space Grotesk',system-ui,sans-serif;
  --body-font:'Manrope',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--surface-1);font-family:var(--body-font);color:var(--ink);-webkit-font-smoothing:antialiased}
a{color:var(--info);text-decoration:none}
a:hover{color:var(--info-hover)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#dcdad4;border-radius:6px;border:2px solid var(--surface-1)}
.mono{font-family:var(--mono)}
.money{font-family:var(--mono);font-variant-numeric:tabular-nums}
.microlabel{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.6px;font-weight:600;color:var(--neutral)}
.uc{text-transform:uppercase}

/* layout */
/* PR-2 — order-360 gains the shared 60px icon rail + canonical top-bar. */
.shell{display:flex;min-height:100vh}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
/* orderstrip now sticks below the 60px canonical top-bar (was 46px subnav). */
.orderstrip{background:var(--bg);border-bottom:1px solid var(--border);padding:16px 26px;position:sticky;top:60px;z-index:38;box-shadow:0 4px 14px rgba(32,32,88,.03)}
.striprow{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.ordernum{font-family:var(--mono);font-weight:600;font-size:23px;color:var(--ink);letter-spacing:-.5px}
.vsep{width:1px;height:24px;background:var(--border)}
.custname{font-family:var(--head-font);font-weight:600;font-size:16px;color:var(--head)}
.wrap{max-width:1320px;margin:0 auto;padding:22px 26px 70px}

/* cards */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 1px 2px rgba(32,32,88,.04);overflow:hidden}
.card+.card{margin-top:16px}
.card-hd{display:flex;align-items:center;gap:12px;padding:16px 22px;cursor:pointer;user-select:none}
.sec-dot{width:9px;height:9px;border-radius:50%;flex:none}
.sec-title{font-family:var(--head-font);font-weight:600;font-size:15px;color:var(--head)}
.count-badge{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--neutral);background:var(--neutral-bg);padding:1px 7px;border-radius:10px}
.hd-meta{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--neutral)}
.chev{color:var(--neutral);font-size:12px;flex:none}
.card-bd{padding:2px 22px 20px}

/* pills */
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:14px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.3px;border:1px solid;white-space:nowrap}
.pill .pdot{width:7px;height:7px;border-radius:50%;background:currentColor}
.pill-lg{padding:6px 11px;font-size:11px;border-radius:20px}
.pill-info{color:var(--info);background:var(--info-bg);border-color:var(--info-border)}
.pill-progress{color:var(--progress);background:var(--progress-bg);border-color:var(--progress-border)}
.pill-success{color:var(--success);background:var(--success-bg);border-color:var(--success-border)}
.pill-attention{color:var(--attention);background:var(--attention-bg);border-color:var(--attention-border)}
.pill-danger{color:var(--danger);background:var(--danger-bg);border-color:var(--danger-border)}
.pill-neutral{color:var(--neutral);background:var(--neutral-bg);border-color:var(--neutral-border)}
.count-in-pill{font-family:var(--mono);font-size:11px;font-weight:600;color:#fff;padding:1px 6px;border-radius:10px}
.amountpill{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--head);background:var(--surface-1);border:1px solid var(--border);padding:6px 12px;border-radius:20px}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:10px;font-family:var(--body-font);font-weight:600;font-size:13px;cursor:pointer;border:1px solid transparent;padding:10px 16px;line-height:1}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--info);color:#fff;border-color:var(--info);box-shadow:0 2px 8px rgba(79,70,229,.24)}
.btn-primary:hover:not(:disabled){background:var(--info-hover)}
.btn-secondary{background:var(--bg);color:var(--head);border-color:var(--neutral-border)}
.btn-secondary:hover{background:var(--surface-1)}
.btn-ghost{background:var(--bg);color:var(--info);border-color:var(--info-border)}
.btn-ghost:hover{background:var(--info-bg)}
.btn-tiny{padding:6px 11px;font-size:11.5px;border-radius:8px}
.iconbtn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--neutral);border:1px solid var(--neutral-border);border-radius:10px;cursor:pointer;font-size:18px}
.iconbtn:hover{background:var(--surface-1)}

/* overflow menu */
.overflow{position:absolute;top:46px;right:0;width:270px;background:var(--bg);border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 40px rgba(32,32,88,.16);padding:6px;z-index:50}
.ovi{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--head)}
.ovi:hover{background:var(--surface-1)}
.ovi.disabled{color:var(--neutral);cursor:not-allowed}
.ovsep{height:1px;background:var(--border);margin:5px 8px}

/* ---- Sub-slice 2.1 modals (extension / cancellation / approval / send update) ---- */
.mask{position:fixed;inset:0;background:rgba(38,35,90,.28);z-index:200;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:48px 16px}
.modal{width:720px;max-width:100%;background:var(--bg);border-radius:14px;box-shadow:0 24px 64px -12px rgba(24,22,60,.45),0 8px 24px -8px rgba(24,22,60,.3);display:flex;flex-direction:column;overflow:hidden;margin-bottom:48px}
.m-hd{display:flex;align-items:flex-start;gap:16px;padding:24px 26px 18px}
.m-title{margin:0;font-family:var(--head-font);font-size:19px;font-weight:600;letter-spacing:-.01em;color:var(--ink)}
.m-sub{margin-top:6px;font-size:13px;color:var(--neutral)}
.m-x{width:32px;height:32px;flex:none;border:1px solid var(--border);background:var(--bg);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--neutral)}
.m-x:hover{background:var(--surface-1);color:var(--ink)}
.m-bd{padding:0 26px 6px;display:flex;flex-direction:column}
.m-sec{padding:18px 0;border-top:1px solid var(--border)}
.m-sec:first-child{border-top:none}
.m-lbl{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--neutral);text-transform:uppercase;margin-bottom:12px}
.m-ft{border-top:1px solid var(--border);padding:15px 26px;display:flex;align-items:center;justify-content:space-between;gap:16px;background:var(--surface-1)}
.m-input{font-family:var(--mono);font-size:14px;color:var(--head);border:1px solid var(--neutral-border);background:var(--bg);border-radius:9px;padding:9px 12px;outline:none}
.m-input:focus{border-color:var(--info)}
.m-select{font-family:var(--mono);font-size:13px;color:var(--head);border:1px solid var(--neutral-border);background:var(--bg);border-radius:9px;padding:9px 12px;outline:none;cursor:pointer}
.m-select[data-f],.m-input[data-f],.m-ta[data-f]{width:100%;box-sizing:border-box}
.m-input[data-f]{font-family:var(--body-font);font-size:13px}
.m-ta{width:100%;min-height:64px;resize:vertical;padding:11px 13px;border:1px solid var(--neutral-border);border-radius:9px;font-family:var(--body-font);font-size:13px;color:var(--head);outline:none}
.m-ta:focus{border-color:var(--info)}
.m-chip{display:inline-flex;align-items:center;padding:5px 11px;border-radius:7px;background:var(--info-bg);color:var(--info);font-family:var(--mono);font-size:12px;font-weight:600}
.m-fin{border:1px solid var(--border);border-radius:12px;background:var(--surface-1);padding:16px 18px;display:flex;flex-direction:column;gap:10px}
.m-frow{display:flex;align-items:baseline;justify-content:space-between}
.m-frow .l{font-size:13px;color:#4b4b63}
.m-frow .v{font-family:var(--mono);font-size:14px;color:var(--head)}
.m-fdash{border-top:1px dashed var(--neutral-border);margin:2px 0}
.m-ftot .l{font-size:14px;font-weight:700;color:var(--ink)}
.m-ftot .v{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--ink)}
.m-warn{display:flex;gap:12px;border:1px solid var(--attention-border);background:var(--attention-bg);border-radius:12px;padding:14px}
.m-warn .ic{flex:none;color:var(--attention);margin-top:1px}
.m-warn .t{font-size:13px;font-weight:700;color:var(--head)}
.m-cb{display:inline-flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;color:var(--head);user-select:none}
.m-cbbox{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--neutral-border);display:flex;align-items:center;justify-content:center;color:#fff}
.m-cb.on .m-cbbox{background:var(--info);border-color:var(--info)}
.m-avrow{display:flex;align-items:center;gap:10px;font-size:13px;padding:3px 0}
.m-btn{border:none;cursor:pointer;background:var(--info);color:#fff;font-family:var(--body-font);font-size:14px;font-weight:600;padding:11px 22px;border-radius:10px;box-shadow:0 2px 6px rgba(79,70,229,.3)}
.m-btn:hover{background:var(--info-hover)}
.m-btn:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
.m-btn.danger{background:var(--danger);box-shadow:0 2px 6px rgba(220,38,38,.3)}
.m-btn.danger:hover{background:#b91c1c}
.m-ghost{border:none;background:none;cursor:pointer;font-family:var(--body-font);font-size:13px;font-weight:600;color:var(--neutral);padding:8px 4px}
.m-ghost:hover{color:var(--ink)}
.m-hint{font-size:11px;color:var(--neutral);margin-top:5px}
.appchip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;background:var(--attention-bg);border:1px solid var(--attention-border);color:var(--attention);font-family:var(--mono);font-size:11px;font-weight:600;cursor:pointer}

/* blocker panel */
.blocker{position:absolute;top:52px;right:0;width:320px;background:var(--bg);border:1px solid var(--border);border-radius:12px;box-shadow:0 16px 44px rgba(32,32,88,.2);padding:16px;z-index:60}
.blocker-title{font-family:var(--head-font);font-weight:600;font-size:14px;color:var(--head);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.blocker-reason{display:flex;gap:10px;padding:9px 0;border-top:1px solid var(--border)}
.sevdot{width:9px;height:9px;border-radius:50%;flex:none;margin-top:4px}
.sev-red{background:var(--danger)} .sev-amber{background:var(--attention)} .sev-neutral{background:var(--neutral)}
.blocker-msg{font-size:12.5px;color:var(--ink);line-height:1.45}
.blocker-fix{font-size:12px;font-weight:600;margin-top:3px;display:inline-block}
.blocker-count{margin-top:12px;font-family:var(--mono);font-size:11px;color:var(--neutral);border-top:1px solid var(--border);padding-top:10px}
.blocker-close{position:absolute;top:12px;right:12px;cursor:pointer;color:var(--neutral);font-size:16px;line-height:1}

/* stepper */
.stepper{display:flex;align-items:flex-start;gap:0}
.step{display:flex;align-items:center;min-width:0}
.step-inner{display:flex;flex-direction:column;align-items:center;gap:9px;flex:none;cursor:pointer}
.node{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px}
.node-done{background:var(--info);color:#fff}
.node-current{width:34px;height:34px;background:var(--progress);color:#fff;animation:pulseNode 2s infinite}
.node-current .core{width:9px;height:9px;border-radius:50%;background:#fff}
.node-upcoming{background:var(--bg);border:2px solid var(--neutral-border);color:var(--neutral)}
.node-failed{background:var(--danger);color:#fff}
.step-label{font-family:var(--head-font);font-size:11.5px;font-weight:600;white-space:nowrap;text-align:center}
.step-sub{font-family:var(--mono);font-size:9.5px;color:var(--progress);white-space:nowrap;margin-top:2px;text-align:center}
.connector{flex:1;height:2px;margin:15px 4px 0}
.conn-solid{background:var(--info)}
.conn-dashed{border-top:2px dashed var(--neutral-border);height:0}
@keyframes pulseNode{0%{box-shadow:0 0 0 0 rgba(37,99,235,.45)}70%{box-shadow:0 0 0 9px rgba(37,99,235,0)}100%{box-shadow:0 0 0 0 rgba(37,99,235,0)}}
@keyframes barGrow{from{width:0}}

/* two column */
.body-grid{display:flex;gap:22px;align-items:flex-start;margin-top:22px}
.col-main{flex:0 0 63%;max-width:63%;min-width:0}
.col-side{flex:1;min-width:0;position:sticky;top:180px;display:flex;flex-direction:column;gap:16px}
@media(max-width:900px){.body-grid{flex-direction:column}.col-main,.col-side{flex:none;max-width:100%;width:100%;position:static}}

/* avatar */
.avatar{border-radius:14px;background:#eef0f4;color:var(--ink);display:flex;align-items:center;justify-content:center;font-family:var(--head-font);font-weight:600;flex:none}

/* kv grid */
.kv{}
.kv-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--neutral);font-weight:600;margin-bottom:3px}
.kv-val{font-family:var(--mono);font-size:12.5px;color:var(--head)}

/* equipment row */
.item-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none}
.thumb{width:44px;height:44px;border-radius:10px;background:var(--surface-1);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--neutral);flex:none}
.item-name{font-weight:600;font-size:13.5px;color:var(--ink)}
.item-serial{font-family:var(--mono);font-size:10.5px;color:var(--neutral)}
.item-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.linkbtn{background:none;border:none;padding:0;font-family:var(--body-font);font-size:11.5px;font-weight:600;color:var(--info);cursor:pointer}
.linkbtn.muted{color:var(--neutral)}

/* pricing rows */
.pr-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.pr-row:last-child{border-bottom:none}
.pr-grouplabel{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--neutral);font-weight:600;padding:13px 0 4px}
.pr-total{display:flex;justify-content:space-between;align-items:center;padding:14px 0 2px}

/* payment bar */
.progressbar{height:9px;background:var(--neutral-bg);border-radius:5px;overflow:hidden;margin:8px 0 18px}
.progressbar>span{display:block;height:100%;background:var(--success);border-radius:5px;animation:barGrow .7s ease}
.paidrow{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:11px;margin-bottom:10px}

/* sidebar meta */
.side-title{font-family:var(--head-font);font-weight:600;font-size:13px;color:var(--head);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}
.meta-row{display:flex;align-items:flex-start}
.meta-row+.meta-row{margin-top:13px}
.meta-lbl{width:96px;font-size:11.5px;color:var(--neutral);font-weight:600;flex:none}
.meta-val{font-size:12.5px;color:var(--head)}
.rel-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);color:var(--head)}
.rel-row:last-child{border-bottom:none}

/* activity feed */
.filterwrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.fchip{font-family:var(--body-font);font-size:11px;font-weight:600;padding:4px 10px;border-radius:14px;cursor:pointer;border:1px solid var(--neutral-border);background:var(--bg);color:var(--neutral)}
.fchip.active{background:var(--head);color:#fff;border-color:var(--head)}
.tl-group-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--neutral);font-weight:600;margin:6px 0 10px}
.tl-item{display:flex;gap:12px;position:relative;padding-bottom:16px}
.tl-marker{display:flex;flex-direction:column;align-items:center;flex:none}
.tl-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;z-index:1;border:2px solid var(--bg)}
.tl-spine{width:2px;flex:1;background:var(--border);margin-top:2px}
.tl-text{font-size:12.5px;color:var(--ink);line-height:1.45}
.tl-meta{display:flex;align-items:center;gap:8px;margin-top:3px}
.tl-meta span{font-family:var(--mono);font-size:10px;color:var(--neutral)}

/* notes / empty */
.compose{border:1px solid var(--neutral-border);border-radius:11px;padding:12px 14px;margin-bottom:16px}
.compose textarea{width:100%;border:none;outline:none;resize:vertical;min-height:46px;font-family:var(--body-font);font-size:13px;color:var(--ink);background:transparent}
.compose textarea::placeholder{color:var(--neutral)}
.note-item{display:flex;gap:12px;padding-bottom:16px}
.empty{text-align:center;padding:26px 10px;color:var(--neutral);font-size:13px}
.empty-ic{opacity:.5;margin-bottom:8px;display:flex;justify-content:center}

/* skeleton */
.sk{background:linear-gradient(90deg,#f0eee9 25%,#e8e6e0 37%,#f0eee9 63%);background-size:400% 100%;animation:skl 1.3s ease infinite;border-radius:8px}
@keyframes skl{from{background-position:100% 0}to{background-position:-100% 0}}

/* toast */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;z-index:200}
.toast{background:var(--head);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 12px 30px rgba(32,32,88,.3);animation:tin .25s ease}
.toast.err{background:var(--danger)}
.toast.ok{background:var(--success)}
@keyframes tin{from{opacity:0;transform:translateY(8px)}}
.substub{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--border);border-radius:12px}
</style>
</head>
<body>
<!-- Rail + canonical top-bar injected by /_lib/shell.js (renderShell('orders', { topbar: true, breadcrumb })).
     The breadcrumb ("Orders › #<order>") replaces the old subnav; the linked "Orders" is the back path. -->
<div class="shell">
  <main class="main">
    <div id="strip"></div>
    <div class="wrap"><div id="app"></div></div>
  </main>
</div>
<div class="toast-wrap" id="toasts"></div>
<div id="modalRoot"></div>

<script type="module">
import { api, ensureAuth, formatINR, rupeesToPaise, paiseToRupees, newIdempotencyKey } from '/_lib/api.js';
import { renderShell } from '/_lib/shell.js?v=6';

// Canonical rail + top-bar. Breadcrumb starts as a linked "Orders" (back path)
// and gains the order number once the order loads (see the crumb update in load()).
renderShell('orders', { topbar: true, breadcrumb: '<a href="/orders.html" style="color:inherit;text-decoration:none">Orders</a>' });

// ------------------------------------------------------------------ utils
function escapeHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function escapeAttr(s){return escapeHtml(s).replace(/`/g,'&#96;');}
function ic(path,w){w=w||18;return '<svg width="'+w+'" height="'+w+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="display:block">'+path+'</svg>';}
const ICONS={
  truck:'<path d="M3 7h11v8H3z"/><path d="M14 10h3l3 3v2h-6z"/><circle cx="7" cy="17" r="1.7"/><circle cx="17.5" cy="17" r="1.7"/>',

const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function d(iso){return iso?new Date(iso):null;}
function fmtDate(iso){const t=d(iso);if(!t||isNaN(t))return '—';return MONTHS[t.getMonth()]+' '+t.getDate();}
function fmtTime(iso){const t=d(iso);if(!t||isNaN(t))return '';let h=t.getHours(),m=t.getMinutes();const ap=h>=12?'PM':'AM';h=h%12||12;return h+':'+String(m).padStart(2,'0')+' '+ap;}
function fmtDateTime(iso){const t=d(iso);if(!t||isNaN(t))return '—';return fmtDate(iso)+' · '+fmtTime(iso);}
function daysBetween(a,b){const s=d(a),e=d(b);if(!s||!e||isNaN(s)||isNaN(e))return null;return Math.max(1,Math.ceil((e-s)/86400000));}
function initials(name){const p=String(name||'').trim().split(/\s+/).filter(Boolean);if(!p.length)return '—';return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}

function renderStepper(){
  const NODES=['Draft','Quote','Confirmed','Dispatched','Returned','Closed'];
  const SCROLLTO=['customer','pricing','pricing','equipment','equipment','documents'];
  const rs=resolvedStatus();
  const IDX={draft:0,quoted:1,confirmed:2,allocated:2,partially_dispatched:3,fully_dispatched:3,dispatched:3,active:3,partial_return:4,awaiting_inspection:4,ready_to_close:4,returned:4,closed:5,cancelled:1};
  const cur=IDX[rs]??0;
  const cancelled=(rs==='cancelled');
  let html='<div class="card" style="margin-bottom:22px"><div class="card-bd" style="padding:22px 26px"><div class="stepper">';
  for(let i=0;i<NODES.length;i++){
    let node,lblColor,sub='';
    if(cancelled&&i===cur){node='<div class="node node-failed">✕</div>';lblColor='var(--danger)';}
    else if(i<cur){node='<div class="node node-done">'+I('check',14)+'</div>';lblColor='var(--neutral)';}
    else if(i===cur){node='<div class="node node-current"><span class="core"></span></div>';lblColor='var(--progress)';
      if(S.aggCtx&&(rs==='partially_dispatched'))sub='Partially · '+(S.aggCtx.dispatched??0)+'/'+S.aggCtx.total;}
    else {node='<div class="node node-upcoming">○</div>';lblColor='var(--neutral)';}
    const clickable=i<=cur;
    html+='<div class="step" style="flex:'+(i<NODES.length-1?'1':'0')+'">'
      +'<div class="step-inner" '+(clickable?('data-scroll="'+SCROLLTO[i]+'"'):'')+' style="'+(clickable?'':'cursor:default')+'">'
      +node
      +'<div><div class="step-label" style="color:'+lblColor+'">'+NODES[i]+'</div>'
      +(sub?'<div class="step-sub">'+escapeHtml(sub)+'</div>':'')+'</div></div>'
      +(i<NODES.length-1?'<div class="connector '+(i<cur?'conn-solid':'conn-dashed')+'"></div>':'')
      +'</div>';
  }
  html+='</div></div></div>';
  return html;
}

function eventMeta(type){
  const t=String(type||'');
  if(/status/.test(t))return {cat:'State',icon:'●',bg:'var(--progress-bg)',color:'var(--progress)'};
  if(/dispatch/.test(t))return {cat:'Actions',icon:'✓',bg:'var(--progress-bg)',color:'var(--progress)'};
  if(/return/.test(t))return {cat:'Actions',icon:'✓',bg:'var(--success-bg)',color:'var(--success)'};
  if(/extend/.test(t))return {cat:'Actions',icon:'⏱',bg:'var(--info-bg)',color:'var(--info)'};
  if(/item/.test(t))return {cat:'Actions',icon:'✎',bg:'var(--neutral-bg)',color:'var(--neutral)'};
  if(/payment|deposit|coupon|invoice|refund|forfeit/.test(t))return {cat:'Financial',icon:'💼',bg:'var(--attention-bg)',color:'var(--attention)'};
  if(/note/.test(t))return {cat:'Notes',icon:'📝',bg:'var(--neutral-bg)',color:'var(--neutral)'};
  if(/contract|approval/.test(t))return {cat:'System',icon:'🔒',bg:'var(--neutral-bg)',color:'var(--neutral)'};
  if(/comm|whatsapp|email|sms|notif/.test(t))return {cat:'System',icon:'💬',bg:'var(--neutral-bg)',color:'var(--neutral)'};
  return {cat:'System',icon:'ⓘ',bg:'var(--neutral-bg)',color:'var(--neutral)'};
}
function eventLabel(e){
  const t=String(e.event_type||'');const p=e.payload||{};
  let base=t.replace(/^order[._]/,'').replace(/[._]/g,' ');
  if(/status/.test(t)&&p.to)base='Status → '+p.to;
  else if(/dispatch/.test(t))base='Equipment dispatched';
  else if(/return/.test(t))base='Equipment returned';
  else if(/extend/.test(t))base='Rental extended'+(p.delta_days?(' · +'+p.delta_days+'d'):'');
  else if(/payment/.test(t)&&p.amount_paise!=null)base='Payment '+formatINR(p.amount_paise)+' recorded';
  else base=base.charAt(0).toUpperCase()+base.slice(1);
  return escapeHtml(base);
}
function timeGroup(iso){
  const t=d(iso);if(!t||isNaN(t))return 'Earlier';
  const now=new Date();const sd=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const diff=(sd-new Date(t.getFullYear(),t.getMonth(),t.getDate()))/86400000;
  if(diff<=0)return 'Today';if(diff===1)return 'Yesterday';if(diff<7)return 'This Week';return 'Earlier';
}

  const CHIPS=['All','State','Actions','Financial','Notes','System'];
  html+='<div class="filterwrap">'+CHIPS.map(c=>'<button class="fchip'+(S.filters.has(c)?' active':'')+'" data-filter="'+c+'">'+c+'</button>').join('')+'</div>';
  const events=(S.events||[]).slice().sort((a,b)=>new Date(b.occurred_at)-new Date(a.occurred_at));
  const showAll=S.filters.has('All');
  const visible=events.filter(e=>showAll||S.filters.has(eventMeta(e.event_type).cat));
  if(!visible.length){html+='<div class="empty">No activity for this filter.</div>';}
  else{
    const groups=['Today','Yesterday','This Week','Earlier'];
    const bucket={};visible.forEach(e=>{const g=timeGroup(e.occurred_at);(bucket[g]=bucket[g]||[]).push(e);});
    for(const g of groups){
      if(!bucket[g])continue;
      html+='<div class="tl-group-label">'+g+'</div><div style="position:relative">';
      bucket[g].forEach((e,i,arr)=>{
        const m=eventMeta(e.event_type);
        html+='<div class="tl-item"><div class="tl-marker"><div class="tl-dot" style="background:'+m.bg+';color:'+m.color+'">'+m.icon+'</div>'+(i<arr.length-1?'<div class="tl-spine"></div>':'')+'</div>'
          +'<div style="flex:1;min-width:0;padding-top:1px"><div class="tl-text">'+eventLabel(e)+'</div>'
          +'<div class="tl-meta">'+(e.actor_name?'<span>'+escapeHtml(e.actor_name)+'</span><span>·</span>':'')+'<span>'+fmtDateTime(e.occurred_at)+'</span></div></div></div>';
      });
      html+='</div>';
    }
  }
  html+='</div>';
  return html;
}

  main+=card('equipment',DOT.equipment,'Equipment',String(rentalItems().length),null,cardEquipment());

  main+=card('payments',DOT.payments,'Payments',null,(bal>0?'<span style="color:var(--attention)">'+formatINR(bal)+' due</span>':'<span style="color:var(--success)">Paid</span>'),cardPayments());
  main+=card('deposits',DOT.deposits,'Deposits',null,'<span style="color:var(--neutral)">'+escapeHtml(String(o.deposit_status||'none').replace(/_/g,' '))+'</span>',cardDeposits());
  main+=card('events',DOT.events,'Related Events',String(nRel),null,cardEvents());
  // Sub-slice 2.3 — Substitutions & Damage. Renders unconditionally with an empty

  main+=card('changes',DOT.equipment,'Substitutions & Damage',(nChg?String(nChg):null),null,cardChanges());

  main+=card('quotes',DOT.events,'Quote Versions',(S.quotes&&S.quotes.length?String(S.quotes.length):null),null,cardQuotes());
  main+=card('documents',DOT.documents,'Documents',null,null,cardDocuments());

// ------------------------------------------------------------------ standby banner (Sub-slice 2.2)
function fmtCountdown(sec){sec=Math.max(0,Number(sec||0));const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);return h>0?(h+'h '+m+'m'):(m+'m');}
function renderStandbyBanner(){
  const s=S.standby;if(!s)return '';
  const pending=s.status==='pending_approval';
  const cd=fmtCountdown(s.seconds_to_expiry);
  return '<div style="background:var(--attention-bg);border:1px solid var(--attention-border);border-radius:12px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">'
    +'<span style="width:34px;height:34px;border-radius:9px;background:#fff;color:var(--attention);display:flex;align-items:center;justify-content:center;flex:none">'+I('clock',18)+'</span>'
    +'<div style="flex:1;min-width:180px"><div style="font-family:var(--head-font);font-weight:600;font-size:14px;color:var(--head)">'
      +(pending?'Standby '+escapeHtml(s.standby_number)+' — awaiting approval':'Standby '+escapeHtml(s.standby_number)+' · expires in '+cd)+'</div>'
      +'<div class="mono" style="font-size:11px;color:var(--neutral);margin-top:3px">'+escapeHtml(String(s.reason_tag||'').replace(/_/g,' '))+' · est. '+formatINR(s.estimated_value_paise)+'</div></div>'
    +(pending?'':'<div style="display:flex;gap:8px;flex-wrap:wrap">'
      +'<button class="btn btn-tiny btn-primary" data-sb="convert-booking">Convert to Booking</button>'
      +'<button class="btn btn-tiny btn-secondary" data-sb="convert-quote">Convert to Quote</button>'
      +'<button class="btn btn-tiny btn-secondary" data-sb="release">Release</button></div>')
  +'</div>';
}

// ------------------------------------------------------------------ quote versions card (Sub-slice 2.2)
const QV_TONE={draft:'neutral',sent:'info',viewed:'progress',accepted:'success',superseded:'neutral',expired:'attention',withdrawn:'neutral',rejected:'danger'};
function cardQuotes(){
  const qs=S.quotes||[];const activeId=S.activeQuoteTab||(qs[qs.length-1]&&qs[qs.length-1].id);
  const active=qs.find(q=>q.id===activeId)||qs[qs.length-1];
  return function(){
    let h='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">';
    for(const q of qs){const on=q.id===active.id;h+='<button class="btn btn-tiny '+(on?'btn-primary':'btn-secondary')+'" data-qtab="'+escapeAttr(q.id)+'">v'+escapeHtml(q.version_number)+' · '+escapeHtml(String(q.status).toUpperCase())+'</button>';}
    h+='</div>';
    if(!active)return '<div class="empty" style="text-align:center;padding:8px 0 4px"><div style="color:var(--neutral);font-size:13px;margin-bottom:12px">No versions yet — create the first quote for this order.</div>'
      +'<button class="btn btn-tiny btn-primary" data-qact="revise">'+I('plus',14)+'Create v1</button></div>';
    h+='<div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px">'
      +'<div><div style="font-family:var(--head-font);font-weight:600;font-size:14px;color:var(--ink)">'+escapeHtml(active.quote_number)+'</div>'
      +'<div class="mono" style="font-size:11px;color:var(--neutral);margin-top:3px">'+formatINR(active.total_paise)+(active.valid_until?' · valid until '+fmtDate(active.valid_until):'')+(active.view_count?' · '+active.view_count+' view'+(active.view_count===1?'':'s'):'')+'</div></div>'
      +'<span class="pill '+toneClass(QV_TONE[active.status]||'neutral')+'"><span class="pdot"></span>'+escapeHtml(String(active.status).toUpperCase())+'</span></div>';
    // diff summary
    const d=active.diff_from_parent;
    if(d&&!d.is_first_version){
      const parts=[];(d.added_items||[]).forEach(i=>parts.push('+ '+escapeHtml(i.description)));(d.removed_items||[]).forEach(i=>parts.push('− '+escapeHtml(i.description)));(d.changed_items||[]).forEach(i=>parts.push('~ '+escapeHtml(i.description)));if(d.date_changed)parts.push('dates changed');
      if(parts.length)h+='<div style="margin-top:12px;border:1px solid var(--attention-border);background:var(--attention-bg);border-radius:9px;padding:10px 12px"><div class="microlabel" style="margin-bottom:5px">Changes from v'+(active.version_number-1)+'</div><div style="font-size:12px;color:var(--head);line-height:1.6">'+parts.join(' · ')+(typeof d.total_change_paise==='number'&&d.total_change_paise!==0?' · total '+(d.total_change_paise>0?'+':'−')+formatINR(Math.abs(d.total_change_paise)):'')+'</div></div>';
    }
    // per-version actions
    let acts='';const st=active.status;
    if(st==='draft')acts='<button class="btn btn-tiny btn-primary" data-qact="send" data-qid="'+escapeAttr(active.id)+'">Send</button>';
    else if(st==='sent'||st==='viewed')acts='<button class="btn btn-tiny btn-primary" data-qact="accept" data-qid="'+escapeAttr(active.id)+'">Mark Accepted</button><button class="btn btn-tiny btn-secondary" data-qact="resend" data-qid="'+escapeAttr(active.id)+'">Resend</button><button class="btn btn-tiny btn-secondary" data-qact="withdraw" data-qid="'+escapeAttr(active.id)+'">Withdraw</button>'+(active.has_tracking_link?'<button class="btn btn-tiny btn-ghost" data-qact="copylink" data-qid="'+escapeAttr(active.id)+'">Copy link</button>':'');
    else if(st==='accepted')acts='<span class="mono" style="font-size:11px;color:var(--success)">Accepted'+(active.accepted_at?' · '+fmtDate(active.accepted_at):'')+'</span>';
    h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">'+acts+'</div>';
    h+='<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px"><button class="btn btn-tiny btn-ghost" data-qact="revise">'+I('plus',14)+'Create new version</button></div>';
    return h;
  };
}

// ------------------------------------------------------------------ actions
async function doTransition(to){
  try{
    await api.post('/api/orders/'+S.id+'/transitions',{to});
    toast('Order moved to '+to,'ok');
    await load();
  }catch(err){
    const struct=err.body&&err.body.error&&Array.isArray(err.body.error.reasons)?err.body.error:null;
    if(struct){
      S.blocker={title:'Cannot proceed',reasons:struct.reasons,total:struct.reasons.length};
      renderStrip();
    }else if(err.body&&err.body.error==='non_canonical_transition'){
      toast('Blocked: this move needs confirmation ('+err.body.from+' → '+err.body.to+')','err');
    }else{
      toast('Action failed: '+(err.body&&err.body.error||err.message),'err');
    }
  }
}
function primaryCta(){
  const rs=resolvedStatus();const cta=CTA[rs];
  if(!cta||cta.disabled)return;
  S.blocker=null;
  if(cta.dispatch){doStartDispatch();return;}
  if(cta['return']){doStartReturn();return;}
  if(cta.to){doTransition(cta.to);return;}
  if(cta.soon){notInThisView(cta.label);return;}
  if(cta.link){window.location.href=cta.link(S.id);return;}
  if(cta.scroll){scrollToCard(cta.scroll);return;}
  toast('Next step: '+cta.label);
}
function scrollToCard(key){
  if(!S.open[key]){S.open[key]=true;render();}
  const el=document.getElementById('card-'+key);
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
}

document.addEventListener('click',(ev)=>{
  const t=ev.target;
  // dismiss overflow/blocker on outside click
  if(!t.closest('[data-stop]')&&!t.closest('[data-overflow]')&&!t.closest('[data-cta]')){
    let changed=false;
    if(S.overflow){S.overflow=false;changed=true;}
    if(S.blocker&&!t.closest('[data-blocker-close]')){S.blocker=null;changed=true;}
    if(changed)renderStrip();
  }
  const toggle=t.closest('[data-toggle]');if(toggle){const k=toggle.getAttribute('data-toggle');S.open[k]=!S.open[k];render();return;}
  const scroll=t.closest('[data-scroll]');if(scroll){scrollToCard(scroll.getAttribute('data-scroll'));return;}
  const filter=t.closest('[data-filter]');if(filter){const f=filter.getAttribute('data-filter');
    if(f==='All'){S.filters=new Set(['All']);}
    else{S.filters.delete('All');if(S.filters.has(f))S.filters.delete(f);else S.filters.add(f);if(!S.filters.size)S.filters.add('All');}
    render();return;}
  if(t.closest('[data-cta]')){primaryCta();return;}
  if(t.closest('[data-overflow]')){S.overflow=!S.overflow;S.blocker=null;renderStrip();return;}
  if(t.closest('[data-blocker-close]')){S.blocker=null;renderStrip();return;}
  const appc=t.closest('[data-approval]');if(appc){openDecideMode(appc.getAttribute('data-approval'));return;}
  const ov=t.closest('[data-ov]');if(ov){handleOverflow(ov.getAttribute('data-ov'),ov.classList.contains('disabled'));return;}
  const act=t.closest('[data-act]');if(act){handleAct(act.getAttribute('data-act'),act);return;}
  const sec=t.closest('[data-secondary]');if(sec){handleAct('contact',sec);return;}
  const sb=t.closest('[data-sb]');if(sb){handleStandby(sb.getAttribute('data-sb'));return;}
  const qtab=t.closest('[data-qtab]');if(qtab){S.activeQuoteTab=qtab.getAttribute('data-qtab');render();return;}
  const qact=t.closest('[data-qact]');if(qact){handleQuote(qact.getAttribute('data-qact'),qact.getAttribute('data-qid'));return;}
  const mact=t.closest('[data-m]');if(mact){handleModal(mact.getAttribute('data-m'),mact);return;}
});

function handleOverflow(kind,disabled){
  S.overflow=false;
  if(kind==='cancel'){
    if(disabled){toast('Cancelling is blocked — this order has dispatched equipment. Use Return instead.','err');renderStrip();return;}
    renderStrip();openCancellationModal();return;
  }
  if(kind==='send-update'){renderStrip();openSendUpdateModal();return;}
  if(kind==='edit'){notInThisView('Editing');return;}
  if(kind==='print'){window.location.href='/invoice.html?order='+S.id;return;}
  if(kind==='duplicate'){toast('Duplicate order — not wired in this view');renderStrip();return;}
  renderStrip();
}
async function handleAct(kind,el){
  const o=S.order;
  switch(kind){
    case 'wa': if(o.customer_phone)window.open('https://wa.me/'+String(o.customer_phone).replace(/\D/g,''),'_blank');break;
    case 'call': if(o.customer_phone)window.location.href='tel:'+o.customer_phone;break;
    case 'contact': toast('Contact '+(o.customer_name||'customer'));break;
    case 'extend': openExtensionModal();break;
    case 'send-update-inline': openSendUpdateModal();break;
    case 'substitute': openSubstitutionModal(el&&el.getAttribute('data-item'));break;
    case 'report-damage': openDamageModal(el&&el.getAttribute('data-item'));break;
    case 'sub-execute': doSubstitutionAction('execute',el&&el.getAttribute('data-sub'));break;
    case 'sub-revert': doSubstitutionAction('revert',el&&el.getAttribute('data-sub'));break;
    case 'sub-approve': doSubstitutionAction('approve',el&&el.getAttribute('data-sub'));break;
    case 'sub-reject': doSubstitutionAction('reject',el&&el.getAttribute('data-sub'));break;
    case 'dmg-open': openDamageModal(null,el&&el.getAttribute('data-dmg'));break;
    case 'record-payment': openPaymentModal('rental');break;
    case 'record-deposit': openPaymentModal('deposit');break;
    case 'release-deposit': openDepositAction('deposit_refund');break;
    case 'forfeit-deposit': openDepositAction('deposit_forfeit');break;
    case 'complete-deposit-release': doCompleteDepositRelease(el&&el.getAttribute('data-payment'));break;
    case 'refund-payment': openRefundModal(el&&el.getAttribute('data-payment'));break;
    case 'delete-payment': doDeletePayment(el&&el.getAttribute('data-payment'));break;
    case 'add-line': case 'view-asset': case 'dispatch-item':
      notInThisView(SOON_LABELS[kind]);break;
    case 'save-note':{
      const box=document.querySelector('[data-note-input]');const val=box?box.value.trim():'';
      if(!val){toast('Write a note first','err');break;}
      try{await api.patch('/api/orders/'+S.id,{notes:val});toast('Note saved','ok');await load();}
      catch(err){toast('Could not save note: '+(err.body&&err.body.error||err.message),'err');}
      break;}
    default: break;
  }
}

// Item 12 Blocked-Action: gate "Start Dispatch", then open a dispatch record and
// navigate to the capture flow. Session 1 wires the real payment (deposit) check;
// KYC + equipment-ready gates land in Session 2 with their data signals.
async function doStartDispatch(){
  const o=S.order;
  const reasons=[];
  const req=Number(o.deposit_required_paise||0);
  const ds=o.deposit_status||'none';
  if(req>0 && (ds==='none'||ds==='pending')){
    reasons.push({message:'Deposit not yet collected — ₹'+Math.round(req/100).toLocaleString('en-IN')+' required before handover.',severity:'attention',fix_link_target:'#card-deposits'});
  }
  if(reasons.length){ S.blocker={title:'Cannot start dispatch',reasons,total:reasons.length}; renderStrip(); return; }
  try{
    const r=await api.post('/api/orders/'+S.id+'/dispatches',{});
    const id=r.dispatch&&r.dispatch.id;
    if(!id)throw new Error('no dispatch id returned');
    window.location.href='/dispatch.html?dispatch_id='+encodeURIComponent(id);
  }catch(err){
    toast('Could not start dispatch: '+((err.body&&err.body.error&&(err.body.error.message||err.body.error))||err.message),'err');
  }
}

// Slice 5: open a first-class return record + navigate to the return flow.
async function doStartReturn(){
  try{
    const r=await api.post('/api/orders/'+S.id+'/returns',{});
    const id=r['return']&&r['return'].id;
    if(!id)throw new Error('no return id returned');
    window.location.href='/return.html?return_id='+encodeURIComponent(id);
  }catch(err){
    toast('Could not start return: '+((err.body&&err.body.error&&(err.body.error.message||err.body.error))||err.message),'err');
  }
}

// ------------------------------------------------------------------ load
async function load(){
  const data=await api.get('/api/orders/'+S.id);
  S.order=data.order;S.items=data.items||[];S.events=data.events||[];S.assets=data.assets||[];
  S.tags=data.tags||[];S.cf=data.custom_fields||[];S.coupon=data.coupon_redemption||null;
  S.agg=data.aggregate_status||null;S.aggCtx=data.aggregate_status_context||null;
  S.extensions=data.extensions||[];S.cancellation=data.cancellation||null;
  S.approvals=data.active_approvals||[];S.customer=data.customer||null;
  S.standby=data.standby||null;S.quotes=data.quote_versions||[];
  // Sub-slice 2.3 — substitutions + damage incidents load async (like comms).
  api.get('/api/orders/'+S.id+'/substitutions').then(r=>{S.substitutions=r.substitutions||[];render();}).catch(()=>{});
  api.get('/api/orders/'+S.id+'/damage-incidents').then(r=>{S.damage=r.damage_incidents||[];render();}).catch(()=>{});
  if(S.quotes.length&&!S.activeQuoteTab)S.activeQuoteTab=S.quotes[S.quotes.length-1].id;
  const _crumb=document.querySelector('.topbar .tb-crumb');
  if(_crumb)_crumb.innerHTML='<a href="/orders.html" style="color:inherit;text-decoration:none">Orders</a> &rsaquo; #'+escapeHtml(data.order.order_number);
  // Communications (customer-facing deliveries) — best-effort, non-blocking.
  api.get('/api/orders/'+S.id+'/communications').then(r=>{S.comms=r.communications||[];render();}).catch(()=>{});
  // Slice 7 — payment ledger (rows + deposit summary) for the Payments card.
  api.get('/api/order-payments/'+S.id).then(r=>{S.payments=r.payments||[];S.depositInfo=r.deposit||null;render();}).catch(()=>{});
  render();
}

function isoToLocalInput(iso){if(!iso)return '';const t=new Date(iso);if(isNaN(t))return '';const p=n=>String(n).padStart(2,'0');return t.getFullYear()+'-'+p(t.getMonth()+1)+'-'+p(t.getDate())+'T'+p(t.getHours())+':'+p(t.getMinutes());}
function localInputToIso(v){if(!v)return null;const t=new Date(v);return isNaN(t)?null:t.toISOString();}
function num(v,d){const n=Number(v);return isFinite(n)?n:(d||0);}

// ---- EXTENSION ----
function openExtensionModal(){

function extPolicy(){return (S.settings&&S.settings.extension_policy)||{};}
function recomputeExtension(){
  const o=S.order;const d=M.data;
  const newIso=localInputToIso(d.newEnd);
  const oldMs=o.rental_end?new Date(o.rental_end).getTime():null;
  const newMs=newIso?new Date(newIso).getTime():null;
  d.days=(oldMs!=null&&newMs!=null&&newMs>oldMs)?Math.ceil((newMs-oldMs)/86400000):0;
  // additional charges estimate = sum(rate*qty)*days
  let est=0;for(const it of rentalItems()){est+=Number(it.daily_rate_paise||0)*Number(it.quantity||1)*d.days;}
  d.estCharges=est;
  const ep=extPolicy();const reasons=[];
  if(d.days>num(ep.requires_approval_over_days,2))reasons.push('Extension of '+d.days+' days exceeds the '+num(ep.requires_approval_over_days,2)+'-day limit');
  const vt=num(ep.requires_approval_over_value_paise,0);if(vt>0&&est>vt)reasons.push('Additional charges exceed the value threshold');
  if(ep.requires_approval_if_original_unpaid&&Number(o.balance_paise)>0)reasons.push('Original order is not fully paid');
  d.requiresApproval=reasons.length>0;d.reasons=reasons;
  renderExtensionModal();
  // fire availability preview (advisory) for the extension window
  if(oldMs!=null&&newMs!=null&&newMs>oldMs){
    const token=++d.checkToken;d.checking=true;
    const items=rentalItems().filter(it=>it.product_id);
    Promise.all(items.map(it=>api.post('/api/availability/check',{product_id:it.product_id,quantity:Number(it.quantity||1),start:new Date(oldMs).toISOString(),end:new Date(newMs).toISOString(),exclude_order_id:S.id,location_id:o.pickup_location_id}).then(r=>({it,check:r.check})).catch(()=>null)))
      .then(res=>{if(token!==d.checkToken)return;d.conflicts=res.filter(x=>x&&x.check&&!x.check.available).map(x=>({name:x.it.description,product_id:x.it.product_id}));d.checking=false;renderExtensionModal();});
  }
}

function cancelPolicy(){return (S.settings&&S.settings.cancellation_policy)||{};}
function computeCancellation(){
  const o=S.order;const d=M.data;const cp=cancelPolicy();
  const startMs=o.rental_start?new Date(o.rental_start).getTime():null;const now=Date.now();
  const hrs=startMs!=null?(startMs-now)/3600000:null;
  let tier='before_72hr';if(hrs!=null){if(hrs<24)tier='under_24hr';else if(hrs<72)tier='24_to_72hr';}
  const grace=num((S.settings.billing||{}).grace_period_hours,2);
  const isNoShow=d.reasonTag==='customer_no_show'||(o.status==='confirmed'&&startMs!=null&&now>startMs+grace*3600000);
  const tiers=cp.tiers||{before_72hr:{refund_percent:100},'24_to_72hr':{refund_percent:75},under_24hr:{refund_percent:50}};
  const tcfg=tiers[tier]||{refund_percent:100,processing_fee_paise:0};
  let pct=num(tcfg.refund_percent,100);let fee=num(tcfg.processing_fee_paise,0);let depForfeitPct=0;
  const autoR=cp.auto_refund_reasons||[];const autoZ=cp.auto_zero_refund_reasons||[];
  if(autoR.indexOf(d.reasonTag)>=0){pct=100;fee=0;}
  else if(isNoShow||autoZ.indexOf(d.reasonTag)>=0){pct=0;depForfeitPct=num((cp.no_show_policy||{}).deposit_forfeit_percent,100);}
  const original=Number(o.total_paise);const refund=Math.round(original*pct/100);const forfeit=original-refund;
  const heldDeposit=(o.deposit_status==='held')?Number(o.deposit_required_paise||0):0;
  const depForfeit=depForfeitPct>0?Math.round(heldDeposit*depForfeitPct/100):0;const depRefund=heldDeposit-depForfeit;
  // approval
  const ra=cp.requires_approval||{};const reasons=[];
  if(tier==='under_24hr'&&ra.under_24hr_cancellations)reasons.push('Cancellation within 24 hours of dispatch');
  if(isNoShow&&ra.no_show_cancellations)reasons.push('No-show cancellation');
  const rt=num(ra.refunds_over_paise,0);if(rt>0&&refund>rt)reasons.push('Refund exceeds the approval threshold');
  d.tier=tier;d.hrs=hrs;d.isNoShow=isNoShow;d.pct=pct;
  d.fin={original,refund,forfeit,fee,depRefund,depForfeit,total:refund+depRefund};
  d.requiresApproval=reasons.length>0;d.reasons=reasons;
}

  if(kind==='submit-payment')return submitPayment();

function showModalError(err,rerender){

// ==================================================================== PAYMENT MODAL (Slice 7)
const PM_ALL_METHODS=['upi','bank_transfer','cash','card','cheque','wallet','other'];
const PM_REF_LABEL={upi:'UPI reference / transaction ID',bank_transfer:'Bank transaction ID',cheque:'Cheque number',card:'Card reference',wallet:'Wallet reference',other:'Reference'};
function pmRefRequired(policy,method){
  if(!policy)return false;
  if(method==='upi')return !!policy.require_reference_for_upi;
  if(method==='bank_transfer')return !!policy.require_reference_for_bank_transfer;
  if(method==='cheque')return !!policy.require_cheque_number;
  return false;
}
function pmAmountPaise(){const n=Number(M.data&&M.data.amountRupees);return isFinite(n)&&n>0?rupeesToPaise(n):0;}

// Slice 7 S2: forfeit-reason display labels (SET is config-driven from the
// backend taxonomy; only the human formatting is client-side).
const PM_FORFEIT_LABEL={damage_customer_liable:'Damage — customer liable',missing_accessories:'Missing accessories',late_return:'Late return',other:'Other'};
const PM_KIND_TITLE={rental:'RECORD PAYMENT',deposit:'RECORD DEPOSIT',deposit_refund:'RELEASE DEPOSIT',deposit_forfeit:'FORFEIT DEPOSIT'};
const PM_KIND_CTA={rental:'Record payment',deposit:'Record deposit',deposit_refund:'Release deposit',deposit_forfeit:'Forfeit deposit'};
const PM_KIND_DONE={rental:'Payment recorded',deposit:'Deposit recorded',deposit_refund:'Deposit released',deposit_forfeit:'Deposit forfeited'};
function forfeitTaxonomy(){const o=M.data&&M.data.options;return (o&&Array.isArray(o.forfeit_reason_taxonomy)&&o.forfeit_reason_taxonomy.length)?o.forfeit_reason_taxonomy:['damage_customer_liable','missing_accessories','late_return','other'];}

// opts: { amountPaise, method, lockKind } — pre-fill for a deposit release/forfeit.
async function openPaymentModal(presetKind,opts){
  opts=opts||{};
  M.kind='payment';
  M.data={kind:presetKind||'rental',amountRupees:opts.amountPaise?String(paiseToRupees(opts.amountPaise)):'',
    method:opts.method||'upi',reference:'',notes:'',forfeitReason:'',lockKind:!!opts.lockKind,
    options:null,preview:null,previewToken:0,previewTimer:null,idemKey:newIdempotencyKey(),loading:true};
  renderPaymentModal();
  try{
    const o=await api.get('/api/order-payments/'+S.id+'/payment-options');
    M.data.options=o;M.data.loading=false;
    // default method to first enabled; prefill rental amount with outstanding balance.
    const methods=(o.policy&&o.policy.methods_enabled)||PM_ALL_METHODS;
    if(methods.indexOf(M.data.method)<0)M.data.method=methods[0]||'upi';
    if(M.data.kind==='rental'&&!M.data.amountRupees&&Number(o.suggested_amount_paise)>0)M.data.amountRupees=String(paiseToRupees(o.suggested_amount_paise));
    if(M.data.kind==='deposit_forfeit'){const tax=forfeitTaxonomy();if(tax.length)M.data.forfeitReason=tax[0];}
    renderPaymentModal();schedulePaymentPreview();
  }catch(err){M.data.loading=false;showModalError(err,renderPaymentModal);}
}
function paymentKindsAvailable(){
  const opts=M.data.options;
  if(!opts||!Array.isArray(opts.kinds))return [{kind:'rental',label:'Rental payment'}];
  return opts.kinds.filter(k=>k.allowed).map(k=>({kind:k.kind,label:k.label}));
}
function paymentValid(){
  const d=M.data;const amt=pmAmountPaise();
  if(amt<=0)return false;
  const policy=d.options&&d.options.policy;
  if(pmRefRequired(policy,d.method)&&!(d.reference&&d.reference.trim()))return false;
  if(d.kind==='deposit_forfeit'&&!(d.forfeitReason&&String(d.forfeitReason).trim()))return false;
  return !d.busy&&!M.busy;
}
function renderPaymentModal(){
  if(M.kind!=='payment')return;const o=S.order;const d=M.data;
  if(d.loading){mrender(mHead('RECORD PAYMENT — #'+escapeHtml(o.order_number),escapeHtml(o.customer_name||''))+'<div class="m-bd"><div class="empty" style="padding:30px">Loading payment options…</div></div>');return;}
  const opts=d.options||{};const policy=opts.policy||{};
  const kinds=paymentKindsAvailable();
  const methods=(policy.methods_enabled&&policy.methods_enabled.length?policy.methods_enabled:PM_ALL_METHODS);

      +'<select class="m-select" data-mfield="pm_kind" style="min-width:280px">'

  if(d.kind==='deposit_forfeit'){
    const tax=forfeitTaxonomy();
    b+='<div class="m-sec"><div class="m-lbl">Forfeit reason <span style="color:var(--danger)">*</span></div>'
      +'<select class="m-select" data-mfield="pm_forfeit_reason" style="min-width:280px">'
      +tax.map(t=>'<option value="'+escapeAttr(t)+'"'+(d.forfeitReason===t?' selected':'')+'>'+escapeHtml(PM_FORFEIT_LABEL[t]||String(t).replace(/_/g,' '))+'</option>').join('')
      +'</select></div>';
  }
  // 2. Amount
  b+='<div class="m-sec"><div class="m-lbl">Amount</div>'
    +'<div style="display:flex;align-items:center;gap:10px"><span style="font-size:18px;color:var(--neutral)">₹</span>'
    +'<input class="m-input" data-mfield="pm_amount" inputmode="decimal" placeholder="0" value="'+escapeAttr(d.amountRupees)+'" style="width:200px;font-size:16px">'
    +'</div></div>';
  // 3. Method
  b+='<div class="m-sec"><div class="m-lbl">Method</div>'
    +'<select class="m-select" data-mfield="pm_method" style="min-width:220px">'
    +methods.map(m=>'<option value="'+m+'"'+(d.method===m?' selected':'')+'>'+escapeHtml(PM_METHOD_LABEL[m]||m)+'</option>').join('')
    +'</select></div>';
  // 4. Progressive method-specific reference field (hidden for cash)
  if(d.method!=='cash'){
    const req=pmRefRequired(policy,d.method);
    b+='<div class="m-sec"><div class="m-lbl">'+escapeHtml(PM_REF_LABEL[d.method]||'Reference')+(req?' <span style="color:var(--danger)">*</span>':' <span style="color:var(--neutral);font-weight:400">(optional)</span>')+'</div>'
      +'<input class="m-input" data-mfield="pm_ref" placeholder="'+escapeAttr(PM_REF_LABEL[d.method]||'Reference')+'" value="'+escapeAttr(d.reference||'')+'" style="width:280px">'
      +'<div class="m-hint" id="pmRefHint" style="color:var(--danger);'+(req&&!(d.reference&&d.reference.trim())?'':'display:none')+'">This method requires a reference number.</div>'
      +'</div>';
  }
  // 5. Notes
  b+='<div class="m-sec"><div class="m-lbl">Notes <span style="color:var(--neutral);font-weight:400">(optional)</span></div>'

    +'<button class="m-btn" id="pmSubmit" data-m="submit-payment"'+(paymentValid()?'':' disabled')+'>'+(M.busy?'Working…':escapeHtml(cta))+'</button>';
  const sub=escapeHtml(o.customer_name||'')+' · Balance '+formatINR(o.balance_paise!=null?o.balance_paise:0);
  const title=(PM_KIND_TITLE[d.kind]||'RECORD PAYMENT')+' — #'+escapeHtml(o.order_number);
  mrender(mHead(title,sub)+'<div class="m-bd">'+b+'</div><div class="m-ft">'+foot+'</div>');
}
function paymentPreviewInner(){
  const d=M.data;const p=d.preview;const amt=pmAmountPaise();
  if(amt<=0)return '<div class="m-fin"><div class="m-frow"><span class="l">Enter an amount to preview</span><span class="v"></span></div></div>';
  if(!p)return '<div class="m-fin"><div class="m-frow"><span class="l">Calculating…</span><span class="v"></span></div></div>';
  let h='<div class="m-fin">';

    h+='<div class="m-frow"><span class="l">Current balance</span><span class="v">'+formatINR(p.current.balance_paise)+'</span></div>'
      +'<div class="m-frow"><span class="l">After this payment</span><span class="v" style="color:'+(p.projected.balance_paise<=0?'var(--success)':'var(--head)')+'">'+formatINR(p.projected.balance_paise)+'</span></div>';

    if(p.would_mark_invoice_paid)h+='<div class="m-frow"><span class="l" style="color:var(--success)">Invoice '+escapeHtml((p.latest_invoice&&p.latest_invoice.invoice_number)||'')+' will be marked paid</span><span class="v"></span></div>';

}
function updatePaymentFoot(){
  const btn=document.getElementById('pmSubmit');if(btn)btn.disabled=!paymentValid();
  const hint=document.getElementById('pmRefHint');
  if(hint){const req=pmRefRequired(M.data.options&&M.data.options.policy,M.data.method);hint.style.display=(req&&!(M.data.reference&&M.data.reference.trim()))?'':'none';}
}
function schedulePaymentPreview(){
  const d=M.data;if(!d)return;
  if(d.previewTimer)clearTimeout(d.previewTimer);
  const amt=pmAmountPaise();
  if(amt<=0){d.preview=null;const box=document.getElementById('pmPreview');if(box)box.innerHTML=paymentPreviewInner();return;}
  d.previewTimer=setTimeout(async()=>{
    const token=++d.previewToken;
    try{
      const r=await api.post('/api/order-payments/'+S.id+'/preview',{amount_paise:amt,method:d.method,payment_kind:d.kind,reference:(d.reference||'').trim()||undefined});
      if(token!==d.previewToken||M.kind!=='payment')return;
      d.preview=r;const box=document.getElementById('pmPreview');if(box)box.innerHTML=paymentPreviewInner();
    }catch(_){/* preview is advisory */}
  },350);
}
async function submitPayment(){
  const d=M.data;const amt=pmAmountPaise();
  if(amt<=0){toast('Enter an amount','err');return;}
  if(pmRefRequired(d.options&&d.options.policy,d.method)&&!(d.reference&&d.reference.trim())){toast('A reference is required for this method','err');return;}
  if(d.kind==='deposit_forfeit'&&!(d.forfeitReason&&String(d.forfeitReason).trim())){toast('Select a forfeit reason','err');return;}
  const body={amount_paise:amt,method:d.method,payment_kind:d.kind};
  if(d.reference&&d.reference.trim())body.reference=d.reference.trim();
  // Forfeit reason rides in the notes ("Forfeit reason: {tag}. {operator notes}").
  let notes=(d.notes||'').trim();
  if(d.kind==='deposit_forfeit')notes='Forfeit reason: '+d.forfeitReason+(notes?'. '+notes:'');
  if(notes)body.notes=notes;
  M.busy=true;renderPaymentModal();
  try{
    const r=await api.post('/api/order-payments/'+S.id,body,{key:d.idemKey});
    const rec=r&&r.invoice_reconcile;
    mclose();
    if(rec&&rec.action==='marked_paid')toast('Payment recorded — invoice '+(rec.invoice_number||'')+' marked paid','ok');
    else toast(PM_KIND_DONE[d.kind]||'Recorded','ok');
    await load();
  }catch(err){M.busy=false;showModalError(err,renderPaymentModal);}
}

function heldDepositPaise(){const di=S.depositInfo;return di&&di.net_held_paise!=null?Number(di.net_held_paise):0;}
function pendingAutoRelease(){return (S.payments||[]).find(p=>p.payment_kind==='deposit_refund'&&p.status==='pending');}
// Release / Forfeit reuse the Session 1 payment modal with the kind locked +
// amount pre-filled (Item 12 blocked-action: guarded on a held deposit existing).
function openDepositAction(kind){

async function handleStandby(kind){

  try{
    if(kind==='convert-booking'){await api.post('/api/standbys/'+s.id+'/convert-to-booking',{});toast('Converted to booking','ok');}
    else if(kind==='convert-quote'){const r=await api.post('/api/standbys/'+s.id+'/convert-to-quote',{});toast('Quote v'+r.version_number+' created','ok');}
    else if(kind==='release'){if(!confirm('Release this standby hold?'))return;await api.post('/api/standbys/'+s.id+'/release',{});toast('Hold released','ok');}
    await load();

let quoteBusy=false;
async function handleQuote(kind,qid){
  // Guard against a double-submit (rapid double-click on Create v1 / Send /
  // Accept). Two concurrent creates would race the (order_id, version_number)
  // unique index; the backend now also retries that race, but stopping it here
  // avoids the wasted round trip and the confusing mid-flight state. copylink is
  // a read, so it's exempt.
  if(kind!=='copylink'){ if(quoteBusy) return; quoteBusy=true; }
  try{
    if(kind==='send'){await api.post('/api/orders/'+S.id+'/quote-versions/'+qid+'/send',{});toast('Quote sent','ok');}
    else if(kind==='resend'){await api.post('/api/orders/'+S.id+'/quote-versions/'+qid+'/send',{});toast('Quote resent','ok');}
    else if(kind==='accept'){if(!confirm('Mark this quote accepted (staff-confirmed)? The order will be confirmed.'))return;await api.post('/api/orders/'+S.id+'/quote-versions/'+qid+'/accept',{acceptance_source:'staff_confirmed'});toast('Quote accepted','ok');}
    else if(kind==='withdraw'){const reason=prompt('Withdraw reason (optional):')||undefined;const r=await api.post('/api/orders/'+S.id+'/quote-versions/'+qid+'/withdraw',{reason});toast(r&&r.requires_approval?'Withdrawal sent for approval':'Quote withdrawn','ok');}
    else if(kind==='revise'){const tag=S.quotes.length?(prompt('Revision reason tag (e.g. customer_requested_change, pricing_correction, date_change):','customer_requested_change')||undefined):undefined;if(S.quotes.length&&!tag)return;const r=await api.post('/api/orders/'+S.id+'/quote-versions',tag?{revision_reason_tag:tag}:{});S.activeQuoteTab=r.quote_version.id;toast('Draft v'+r.quote_version.version_number+' created','ok');}
    else if(kind==='copylink'){
      const v=(await api.get('/api/orders/'+S.id+'/quote-versions/'+qid)).quote_version;

      try{await navigator.clipboard.writeText(url);toast('Tracking link copied','ok');}catch{prompt('Tracking link:',url);}
      return;
    }
    await load();
  }catch(err){showModalError(err);}
  finally{ quoteBusy=false; }

async function submitSubstitution(){
  if(M.busy)return;const d=M.data;
  const body={original_order_item_id:d.itemId,substitution_type:d.type,reason_tag:d.reason,timing:d.timing,financial_handling:d.fin,reason_notes:d.notes||undefined};
  if(d.replProduct)body.replacement_product_id=d.replProduct;
  if(d.replAsset&&/^[0-9a-f-]{36}$/i.test(d.replAsset))body.replacement_asset_id=d.replAsset;
  if((d.fin==='additional_charge'||d.fin==='credit_to_customer')&&d.amount)body.financial_amount_paise=Math.round(Number(d.amount)*100);
  M.busy=true;mrender(renderSubModal(S.items.find(i=>i.id===d.itemId)||{}));
  try{
    const created=await api.post('/api/orders/'+S.id+'/substitutions',body);
    if(created.requires_approval){toast('Substitution sent for approval','ok');}
    else{await api.post('/api/substitutions/'+created.substitution.id+'/execute',{});toast('Substitution executed','ok');}
    mclose();await load();
  }catch(err){M.busy=false;showModalError(err);}
}
async function doSubstitutionAction(kind,subId){
  if(!subId)return;
  try{
    if(kind==='execute'){await api.post('/api/substitutions/'+subId+'/execute',{});toast('Substitution executed','ok');}
    else if(kind==='approve'){await api.post('/api/substitutions/'+subId+'/approve',{});toast('Approved','ok');}
    else if(kind==='reject'){const reason=prompt('Reject reason (optional):')||undefined;await api.post('/api/substitutions/'+subId+'/reject',{reason});toast('Rejected','ok');}
    else if(kind==='revert'){if(!confirm('Revert this substitution? The original line is restored and the replacement removed.'))return;const reason=prompt('Revert reason (optional):')||undefined;await api.post('/api/substitutions/'+subId+'/revert',{reason});toast('Reverted','ok');}
    await load();
  }catch(err){toast('Action failed: '+((err.body&&err.body.error)||err.message),'err');}
}

  }else if(d.step===2){
    const it=S.items.find(i=>i.id===d.itemId)||{};
    body=mlabel('AFFECTED ITEM')+'<div style="font-size:13px;color:var(--head);font-weight:600">'+escapeHtml(it.description||'Item')+'</div>'
      +mlabel('SEVERITY',true)+'<div style="display:flex;gap:8px;flex-wrap:wrap">'+DMG_SEVERITIES.map(s=>'<div data-dsev="'+s[0]+'" style="padding:8px 13px;border-radius:9px;border:1px solid '+(s[0]===d.severity?'var(--accent)':'#e6e3dc')+';background:'+(s[0]===d.severity?'#eef2ff':'#fff')+';color:'+(s[0]===d.severity?'var(--accent)':'var(--head)')+';font-size:12.5px;font-weight:'+(s[0]===d.severity?'700':'500')+';cursor:pointer">'+escapeHtml(s[1])+'</div>').join('')+'</div>'
      +mlabel('ESTIMATED REPAIR COST')+'<div style="display:flex;align-items:center;gap:8px"><span class="mono" style="color:var(--neutral)">₹</span><input data-f="estCost" class="m-input" style="max-width:180px" placeholder="Estimate (rupees)" value="'+escapeAttr(d.estCost)+'"></div>';
  }else if(d.step===3){
    body=mlabel('SAVE THE SHOOT — OPERATIONAL DECISION',true)
      +'<div style="display:flex;flex-direction:column;gap:8px">'+DMG_DECISIONS.map(o=>'<div data-ddec="'+o[0]+'" style="display:flex;gap:11px;padding:11px 13px;border-radius:11px;border:1px solid '+(o[0]===d.decision?'var(--accent)':'#e6e3dc')+';background:'+(o[0]===d.decision?'#f8f9ff':'#fff')+';cursor:pointer"><span style="margin-top:2px;width:16px;height:16px;flex:none;border-radius:50%;border:2px solid '+(o[0]===d.decision?'var(--accent)':'#cfcbc2')+';display:flex;align-items:center;justify-content:center">'+(o[0]===d.decision?'<span style="width:7px;height:7px;border-radius:50%;background:var(--accent)"></span>':'')+'</span><div><div style="font-size:13px;font-weight:600;color:var(--head)">'+escapeHtml(o[1])+'</div><div style="font-size:11.5px;color:var(--neutral);margin-top:2px">'+escapeHtml(o[2])+'</div></div></div>').join('')+'</div>'
      +(d.decision==='substitute_with_another_unit'?mlabel('REPLACEMENT PRODUCT FOR THE SWAP')+'<select data-f="replProduct" class="m-select"><option value="">— same product —</option>'+(d.products||[]).map(p=>'<option value="'+escapeAttr(p.id)+'"'+(p.id===d.replProduct?' selected':'')+'>'+escapeHtml(p.name||p.sku)+'</option>').join('')+'</select>':'');
  }else if(d.step===4){
    body='<div style="font-size:12px;color:var(--neutral);background:#fffbeb;border:1px solid #fcd9a4;border-radius:10px;padding:11px 13px;margin-top:6px">Preliminary — fix now, decide the money later. You can leave this and set it after inspection.</div>'
      +mlabel('CUSTOMER LIABILITY')+'<select data-f="liability" class="m-select"><option value="">— use policy default —</option>'+selOpts(DMG_LIABILITY,d.liability)+'</select>'
      +mlabel('FINANCIAL RESOLUTION')+'<select data-f="resolution" class="m-select">'+selOpts(DMG_RESOLUTION,d.resolution)+'</select>'
      +mlabel('DEPOSIT ACTION')+'<select data-f="deposit" class="m-select">'+selOpts(DMG_DEPOSIT,d.deposit)+'</select>'
      +mlabel('FINAL COST (if known)')+'<div style="display:flex;align-items:center;gap:8px"><span class="mono" style="color:var(--neutral)">₹</span><input data-f="finalCost" class="m-input" style="max-width:180px" placeholder="Final cost (rupees)" value="'+escapeAttr(d.finalCost)+'"></div>';
  }else{
    const it=S.items.find(i=>i.id===d.itemId)||{};
    body=mlabel('REVIEW')
      +'<div style="display:flex;flex-direction:column;gap:7px;font-size:13px;color:var(--head)">'
      +'<div><b>'+escapeHtml(titleize(d.incidentType))+'</b> · '+escapeHtml(titleize(d.severity))+' · '+escapeHtml(it.description||'Item')+'</div>'
      +'<div style="color:var(--neutral);font-size:12.5px">'+escapeHtml(d.description||'—')+'</div>'
      +'<div class="mono" style="font-size:12px;color:var(--neutral)">Reported via '+escapeHtml(titleize(d.reporter))+'</div>'
      +'<div class="mono" style="font-size:12px;color:var(--neutral)">Save the Shoot: '+escapeHtml(titleize(d.decision))+'</div>'
      +'</div>';
  }
  const isLast=d.step===5;
  return '<div class="m-hd"><div><div class="mono" style="display:inline-flex;align-items:center;gap:7px;padding:4px 11px;border-radius:20px;background:var(--danger-bg);color:var(--danger);font-size:10px;font-weight:700;letter-spacing:.1em"><span style="width:7px;height:7px;border-radius:50%;background:var(--danger)"></span>DAMAGE INCIDENT</div>'
    +'<div style="margin-top:12px">'+damageProgress(d.step)+'</div></div><button class="m-x" data-mclose>'+I('cancel',16)+'</button></div>'
    +'<div class="m-bd">'+body+'</div>'
    +'<div class="m-ft"><button class="m-ghost" '+(d.step>1?'data-dstep="'+(d.step-1)+'"':'data-mclose')+'>'+(d.step>1?'Back':'Cancel')+'</button>'
    +(isLast?'<button class="m-btn danger" data-dsubmit '+(M.busy?'disabled':'')+'>'+(M.busy?'Creating…':'Create Incident')+'</button>':'<button class="m-btn" data-dstep="'+(d.step+1)+'">Next</button>')+'</div>';
}
function renderDamageView(){
  const x=M.data.inc;const d=M.data;
  const canFin=(x.status!=='closed');const canApprove=x.requires_approval;const canClose=(x.status!=='closed'&&!x.requires_approval);
  return '<div class="m-hd"><div><div class="mono" style="display:inline-flex;align-items:center;gap:7px;padding:4px 11px;border-radius:20px;background:var(--danger-bg);color:var(--danger);font-size:10px;font-weight:700;letter-spacing:.1em"><span style="width:7px;height:7px;border-radius:50%;background:var(--danger)"></span>DAMAGE INCIDENT</div>'
    +'<h3 class="m-title" style="margin-top:10px">'+escapeHtml(x.incident_number)+'</h3><div style="font-size:12.5px;color:var(--neutral);margin-top:4px">'+escapeHtml(titleize(x.incident_type))+' · '+escapeHtml(titleize(x.severity))+' · '+escapeHtml(String(x.status).replace(/_/g,' '))+'</div></div><button class="m-x" data-mclose>'+I('cancel',16)+'</button></div>'
    +'<div class="m-bd">'
    +'<div style="font-size:13px;color:var(--head);line-height:1.55">'+escapeHtml(x.description||'')+'</div>'
    +mlabel('SAVE THE SHOOT')+'<select data-f="decision" class="m-select">'+selOpts(DMG_DECISIONS.map(o=>o[0]),d.decision)+'</select>'
    +(d.decision==='substitute_with_another_unit'?'<select data-f="replProduct" class="m-select" style="margin-top:8px"><option value="">— same product —</option>'+(d.products||[]).map(p=>'<option value="'+escapeAttr(p.id)+'"'+(p.id===d.replProduct?' selected':'')+'>'+escapeHtml(p.name||p.sku)+'</option>').join('')+'</select>':'')
    +'<button class="btn btn-tiny btn-secondary" style="margin-top:10px" data-dsave-shoot>Apply operational decision</button>'
    +mlabel('FINANCIAL RESOLUTION')
    +'<select data-f="liability" class="m-select" style="margin-bottom:8px"><option value="">liability…</option>'+selOpts(DMG_LIABILITY,d.liability)+'</select>'
    +'<select data-f="resolution" class="m-select" style="margin-bottom:8px">'+selOpts(DMG_RESOLUTION,d.resolution)+'</select>'
    +'<select data-f="deposit" class="m-select" style="margin-bottom:8px">'+selOpts(DMG_DEPOSIT,d.deposit)+'</select>'
    +'<div style="display:flex;align-items:center;gap:8px"><span class="mono" style="color:var(--neutral)">₹</span><input data-f="finalCost" class="m-input" style="max-width:180px" placeholder="Final cost" value="'+escapeAttr(d.finalCost)+'"></div>'
    +(canFin?'<button class="btn btn-tiny btn-primary" style="margin-top:10px" data-dfin>Record resolution</button>':'')
    +'</div>'
    +'<div class="m-ft"><button class="m-ghost" data-mclose>Close</button><div style="display:flex;gap:8px">'
    +(canApprove?'<button class="btn btn-tiny btn-secondary" data-dapprove>Approve</button>':'')
    +(canClose?'<button class="m-btn" data-dclose-inc>Close incident</button>':'')+'</div></div>';
}
async function submitDamage(){
  if(M.busy)return;const d=M.data;
  if(!d.description.trim()){toast('Description is required','err');return;}
  M.busy=true;mrender(renderDamageModal());
  try{
    const body={reported_by_type:d.reporter,occurred_at:new Date().toISOString(),incident_type:d.incidentType,severity:d.severity,description:d.description,
      affected_items:[{order_item_id:d.itemId,severity:d.severity}]};
    if(d.estCost)body.estimated_cost_paise=Math.round(Number(d.estCost)*100);
    const created=await api.post('/api/orders/'+S.id+'/damage-incidents',body);
    const incId=created.damage_incident.id;
    if(d.decision&&d.decision!=='pending'){
      const sts={operational_decision:d.decision};
      if(d.decision==='substitute_with_another_unit'){sts.substitution={original_order_item_id:d.itemId,replacement_product_id:d.replProduct||undefined,substitution_type:'same_product_swap',timing:'rush_mid_rental'};}
      try{await api.post('/api/damage-incidents/'+incId+'/save-the-shoot',sts);}catch(e){}
    }
    if(d.liability||d.resolution!=='pending'){
      try{await api.post('/api/damage-incidents/'+incId+'/financial-resolution',{customer_liability:d.liability||'pending_investigation',financial_resolution:d.resolution,deposit_action:d.deposit,final_cost_paise:d.finalCost?Math.round(Number(d.finalCost)*100):undefined});}catch(e){}
    }
    toast('Damage incident '+created.damage_incident.incident_number+' created','ok');mclose();await load();
  }catch(err){M.busy=false;showModalError(err);}
}

// Delegated handlers for the 2.3 modals (field edits, step nav, sub-actions).
document.addEventListener('input',(e)=>{
  const t=e.target;if(!t)return;
  if(M.kind==='substitution'){const f=t.getAttribute&&t.getAttribute('data-f');if(f){M.data[f]=t.value;if(f==='fin'||f==='type'||f==='reason'||f==='replProduct')mrender(renderSubModal(S.items.find(i=>i.id===M.data.itemId)||{}));}}
  else if(M.kind==='damage'){const f=t.getAttribute&&t.getAttribute('data-f');if(f)M.data[f]=t.value;}
});
document.addEventListener('click',(e)=>{
  const t=e.target;if(!t.closest)return;
  if(t.closest('[data-mclose]')&&(M.kind==='substitution'||M.kind==='damage')){mclose();return;}
  if(t.closest('[data-msub-submit]')){submitSubstitution();return;}
  const stime=t.closest('[data-stime]');if(stime&&M.kind==='substitution'){M.data.timing=stime.getAttribute('data-stime');mrender(renderSubModal(S.items.find(i=>i.id===M.data.itemId)||{}));return;}
  const dstep=t.closest('[data-dstep]');if(dstep){M.data.step=Number(dstep.getAttribute('data-dstep'));mrender(renderDamageModal());return;}
  const dtype=t.closest('[data-dtype]');if(dtype){M.data.incidentType=dtype.getAttribute('data-dtype');mrender(renderDamageModal());return;}
  const dsev=t.closest('[data-dsev]');if(dsev){M.data.severity=dsev.getAttribute('data-dsev');mrender(renderDamageModal());return;}
  const ddec=t.closest('[data-ddec]');if(ddec){M.data.decision=ddec.getAttribute('data-ddec');mrender(renderDamageModal());return;}
  if(t.closest('[data-dsubmit]')){submitDamage();return;}
  if(t.closest('[data-dsave-shoot]')){damageViewAction('save-the-shoot');return;}
  if(t.closest('[data-dfin]')){damageViewAction('financial-resolution');return;}
  if(t.closest('[data-dapprove]')){damageViewAction('approve');return;}
  if(t.closest('[data-dclose-inc]')){damageViewAction('close');return;}
},true);
async function damageViewAction(kind){
  const d=M.data;const id=d.inc.id;
  try{
    if(kind==='save-the-shoot'){const b={operational_decision:d.decision};if(d.decision==='substitute_with_another_unit')b.substitution={original_order_item_id:(d.inc.order_item_id||rentalItems()[0]&&rentalItems()[0].id),replacement_product_id:d.replProduct||undefined,substitution_type:'same_product_swap',timing:'rush_mid_rental'};await api.post('/api/damage-incidents/'+id+'/save-the-shoot',b);toast('Decision applied','ok');}
    else if(kind==='financial-resolution'){await api.post('/api/damage-incidents/'+id+'/financial-resolution',{customer_liability:d.liability||'pending_investigation',financial_resolution:d.resolution,deposit_action:d.deposit,final_cost_paise:d.finalCost?Math.round(Number(d.finalCost)*100):undefined});toast('Resolution recorded','ok');}
    else if(kind==='approve'){await api.post('/api/damage-incidents/'+id+'/approve',{});toast('Approved','ok');}
    else if(kind==='close'){await api.post('/api/damage-incidents/'+id+'/close',{});toast('Incident closed','ok');}
    mclose();await load();
  }catch(err){toast('Action failed: '+((err.body&&err.body.error)||err.message),'err');}
}

// ------------------------------------------------------------------ boot
(async function(){
  await ensureAuth();
  const qs=new URLSearchParams(location.search);
  S.id=qs.get('id');
  if(!S.id){errorState(404);return;}
  skeleton();
  // Workspace policy (extension/cancellation thresholds) — best-effort.
  try{const ws=await api.get('/api/workspace');S.settings=(ws&&ws.settings)||{};}catch{}
  try{
    await load();
    // auto-expand issues / collapse empties post-load
    const o=S.order;const bal=Number(o.balance_paise!=null?o.balance_paise:(o.total_paise-o.paid_paise));
    S.open.payments=bal>0;
    S.open.deposits=(o.deposit_status&&o.deposit_status!=='none');
    S.open.events=relatedEvents().length>0||S.extensions.length>0||!!S.cancellation;
    render();
    // Deep link: approval decide mode (?approval_id=…&mode=decide)
    const apId=qs.get('approval_id');
    if(apId&&qs.get('mode')==='decide'){openDecideMode(apId);}
  }catch(err){
    errorState(err.status||500);
  }
})();
</script>
</body>
</html>
