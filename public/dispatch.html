<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#202058">
<title>Dispatch · RentalOS</title>
<link rel="preconnect" href="https://rentalos-api.vercel.app" crossorigin>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%234f46e5'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='%23ffffff'%3ED%3C/text%3E%3C/svg%3E">
<!--
  /dispatch.html — Slice 4 Session 2. Full 6-step structured dispatch/handover.
  Visual language: docs/design-substrate/sprint-1/dispatch_ui_dc.html (3-phase
  Prepare -> Handover -> Confirm). Sections: A Recipient · B Equipment checklist
  (serial + QR verify + condition) · C Photos (equipment + serial per policy) ·
  D OTP (real crypto send/verify/skip) · E Signature (draw/paper/skip) ·
  Phase 3 Confirm (atomic commit + customer notification).
  Rail + canonical top-bar via /_lib/shell.js (renderShell('orders', {topbar:true})).
-->
<style>
  :root{
    --page:#efece6; --card:#fff; --ink:#202058; --head:#26235a; --line:#e7e4de; --line2:#f2f0eb;
    --muted:#6b7280; --muted2:#9ca3af; --field:#faf9f6; --rail:#faf9f7; --disp:'Space Grotesk',system-ui,sans-serif;
    --body:'Manrope',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
    --indigo:#4f46e5; --indigo-hover:#4338ca; --indigo-soft:#eef2ff; --indigo-border:#c7d2fe;
    --amber:#d97706; --amber-soft:#fffbeb; --amber-border:#fcd9a4; --green:#059669; --green-soft:#ecfdf5; --green-border:#a7f3d0;
    --danger:#dc2626; --danger-soft:#fef2f2; --danger-border:#fbcaca;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--page);font-family:var(--body);color:var(--ink);-webkit-font-smoothing:antialiased}
  a{color:var(--indigo);text-decoration:none}
  .shell{display:flex;min-height:100vh}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}

  /* progress header */
  .phasebar{background:#fff;border-bottom:1px solid var(--line);padding:18px 26px 20px;position:sticky;top:60px;z-index:30;box-shadow:0 4px 14px rgba(32,32,88,.03)}
  .phasebar-top{display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:999px;background:var(--indigo-soft);border:1px solid var(--indigo-border)}
  .pill .d{width:7px;height:7px;border-radius:50%;background:var(--indigo);box-shadow:0 0 0 3px rgba(79,70,229,.18)}
  .pill span{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.11em;color:var(--indigo)}
  .cust{margin-top:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:13.5px;color:#4b4b63}
  .cust .name{font-family:var(--disp);font-weight:600;font-size:16px;color:var(--ink)}
  .phase-label{text-align:right;flex:none}
  .phase-label .k{font-family:var(--mono);font-size:11px;color:var(--muted2);margin-bottom:2px}
  .phase-label .v{font-family:var(--disp);font-size:22px;font-weight:600;color:var(--ink);letter-spacing:-.01em}
  .phases{margin-top:18px;display:flex;align-items:center}
  .phase{display:flex;flex-direction:column;align-items:center;gap:8px;flex:none;width:120px}
  .phase .node{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:15px}
  .phase.cur .node{width:40px;height:40px;background:var(--indigo);color:#fff}
  .phase.done .node{background:var(--green);color:#fff}
  .phase.up .node{background:#fff;border:2px solid #d7d3ca;color:#b6b1a6}
  .phase .n{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.1em}
  .phase .l{font-family:var(--disp);font-size:13px;font-weight:600;white-space:nowrap}
  .phase.cur .n{color:var(--indigo)} .phase.cur .l{color:var(--ink)}
  .phase.done .n,.phase.done .l{color:var(--green)}
  .phase.up .n,.phase.up .l{color:var(--muted2)}
  .conn{flex:1;height:3px;border-radius:2px;margin:0 4px 34px;background:#e0dccf}
  .conn.done{background:var(--green-border)}

  /* body */
  .body{flex:1;padding:24px 26px 120px;max-width:820px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:16px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px 22px}
  .card.active{border:1.5px solid var(--indigo-border);box-shadow:0 0 0 4px rgba(79,70,229,.05)}
  .card.locked{opacity:.55}
  .sec-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .sec-label{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2)}
  .req{color:var(--danger)}
  .opt{font-size:12px;font-weight:600;color:var(--muted2);background:var(--line2);padding:2px 8px;border-radius:10px}
  .badge-ok{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;background:var(--green-soft);border:1px solid var(--green-border);font-family:var(--mono);font-size:10px;font-weight:600;color:var(--green)}
  .badge-lock{margin-left:auto;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted2)}
  .choice{border-radius:11px;border:1.5px solid var(--line);background:#fff;padding:14px 15px;cursor:pointer;transition:border-color .12s,background .12s}
  .choice.on{border-color:var(--indigo);background:#f5f5ff}
  .choice-row{display:flex;align-items:center;gap:11px}
  .radio{width:19px;height:19px;flex:none;border-radius:50%;border:2px solid #cfcbc2;display:flex;align-items:center;justify-content:center}
  .choice.on .radio{border-color:var(--indigo)}
  .radio .dot{width:8px;height:8px;border-radius:50%;background:var(--indigo);display:none}
  .choice.on .radio .dot{display:block}
  .choice .t{font-size:14px;font-weight:600;color:var(--ink)}
  .choice .s{font-size:13px;color:var(--muted)}
  .delegate{margin-top:14px;margin-left:30px;display:flex;flex-direction:column;gap:13px}
  .frow{display:flex;gap:12px;flex-wrap:wrap}
  .field{flex:1;min-width:200px}
  .field .lbl{font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:6px}
  input,select,textarea{width:100%;height:40px;padding:0 13px;border:1px solid #d9d6cf;border-radius:9px;font-family:var(--body);font-size:13.5px;color:var(--head);background:#fff;outline:none}
  textarea{height:auto;min-height:64px;padding:11px 13px;resize:vertical;line-height:1.5}
  input:focus,select:focus,textarea:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(79,70,229,.12)}
  .mono{font-family:var(--mono)}
  .drop{height:74px;border-radius:10px;border:1.5px dashed #cfcbc2;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted2);cursor:pointer;background:var(--field);font-size:12px;font-weight:600}
  .drop.has{border-style:solid;border-color:var(--green-border);background:var(--green-soft);color:var(--green)}
  .warn{display:flex;gap:10px;padding:12px 14px;border-radius:10px;background:var(--amber-soft);border:1px solid var(--amber-border);font-size:12.5px;color:#92400e;line-height:1.5}
  .err-banner{display:flex;gap:10px;padding:12px 14px;border-radius:10px;background:var(--danger-soft);border:1px solid var(--danger-border);font-size:12.5px;color:#991b1b;line-height:1.5}
  .info-banner{display:flex;align-items:center;gap:9px;padding:11px 13px;border-radius:10px;background:var(--indigo-soft);border:1px solid var(--indigo-border);font-size:13px;color:#3730a3;font-weight:600}
  .done{display:flex;align-items:center;gap:8px;color:var(--green);font-size:12.5px;font-weight:600}

  /* checklist */
  .item-row{border:1px solid var(--line);border-radius:12px;padding:14px 15px;margin-bottom:12px}
  .item-row.ok{border-color:var(--green-border);background:var(--green-soft)}
  .item-name{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .item-name .qty{font-size:11px;color:var(--muted);font-weight:500}

  /* photos */
  .photo-item{margin-bottom:16px}
  .photo-item:last-child{margin-bottom:0}
  .photo-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .photo-head .nm{font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--ink)}
  .photo-head .cnt{margin-left:auto;font-family:var(--mono);font-size:11px}
  .slots{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .slot{aspect-ratio:4/3;border-radius:11px;border:1.5px dashed #cfcbc2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;color:var(--muted2);cursor:pointer;background:var(--field);font-size:11px;font-weight:600;position:relative;overflow:hidden}
  .slot.filled{border-style:solid;border-color:var(--green-border);cursor:default}
  .slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .slot .cap{position:absolute;bottom:0;left:0;right:0;padding:4px 8px;background:linear-gradient(transparent,rgba(0,0,0,.55));font-family:var(--mono);font-size:9px;color:#fff;display:flex;justify-content:space-between;align-items:center}
  .slot .retake{background:rgba(255,255,255,.9);border:none;border-radius:6px;color:var(--danger);font-size:9px;font-weight:700;padding:2px 6px;cursor:pointer}

  /* OTP boxes */
  .otp-boxes{display:flex;gap:9px;margin:12px 0}
  .otp-boxes input{width:48px;height:56px;text-align:center;border:1.5px solid #d9d6cf;border-radius:11px;font-family:var(--mono);font-size:22px;font-weight:600;color:var(--ink);padding:0}
  .linkbtn{background:none;border:none;font-family:var(--body);font-size:12.5px;font-weight:600;color:var(--indigo);cursor:pointer;padding:0}
  .linkbtn.muted{color:var(--muted);text-decoration:underline}

  /* signature */
  .sigtabs{display:flex;gap:8px;margin-bottom:12px}
  .sigtab{padding:7px 14px;border-radius:9px;border:1px solid var(--line);background:#fff;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer}
  .sigtab.on{border-color:var(--indigo);background:var(--indigo-soft);color:var(--indigo)}
  .sigwrap{position:relative;border-radius:12px;border:1.5px solid var(--line);background:var(--field);overflow:hidden}
  #sigcanvas{display:block;width:100%;height:170px;cursor:crosshair;touch-action:none}
  .sigline{position:absolute;left:22px;right:22px;bottom:44px;height:1px;background:#dcd7cc;pointer-events:none}
  .sighint{position:absolute;left:0;right:0;bottom:14px;text-align:center;font-size:12.5px;color:#b6b1a6;pointer-events:none}

  /* confirm summary */
  .sumrow{display:flex;padding:8px 0}
  .sumrow .k{width:130px;flex:none;font-size:12px;color:var(--muted2);font-weight:600}
  .sumrow .v{font-size:12.5px;color:var(--head)}
  .divider{height:1px;background:var(--line2);margin:6px 0}

  /* footer */
  .footer{position:sticky;bottom:0;z-index:20;background:#fbfaf7;border-top:1px solid #e7e1d6;padding:15px 26px;display:flex;align-items:center;gap:16px;box-shadow:0 -4px 16px rgba(32,32,88,.05)}
  .footer .hint{font-size:12px;color:var(--muted)}
  .btn{border:none;cursor:pointer;font-family:var(--body);font-weight:700;font-size:14px;padding:12px 22px;border-radius:10px}
  .btn.primary{background:var(--indigo);color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.28)}
  .btn.primary:hover{background:var(--indigo-hover)}
  .btn.primary:disabled{background:#e5e1d8;color:#a8a496;cursor:not-allowed;box-shadow:none}
  .btn.ghost{background:#fff;color:var(--muted);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--ink);color:var(--ink)}
  .btn.small{padding:9px 15px;font-size:12.5px}
  .loading{padding:60px;text-align:center;color:var(--muted2);font-family:var(--mono);font-size:13px}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--head);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;box-shadow:0 8px 24px rgba(32,32,88,.24);z-index:200;opacity:0;transition:opacity .2s}
  .toast.show{opacity:1}
  .toast.ok{background:var(--green)} .toast.err{background:var(--danger)}

  /* modal */
  .modal-back{position:fixed;inset:0;background:rgba(32,32,88,.32);display:flex;align-items:center;justify-content:center;z-index:150;padding:20px}
  .modal{background:#fff;border-radius:14px;max-width:440px;width:100%;padding:22px 24px;box-shadow:0 20px 60px rgba(32,32,88,.3)}
  .modal h3{font-family:var(--disp);font-size:17px;margin:0 0 10px}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
</style>
</head>
<body>
<!-- Rail + canonical top-bar injected by /_lib/shell.js (renderShell('orders', {topbar:true, breadcrumb})). -->
<div class="shell">
  <main class="main">
    <div class="phasebar" id="phasebar" style="display:none"></div>
    <div class="body" id="body"><div class="loading">Loading dispatch…</div></div>
    <div class="footer" id="footer" style="display:none">
      <a class="btn ghost" id="back" href="#">‹ Back to Order</a>
      <span class="hint" id="foot-hint"></span>
      <div style="margin-left:auto"></div>
      <button class="btn primary" id="advance" disabled>Continue to Confirm ›</button>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>
<div id="modal-root"></div>

<script type="module">
import { api, ensureAuth } from '/_lib/api.js';
import { renderShell } from '/_lib/shell.js?v=6';

const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
const $ = (id) => document.getElementById(id);
function toast(msg, kind){ const t=$('toast'); t.textContent=msg; t.className='toast show'+(kind?' '+kind:''); setTimeout(()=>{t.className='toast'+(kind?' '+kind:'');},2800); }

renderShell('orders', { topbar: true, breadcrumb: '<a href="/orders.html" style="color:inherit;text-decoration:none">Orders</a> &rsaquo; Dispatch' });

const S = {
  id:null, d:null, policy:null, items:[], otp:null, sig:null,
  phase:2, pickup:'customer', idProofUrl:null,
  // section D transient
  otpState:'idle', otpError:null, otpAttempts:0,
  // section E transient
  sigMode:'draw', paperUrl:null,
};

const CONDITIONS = [['pristine','Pristine'],['good','Good'],['minor_wear','Minor wear'],['damage_flagged','Damage flagged']];
const REL = [['assistant','Assistant'],['driver','Driver'],['family','Family'],['colleague','Colleague'],['other','Other']];
const SKIP_REASONS = [['customer_offline','Customer phone off / unreachable'],['provider_down','Provider unavailable'],['verbal_confirmation','Verbal confirmation at counter'],['other','Other']];

// ---------- completion helpers ----------
function needPhotos(){ const t=(S.policy&&S.policy.photos_required_per_item_type)||{equipment:1,serial:1}; return { eq:Number(t.equipment||0), ser:Number(t.serial||0) }; }
function aDone(){ return S.d && S.d.status !== 'prepare'; }
function bDone(){ return S.items.length>0 && S.items.every(it=>it.dispatch_notes && it.condition_notes); }
function cDone(){ const n=needPhotos(); return S.items.length>0 && S.items.every(it=>it.equipment_photos>=n.eq && it.serial_photos>=n.ser); }
function dDone(){ return !!(S.otp && (S.otp.verified || S.otp.skipped)); }
function eDone(){ return !!(S.sig && (S.sig.signature_url || S.sig.skipped)); }
function allDone(){ return aDone()&&bDone()&&cDone()&&dDone()&&eDone(); }
function sectionState(done, unlockedWhen){ if(done) return 'done'; if(!unlockedWhen) return 'locked'; return 'active'; }

// ---------- image compression (reuse inventory pattern: max 1280px / JPEG .8) ----------
function compressImage(file){
  return new Promise((resolve,reject)=>{
    const img=new Image(); const rd=new FileReader();
    rd.onload=()=>{ img.onload=()=>{
      const max=1280; let{width:w,height:h}=img;
      if(w>max||h>max){ const r=Math.min(max/w,max/h); w=Math.round(w*r); h=Math.round(h*r); }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      resolve(cv.toDataURL('image/jpeg',0.8));
    }; img.onerror=reject; img.src=rd.result; };
    rd.onerror=reject; rd.readAsDataURL(file);
  });
}

// ---------- phasebar ----------
function renderPhasebar(){
  const d=S.d;
  $('phasebar').style.display='block';
  const states = S.phase===3 ? ['done','done','cur'] : [ aDone()&&bDone()&&cDone()&&dDone()&&eDone()?'done':'done', 'cur', 'up' ];
  const labels=['Prepare','Handover','Confirm'];
  const st = S.phase===3 ? ['done','done','cur'] : ['done','cur','up'];
  const nodes = labels.map((label,i)=>{
    const cls=st[i]; const num = cls==='done' ? '✓' : (i+1);
    const conn = i<2 ? `<div class="conn ${st[i]==='done'?'done':''}"></div>` : '';
    return `<div class="phase ${cls}"><div class="node">${num}</div>`
      + `<div style="text-align:center;line-height:1.2"><div class="n">PHASE ${i+1}</div><div class="l">${label}</div></div></div>${conn}`;
  }).join('');
  const phaseName = S.phase===3?'Confirm':'Handover';
  $('phasebar').innerHTML =
    `<div class="phasebar-top">
       <div style="flex:1;min-width:0">
         <span class="pill"><span class="d"></span><span>DISPATCH &mdash; ORDER #${esc(d.order_number)}</span></span>
         <div class="cust"><span class="name">${esc(d.customer_name||'Customer')}</span>
           <span style="color:#cfc9bd">&middot;</span><span class="mono" style="font-size:12px">${esc(d.dispatch_number||'')}</span></div>
       </div>
       <div class="phase-label"><div class="k">PHASE <span style="color:var(--indigo);font-weight:700">${S.phase} of 3</span></div><div class="v">${phaseName}</div></div>
     </div>
     <div class="phases">${nodes}</div>`;
}

// ---------- Section A: recipient ----------
function sectionA(){
  const d=S.d, del=S.pickup==='delegate', done=aDone();
  const idRequired=!!(S.policy&&S.policy.delegate_requires_id_proof);
  const cls = done ? 'card' : 'card active';
  if(done && S.pickup===d.recipient_type){
    return `<div class="${cls}" id="sec-a"><div class="sec-head"><span class="sec-label">A &middot; Who is picking up?</span><span class="badge-ok">✓ RECORDED</span></div>
      <div style="font-size:13.5px;color:var(--head)">${d.recipient_type==='delegate'?('Delegate — '+esc(d.delegate_name||'')+' ('+esc(d.delegate_phone||'')+')'):('Customer — '+esc(d.customer_name||''))}
      <button class="linkbtn" data-edit-a style="margin-left:10px">edit</button></div></div>`;
  }
  return `<div class="${cls}" id="sec-a">
    <div class="sec-head"><span class="sec-label">A &middot; Who is picking up? <span class="req">*</span></span></div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="choice ${S.pickup==='customer'?'on':''}" data-pick="customer">
        <div class="choice-row"><span class="radio"><span class="dot"></span></span><span class="t">Customer</span><span class="s">(${esc(d.customer_name||'on file')})</span></div></div>
      <div class="choice ${del?'on':''}" data-pick="delegate">
        <div class="choice-row"><span class="radio"><span class="dot"></span></span><span class="t">Delegate</span><span class="s">someone on the customer's behalf</span></div>
        ${del?`<div class="delegate">
          <div class="frow">
            <div class="field"><div class="lbl">Delegate name <span class="req">*</span></div><input id="del-name" placeholder="Full name" value="${esc(d.delegate_name||'')}"></div>
            <div class="field"><div class="lbl">Delegate phone <span class="req">*</span></div><input id="del-phone" class="mono" placeholder="+91" value="${esc(d.delegate_phone||'')}"></div>
          </div>
          <div class="frow">
            <div class="field"><div class="lbl">Relationship</div><select id="del-rel">${REL.map(([v,l])=>`<option value="${v}" ${d.delegate_relationship===v?'selected':''}>${l}</option>`).join('')}</select></div>
            <div class="field"><div class="lbl">ID proof ${idRequired?'<span class="req">*</span>':'<span class="opt">optional</span>'}</div>
              <label class="drop ${S.idProofUrl?'has':''}" id="id-drop">${S.idProofUrl?'✓ ID captured':'Upload / capture'}<input type="file" accept="image/*" id="id-file" style="display:none"></label></div>
          </div>
          <div class="warn">Delegate pickup requires customer approval. The OTP is sent to the <strong>customer's</strong> phone, not the delegate's.</div>
        </div>`:''}
      </div>
    </div>
    <div style="margin-top:14px"><button class="btn primary small" data-save-a>Save recipient</button></div>
  </div>`;
}

// ---------- Section B: equipment checklist ----------
function sectionB(){
  const unlocked=aDone(); const done=bDone();
  const cls = done?'card':(unlocked?'card active':'card locked');
  const head=`<div class="sec-head"><span class="sec-label">B &middot; Equipment checklist <span class="req">*</span></span>${done?'<span class="badge-ok">✓ CHECKED</span>':''}${!unlocked?'<span class="badge-lock">🔒 complete A first</span>':''}</div>`;
  if(!unlocked) return `<div class="${cls}" id="sec-b">${head}</div>`;
  const rows=S.items.map(it=>{
    const ok=it.dispatch_notes&&it.condition_notes;
    return `<div class="item-row ${ok?'ok':''}" data-item="${esc(it.id)}">
      <div class="item-name">${esc(it.description)}<span class="qty">× ${esc(it.quantity)}</span>${ok?'<span class="done" style="margin-left:auto">✓ checked</span>':''}</div>
      <div class="frow">
        <div class="field"><div class="lbl">Serial / QR scan</div>
          <input class="mono b-serial" placeholder="Scan or type serial" value="${esc(it.dispatch_notes||'')}"></div>
        <div class="field"><div class="lbl">Condition</div>
          <select class="b-cond"><option value="">Select…</option>${CONDITIONS.map(([v,l])=>`<option value="${v}" ${it.condition_notes===v?'selected':''}>${l}</option>`).join('')}</select></div>
        <div class="field" style="flex:0 0 auto;display:flex;align-items:flex-end"><button class="btn primary small b-save">Save</button></div>
      </div>
    </div>`;
  }).join('');
  return `<div class="${cls}" id="sec-b">${head}
    <div style="font-size:12.5px;color:var(--muted);margin-bottom:14px">Scan each unit's serial (USB scanner types into the field) — it's verified against the expected unit. Then record condition.</div>
    ${rows}</div>`;
}

// ---------- Section C: photos ----------
function sectionC(){
  const unlocked=aDone()&&bDone(); const done=cDone(); const n=needPhotos();
  const cls=done?'card':(unlocked?'card active':'card locked');
  const head=`<div class="sec-head"><span class="sec-label">C &middot; Handover condition photos</span>${done?'<span class="badge-ok">✓ CAPTURED</span>':''}${!unlocked?'<span class="badge-lock">🔒 complete B first</span>':''}</div>`;
  if(!unlocked) return `<div class="${cls}" id="sec-c">${head}</div>`;
  const items=S.items.map(it=>{
    const slots=[['equipment',n.eq,it.equipment_photos],['serial',n.ser,it.serial_photos]]
      .filter(([,need])=>need>0)
      .map(([type,need,have])=>{
        const filled=have>=need;
        return `<label class="slot ${filled?'filled':''}" data-photo-item="${esc(it.id)}" data-photo-type="${type}">

      <div class="photo-head"><span class="nm">${esc(it.description)}</span><span class="cnt" style="color:${total?'var(--green)':'var(--muted)'}">${total?'complete':'pending'}</span></div>

  return `<div class="${cls}" id="sec-c">${head}
    <div style="font-size:12.5px;color:var(--muted);margin-bottom:14px">Capture final condition with the customer witnessing — ${n.eq} equipment + ${n.ser} serial photo per item. Opens the device camera on mobile.</div>

}

  const head=`<div class="sec-head"><span class="sec-label">D &middot; OTP verification <span class="req">*</span></span>${done?(S.otp&&S.otp.skipped?'<span class="badge-ok" style="background:var(--amber-soft);border-color:var(--amber-border);color:var(--amber)">SKIPPED</span>':'<span class="badge-ok">✓ VERIFIED</span>'):''}${!unlocked?'<span class="badge-lock">🔒 complete C first</span>':''}</div>`;
  if(!unlocked) return `<div class="${cls}" id="sec-d">${head}</div>`;
  if(done){
    return `<div class="${cls}" id="sec-d">${head}<div style="font-size:13px;color:var(--head)">${S.otp.skipped?('Skipped — '+esc(S.otp.skip_reason||'reason recorded')):('Verified · code confirmed by customer'+(S.otp.sent_to?(' ('+esc(S.otp.sent_to)+')'):''))}</div></div>`;

      <div class="frow">
        <div class="field"><select id="otp-skip-reason">${SKIP_REASONS.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select></div>

    mid=`<button class="btn primary small" id="otp-send"><span>📲</span> Send OTP via WhatsApp</button>${skipForm}`;
  } else if(S.otpState==='sent'){
    mid=`<div class="info-banner" style="margin-bottom:14px">📲 OTP sent to the customer's phone. Ask them to read out the 6-digit code.</div>
      <div class="otp-boxes">${[0,1,2,3,4,5].map(i=>`<input class="otp-box" data-i="${i}" inputmode="numeric" maxlength="1">`).join('')}</div>

// ---------- Section E: signature ----------
function sectionE(){
  const unlocked=aDone()&&bDone()&&cDone()&&dDone(); const done=eDone();
  const cls=done?'card':(unlocked?'card active':'card locked');
  const head=`<div class="sec-head"><span class="sec-label">E &middot; Customer signature <span class="req">*</span></span>${done?(S.sig&&S.sig.skipped?'<span class="badge-ok" style="background:var(--amber-soft);border-color:var(--amber-border);color:var(--amber)">SKIPPED</span>':'<span class="badge-ok">✓ CAPTURED</span>'):''}${!unlocked?'<span class="badge-lock">🔒 complete D first</span>':''}</div>`;
  if(!unlocked) return `<div class="${cls}" id="sec-e">${head}</div>`;
  if(done){
    return `<div class="${cls}" id="sec-e">${head}<div style="font-size:13px;color:var(--head)">${S.sig.skipped?('Skipped — '+esc(S.sig.skip_reason||'reason recorded')):'Signature captured · pickup acknowledged'}</div></div>`;
  }
  const body = S.sigMode==='draw'
    ? `<div class="sigwrap"><canvas id="sigcanvas" width="760" height="170"></canvas><div class="sigline"></div><div class="sighint">Sign here to acknowledge pickup</div></div>

         <button class="btn ghost small" id="sig-clear">Clear</button>

       <div style="margin-top:12px"><button class="btn primary small" id="paper-save" ${S.paperUrl?'':'disabled'}>Save signed slip</button></div>`;

      <div class="sigtab ${S.sigMode==='draw'?'on':''}" data-sigmode="draw">Digital draw</div>

  const otpTxt = S.otp ? (S.otp.skipped?('Skipped — '+esc(S.otp.skip_reason||'')):'Verified') : '—';
  const sigTxt = S.sig ? (S.sig.skipped?('Skipped — '+esc(S.sig.skip_reason||'')):'Captured') : '—';
  const recip = d.recipient_type==='delegate' ? ('Delegate · '+esc(d.delegate_name||'')) : ('Customer · '+esc(d.customer_name||''));
  $('body').innerHTML = `
    <div class="card">
      <div class="sec-head"><span class="sec-label">Dispatch summary</span><span class="mono" style="margin-left:auto;font-size:11px;color:var(--muted)">${esc(d.dispatch_number||'')}</span></div>
      <div class="sumrow"><span class="k">Recipient</span><span class="v">${recip}</span></div><div class="divider"></div>
      ${items}<div class="divider"></div>
      <div class="sumrow"><span class="k">OTP</span><span class="v">${otpTxt}</span></div><div class="divider"></div>

    </div>
    <div class="card">
      <div class="sec-head"><span class="sec-label">On confirm</span></div>
      <div style="font-size:13px;color:var(--muted);line-height:1.6">Marks the dispatch complete, moves each item to <strong>dispatched</strong>, assigns physical units (status → out), advances the order to <strong>dispatched</strong>, and notifies the customer. This cannot be undone from here.</div>
    </div>`;
  $('foot-hint').textContent='';
  const btn=$('advance'); btn.textContent='✓ Confirm Dispatch'; btn.disabled=false;

// ---------- render ----------
function render(){
  renderPhasebar();
  if(S.phase===3){ renderConfirm(); return; }
  $('back').textContent='‹ Back to Order'; $('back').onclick=null; $('back').href='/order-360.html?id='+esc(S.d.order_id);
  $('body').innerHTML = sectionA()+sectionB()+sectionC()+sectionD()+sectionE();
  wireSig();
  const done=allDone();
  const btn=$('advance'); btn.textContent='Continue to Confirm ›'; btn.disabled=!done;
  const next = !aDone()?'recipient':!bDone()?'equipment checklist':!cDone()?'condition photos':!dDone()?'OTP':!eDone()?'signature':'';
  $('foot-hint').textContent = done ? 'All handover steps complete.' : ('Next: '+next);
}

// ---------- reload from server (rehydrate) ----------
async function reload(){
  const res=await api.get('/api/dispatches/'+S.id);
  S.d=res.dispatch; S.policy=res.policy; S.items=res.items||[]; S.otp=res.otp_state; S.sig=res.signature_state;
  if(S.pickup==null) S.pickup=S.d.recipient_type||'customer';
}

// ---------- section A save ----------
async function saveRecipient(){
  const payload={ recipient_type:S.pickup };
  if(S.pickup==='delegate'){
    payload.delegate_name=($('del-name')||{}).value||''; payload.delegate_phone=($('del-phone')||{}).value||'';
    payload.delegate_relationship=($('del-rel')||{}).value||'other';
    if(S.idProofUrl)payload.delegate_id_proof_url=S.idProofUrl;
    if(!payload.delegate_name||!payload.delegate_phone){ toast('Delegate name and phone are required','err'); return; }
  }
  try{ const r=await api.post('/api/dispatches/'+S.id+'/recipient',payload); S.d={...S.d,...r.dispatch}; toast('Recipient recorded','ok'); await reload(); render(); }
  catch(err){ toast('Could not save: '+errMsg(err),'err'); }
}

// ---------- section B save ----------
async function saveItem(row){
  const id=row.getAttribute('data-item');
  const serial=(row.querySelector('.b-serial')||{}).value||'';
  const cond=(row.querySelector('.b-cond')||{}).value||'';
  if(!serial.trim()){ toast('Enter or scan the serial','err'); return; }
  if(!cond){ toast('Select a condition','err'); return; }
  try{
    let sres;
    try{ sres=await api.post('/api/dispatches/'+S.id+'/items/'+id+'/serial',{captured_serial:serial}); }
    catch(err){
      if(err.status===409 && err.body && err.body.status==='mismatch'){
        const proceed=await confirmModal('Serial mismatch', `No available unit matches <strong>${esc(serial)}</strong>.<br>Expected: <span class="mono">${(err.body.expected_serials||[]).map(esc).join(', ')||'—'}</span><br><br>Continue anyway (override)?`, 'Override & continue');
        if(!proceed) return;
        sres=await api.post('/api/dispatches/'+S.id+'/items/'+id+'/serial',{captured_serial:serial,override:true});
      } else throw err;
    }
    await api.post('/api/dispatches/'+S.id+'/items/'+id+'/condition',{condition:cond});
    toast('Item recorded','ok'); await reload(); render();
  }catch(err){ toast('Could not save item: '+errMsg(err),'err'); }
}

// ---------- section C photo ----------
async function uploadPhoto(label, file){
  const itemId=label.getAttribute('data-photo-item'); const type=label.getAttribute('data-photo-type');
  try{
    label.style.opacity='.5';
    const b64=await compressImage(file);
    await api.post('/api/dispatches/'+S.id+'/photos',{ order_item_id:itemId, photo_type:type, photo_base64:b64, content_type:'image/jpeg' });
    toast('Photo captured','ok'); await reload(); render();
  }catch(err){ toast('Upload failed: '+errMsg(err),'err'); label.style.opacity='1'; }
}

// ---------- section D OTP ----------
async function sendOtp(){
  try{ const r=await api.post('/api/dispatches/'+S.id+'/otp',{channel:'whatsapp'});
    if(r.status==='sent'){ S.otpState='sent'; S.otpError=null; toast('OTP sent','ok'); }
    else if(r.status==='provider_not_configured'){ S.otpState='provider_not_configured'; }
    else if(r.status==='send_failed'){ S.otpState='send_failed'; S.otpError=r.error||'send failed'; }
    render();
  }catch(err){ toast('Could not send OTP: '+errMsg(err),'err'); }
}
async function verifyOtp(){
  const code=[...document.querySelectorAll('.otp-box')].map(b=>b.value).join('');
  if(code.length!==6){ S.otpError='Enter all 6 digits'; render(); return; }
  try{ await api.post('/api/dispatches/'+S.id+'/otp/verify',{code}); toast('OTP verified','ok'); await reload(); render(); }
  catch(err){ S.otpAttempts++; S.otpError=(err.body&&err.body.error&&err.body.error.message)||'Incorrect code';
    if(S.otpAttempts>=3){ S.otpError='3 failed attempts — resend or skip with a reason.'; } render(); }
}
async function skipOtp(){
  const reason=($('otp-skip-reason')||{}).value||'other'; const notes=($('otp-skip-notes')||{}).value||'';
  try{ const r=await api.post('/api/dispatches/'+S.id+'/otp/skip',{skip_reason:reason,skip_reason_notes:notes});
    toast(r.requires_approval?'Skipped — flagged for approval':'OTP skipped', r.requires_approval?'':'ok'); await reload(); render();
  }catch(err){ toast('Could not skip: '+errMsg(err),'err'); }
}

// ---------- section E signature ----------
let _sig={ctx:null,drawing:false,dirty:false};
function wireSig(){
  const cv=$('sigcanvas'); if(!cv||cv.__wired)return; cv.__wired=true;
  const ctx=cv.getContext('2d'); ctx.strokeStyle='#202058'; ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.lineJoin='round';
  _sig.ctx=ctx;
  const pos=(e)=>{ const r=cv.getBoundingClientRect(); const p=e.touches?e.touches[0]:e; return {x:(p.clientX-r.left)*(cv.width/r.width),y:(p.clientY-r.top)*(cv.height/r.height)}; };
  const start=(e)=>{ e.preventDefault(); _sig.drawing=true; _sig.dirty=true; const {x,y}=pos(e); ctx.beginPath(); ctx.moveTo(x,y); };
  const move=(e)=>{ if(!_sig.drawing)return; e.preventDefault(); const {x,y}=pos(e); ctx.lineTo(x,y); ctx.stroke(); };
  const end=()=>{ _sig.drawing=false; };
  cv.addEventListener('mousedown',start); cv.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
  cv.addEventListener('touchstart',start,{passive:false}); cv.addEventListener('touchmove',move,{passive:false}); cv.addEventListener('touchend',end);
}
async function saveSig(){
  const cv=$('sigcanvas'); if(!cv||!_sig.dirty){ toast('Please sign first','err'); return; }
  try{ await api.post('/api/dispatches/'+S.id+'/signature',{signature_type:'digital_draw',signature_base64:cv.toDataURL('image/png'),content_type:'image/png'});
    toast('Signature captured','ok'); _sig.dirty=false; await reload(); render();
  }catch(err){ toast('Could not save signature: '+errMsg(err),'err'); }
}
async function savePaper(){
  if(!S.paperUrl){ toast('Capture the signed slip first','err'); return; }
  try{ await api.post('/api/dispatches/'+S.id+'/signature',{signature_type:'paper_photo',signature_base64:S.paperUrl,content_type:'image/jpeg'});
    toast('Signed slip saved','ok'); S.paperUrl=null; await reload(); render();
  }catch(err){ toast('Could not save: '+errMsg(err),'err'); }
}
async function skipSig(){
  const reason=($('sig-skip-reason')||{}).value||'';
  if(S.policy&&S.policy.signature_skip_requires_reason&&!reason.trim()){ toast('A reason is required to skip','err'); return; }
  try{ await api.post('/api/dispatches/'+S.id+'/signature',{skipped:true,skip_reason:reason||null});
    toast('Signature skipped','ok'); await reload(); render();
  }catch(err){ toast('Could not skip: '+errMsg(err),'err'); }
}

// ---------- confirm / complete ----------
async function confirmDispatch(){
  const btn=$('advance'); btn.disabled=true; btn.textContent='Confirming…';
  try{
    const r=await api.post('/api/dispatches/'+S.id+'/complete',{ item_ids:S.items.map(i=>i.id) });
    const sent=r.notification_sent;
    const nMsg = sent ? 'Notification sent to customer.' : (r.notification_reason==='provider_not_configured'
      ? 'Notification skipped — provider not configured. Manually notify the customer.' : 'Notification not sent ('+esc(r.notification_reason||'')+').');
    sessionStale();
    toast('Dispatch '+(r.dispatch_number||'')+' completed', 'ok');
    // brief success screen with notification status, then navigate.
    $('body').innerHTML=`<div class="card" style="text-align:center;padding:40px">
      <div style="font-size:40px;margin-bottom:10px">✓</div>
      <div style="font-family:var(--disp);font-size:20px;font-weight:600;margin-bottom:8px">Dispatch ${esc(r.dispatch_number||'')} completed</div>
      <div style="font-size:13.5px;color:var(--muted);margin-bottom:16px">${esc(r.item_count)} item(s) · order now <strong>dispatched</strong></div>
      <div class="${sent?'info-banner':'warn'}" style="display:inline-flex;text-align:left">${sent?'✅ '+esc(nMsg):'⚠️ '+esc(nMsg)}</div>
      <div style="margin-top:22px"><a class="btn primary" href="/order-360.html?id=${esc(S.d.order_id)}">Back to order ›</a></div>
    </div>`;
    $('footer').style.display='none';
    setTimeout(()=>{ location.href='/order-360.html?id='+esc(S.d.order_id); }, 3200);
  }catch(err){
    btn.disabled=false; btn.textContent='✓ Confirm Dispatch';
    if(err.status===403 && err.body && err.body.error && err.body.error.reasons){
      toast('Not ready: '+err.body.error.reasons.map(r=>r.message).join('; '),'err');
    } else toast('Could not complete: '+errMsg(err),'err');
  }
}
function sessionStale(){ /* no-op hook; order-360 reloads fresh on navigation */ }

// ---------- helpers ----------
function errMsg(err){ return (err.body&&err.body.error&&(err.body.error.message||err.body.error))||err.message||'error'; }
function confirmModal(title, html, okLabel){
  return new Promise((resolve)=>{
    $('modal-root').innerHTML=`<div class="modal-back"><div class="modal"><h3>${esc(title)}</h3><div style="font-size:13.5px;color:var(--head);line-height:1.6">${html}</div>
      <div class="modal-actions"><button class="btn ghost small" id="m-cancel">Cancel</button><button class="btn primary small" id="m-ok">${esc(okLabel||'OK')}</button></div></div></div>`;
    const close=(v)=>{ $('modal-root').innerHTML=''; resolve(v); };
    $('m-cancel').onclick=()=>close(false); $('m-ok').onclick=()=>close(true);
  });
}

// ---------- delegated events ----------
function wire(){
  $('body').addEventListener('click', async (e)=>{
    const pick=e.target.closest('[data-pick]'); if(pick){ S.pickup=pick.getAttribute('data-pick'); render(); return; }
    if(e.target.closest('[data-save-a]')){ saveRecipient(); return; }
    if(e.target.closest('[data-edit-a]')){ S.d={...S.d,status:'prepare'}; render(); return; }
    const bsave=e.target.closest('.b-save'); if(bsave){ saveItem(bsave.closest('[data-item]')); return; }
    const sm=e.target.closest('[data-sigmode]'); if(sm){ S.sigMode=sm.getAttribute('data-sigmode'); render(); return; }
    if(e.target.id==='otp-send'||e.target.id==='otp-resend'){ sendOtp(); return; }
    if(e.target.id==='otp-verify'){ verifyOtp(); return; }
    if(e.target.id==='otp-skip-btn'){ skipOtp(); return; }
    if(e.target.id==='sig-clear'){ const cv=$('sigcanvas'); if(cv&&_sig.ctx){_sig.ctx.clearRect(0,0,cv.width,cv.height);_sig.dirty=false;} return; }
    if(e.target.id==='sig-save'){ saveSig(); return; }
    if(e.target.id==='paper-save'){ savePaper(); return; }
    if(e.target.id==='sig-skip-btn'){ skipSig(); return; }
  });
  $('body').addEventListener('change', async (e)=>{
    if(e.target.id==='id-file'){ const f=e.target.files&&e.target.files[0]; if(f){ S.idProofUrl=await compressImage(f); render(); } return; }
    if(e.target.classList&&e.target.classList.contains('c-file')){ const f=e.target.files&&e.target.files[0]; if(f) uploadPhoto(e.target.closest('.slot'), f); return; }
    if(e.target.id==='paper-file'){ const f=e.target.files&&e.target.files[0]; if(f){ S.paperUrl=await compressImage(f); render(); } return; }
  });
  // OTP box auto-advance
  $('body').addEventListener('input',(e)=>{
    if(e.target.classList&&e.target.classList.contains('otp-box')){
      e.target.value=e.target.value.replace(/\D/g,'').slice(0,1);
      const i=Number(e.target.getAttribute('data-i')); if(e.target.value&&i<5){ const nx=document.querySelector('.otp-box[data-i="'+(i+1)+'"]'); if(nx)nx.focus(); }
    }
  });
  $('advance').addEventListener('click',()=>{ if(S.phase===3){ confirmDispatch(); } else if(allDone()){ S.phase=3; render(); window.scrollTo(0,0); } });
}

(async function boot(){
  await ensureAuth();
  const qs=new URLSearchParams(location.search);
  S.id=qs.get('dispatch_id')||qs.get('id');
  if(!S.id){ $('body').innerHTML='<div class="loading">Missing dispatch_id.</div>'; return; }
  try{ await reload(); }
  catch(err){ $('body').innerHTML='<div class="loading">Dispatch not found.</div>'; return; }
  S.pickup=S.d.recipient_type||'customer';
  const crumb=document.querySelector('.topbar .tb-crumb');
  if(crumb)crumb.innerHTML='<a href="/orders.html" style="color:inherit;text-decoration:none">Orders</a> &rsaquo; '
    +'<a href="/order-360.html?id='+esc(S.d.order_id)+'" style="color:inherit;text-decoration:none">#'+esc(S.d.order_number)+'</a> &rsaquo; Dispatch';
  $('back').href='/order-360.html?id='+esc(S.d.order_id);
  $('footer').style.display='flex';
  render(); wire();
})();
</script>
</body>
</html>
