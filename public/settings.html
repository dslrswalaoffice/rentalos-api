    function daysUntil(iso) {
      const ms = new Date(iso).getTime() - Date.now();
      const d = Math.ceil(ms / 86400000);
      return d <= 0 ? 'today' : (d === 1 ? '1 day' : d + ' days');
    }

    async function loadMembers() {
      try {
        const res = await api.get('/api/members');
        state.members = res.members || [];
        // Sub-turn 12a: capture the permission editor context.
        state.teamCanManage = res.can_manage === true;
        state.teamIsOwner = res.is_owner === true;
        state.permRegistry = res.registry || {};
        state.permGroups = res.groups || [];
      }
      catch (err) { state.members = { error: err.body?.error || err.message || 'error' }; }
      if (state.tab === 'users') render();
    }
    async function loadInvites() {
      // Only owner/manager can list invites; others skip the call.
      if (!canEditMetadata()) { state.invites = []; return; }
      try { const res = await api.get('/api/invitations'); state.invites = res.invitations || []; }
      catch { state.invites = []; }
      if (state.tab === 'users') render();
    }

    function usersTab() {
      if (state.members === null) loadMembers();
      if (state.invites === null) loadInvites();
      // Sub-turn 12a: inviting/managing the team is team.manage (owner by default).
      const canInvite = state.teamCanManage === true;
      const myRole = state.data?.current_user?.role;

      // Members list
      let membersInner;
      if (state.members === null) {
        membersInner = '<div class="loading">Loading team…</div>';
      } else if (!Array.isArray(state.members)) {
        membersInner = `<p class="card-sub">Couldn't load members: ${escapeHtml(state.members?.error || 'error')}</p>`;
      } else {
        const rows = state.members.map(m => {
          const deact = m.status === 'deactivated';
          const statusPill = `<span class="role-pill" style="background:${deact ? 'var(--bad-soft)' : 'var(--ok-soft)'};color:${deact ? 'var(--bad-strong)' : 'var(--ok-strong)'};">${deact ? 'deactivated' : 'active'}</span>`;
          const editBtn = state.teamCanManage
            ? `<button class="btn ghost" data-edit-member="${escapeAttr(m.user_id)}">Manage</button>`
            : '';
          return `
          <tr${deact ? ' style="opacity:0.6;"' : ''}>
            <td><strong>${escapeHtml(m.name)}</strong>${m.is_self ? ' <span style="color:var(--muted);font-size:11px;">(you)</span>' : ''}</td>
            <td>${escapeHtml(m.email)}</td>
            <td><span class="role-pill role-${escapeAttr(m.role)}">${escapeHtml(m.role)}</span></td>
            <td>${statusPill}</td>
            <td style="text-align:right;">${editBtn}</td>
          </tr>`;
        }).join('');
        membersInner = `<div class="card" style="padding:0;overflow:hidden;">
          <table class="users">
            <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th></th></tr></thead>
            <tbody>${rows || '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:20px;">No members.</td></tr>'}</tbody>
          </table>
        </div>`;
      }

      // Sub-turn 12a: the "Edit team member" editor (owner/team.manage only).
      const editorCard = memberEditorHtml();

      // Invite form (owner/manager only) — role options depend on caller's role
      const roleOpts = (INVITE_ROLES_BY_ROLE[myRole] || [])
        .map(r => `<option value="${r}">${r.charAt(0).toUpperCase() + r.slice(1)}</option>`).join('');
      const inviteForm = !canInvite ? '' : `
        <div class="card" id="invite-form-card" hidden style="margin-top:14px;">
          <div class="section-h">Invite a team member</div>
          <div id="invite-error" class="notice" style="display:none;background:var(--bad-soft);color:var(--bad-strong);"></div>
          <div class="field"><label>Email</label>
            <input type="email" id="invite-email" placeholder="name@dslrswala.com" autocomplete="off"></div>
          <div class="field"><label>Role</label>
            <select id="invite-role">${roleOpts}</select></div>
          <div style="display:flex;gap:8px;margin-top:6px;">
            <button class="btn primary" id="invite-send">Send invite</button>
            <button class="btn ghost" id="invite-cancel">Cancel</button>
          </div>
        </div>`;

      // Accept-link banner (shown ONCE after a successful invite)
      const link = state.inviteLink;
      const linkBanner = !link ? '' : `
        <div class="card" style="margin-top:14px;border-color:var(--ok-solid);">
          <div class="section-h">Invitation created${link.email_sent ? '' : ' — email could not be sent'}</div>
          <p class="card-sub">${link.email_sent
            ? 'The invite was emailed. You can also copy the link below.'
            : 'The email failed to send. Copy this link and share it (e.g. WhatsApp) yourself.'}</p>
          <p class="card-sub"><strong>This link is shown once. Copy it now if you want to send it yourself.</strong></p>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="text" id="invite-link-value" readonly value="${escapeAttr(link.accept_url)}" style="flex:1;font-family:var(--font-mono);font-size:11px;">
            <button class="btn primary" id="invite-copy">Copy</button>
            <button class="btn ghost" id="invite-link-dismiss">Done</button>
          </div>
        </div>`;

      // Pending invitations — hidden entirely when empty
      const invites = Array.isArray(state.invites) ? state.invites : [];
      const pendingCard = invites.length === 0 ? '' : `
        <div class="card" id="pending-card" style="margin-top:14px;padding:0;overflow:hidden;">
          <div class="section-h" style="padding:14px 16px 0;">Pending invitations</div>
          <table class="users">
            <tbody>${invites.map(iv => `
              <tr>
                <td>${escapeHtml(iv.email)}</td>
                <td><span class="role-pill role-${escapeAttr(iv.role)}">${escapeHtml(iv.role)}</span></td>
                <td style="color:var(--muted);">expires in ${escapeHtml(daysUntil(iv.expires_at))}</td>
                <td style="text-align:right;"><button class="btn ghost" data-revoke="${escapeAttr(iv.id)}">Revoke</button></td>
              </tr>`).join('')}</tbody>
          </table>
        </div>`;

      return `
        <div class="card">
          <div class="section-h" style="display:flex;justify-content:space-between;align-items:center;">
            <span>Team members</span>
            ${canInvite ? `<button class="btn primary" id="invite-open">+ Invite member</button>` : ''}
          </div>
          <p class="card-sub">Everyone with access to this workspace.</p>
        </div>
        ${membersInner}
        ${editorCard}
        ${inviteForm}
        ${linkBanner}
        ${pendingCard}`;
    }

    // Sub-turn 12a: "Edit team member" — status, role preset, granular
    // permissions, make-owner. All actions are server-enforced regardless of UI.
    function memberEditorHtml() {
      const uid = state.editingMember;
      if (!uid || !Array.isArray(state.members)) return '';
      const m = state.members.find(x => x.user_id === uid);
      if (!m) return '';
      const isOwnerTarget = m.role === 'owner';
      const isSelf = m.is_self;
      const groups = state.permGroups || [];
      const registry = state.permRegistry || {};
      const perms = m.permissions || {};

      const permsBody = isOwnerTarget
        ? `<p class="card-sub" style="color:var(--muted);">Owners have full access. This cannot be changed.</p>`
        : groups.map(g => `
          <div style="margin-bottom:12px;">
            <div style="font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.04em;color:var(--muted);margin-bottom:6px;">${escapeHtml(g.label)}</div>
            ${g.keys.map(k => {
              const checked = perms[k] === true;
              return `<label style="display:flex;align-items:flex-start;gap:8px;padding:4px 0;cursor:${isSelf ? 'not-allowed' : 'pointer'};">
                <input type="checkbox" data-perm-key="${escapeAttr(k)}" ${checked ? 'checked' : ''} ${isSelf ? 'disabled' : ''} style="margin-top:3px;">
                <span><strong style="font-family:var(--font-mono);font-size:11px;">${escapeHtml(k)}</strong><br><span style="color:var(--muted);font-size:12px;">${escapeHtml(registry[k] || '')}</span></span>
              </label>`;
            }).join('')}
          </div>`).join('');

      const roleSwitch = (isOwnerTarget || isSelf) ? '' : `
        <div class="field" style="margin-top:8px;">
          <label>Role preset</label>
          <div style="display:flex;gap:8px;align-items:center;">
            <select id="member-role">
              <option value="manager" ${m.role === 'manager' ? 'selected' : ''}>Manager</option>
              <option value="staff" ${m.role === 'staff' ? 'selected' : ''}>Staff</option>
            </select>
            <button class="btn ghost" id="member-role-apply">Apply preset</button>
          </div>
          <p class="card-sub" style="color:var(--muted);">Applying a preset overwrites the custom permissions below.</p>
        </div>`;

      const statusRow = isSelf ? '' : `
        <div class="field" style="margin-top:8px;">
          <label>Account status</label>
          <div style="display:flex;gap:8px;align-items:center;">
            <span class="role-pill" style="background:${m.status === 'deactivated' ? 'var(--bad-soft)' : 'var(--ok-soft)'};color:${m.status === 'deactivated' ? 'var(--bad-strong)' : 'var(--ok-strong)'};">${escapeHtml(m.status)}</span>
            ${m.status === 'deactivated'
              ? `<button class="btn ghost" id="member-activate">Reactivate</button>`
              : `<button class="btn ghost" id="member-deactivate" style="color:var(--bad-strong);">Deactivate member</button>`}
            ${(state.teamIsOwner && !isOwnerTarget && m.status === 'active') ? `<button class="btn ghost" id="member-make-owner">Make owner</button>` : ''}
          </div>
        </div>`;

      return `
        <div class="card" id="member-editor" style="margin-top:14px;border-color:var(--head);">
          <div class="section-h" style="display:flex;justify-content:space-between;align-items:center;">
            <span>Edit — ${escapeHtml(m.name)}</span>
            <button class="btn ghost" id="member-editor-close">Close</button>
          </div>
          <p class="card-sub">${escapeHtml(m.email)} · <span class="role-pill role-${escapeAttr(m.role)}">${escapeHtml(m.role)}</span>${isSelf ? ' · you cannot edit your own permissions' : ''}</p>
          ${statusRow}
          ${roleSwitch}
          <div class="section-h" style="margin-top:12px;">Permissions</div>
          <div id="member-perms">${permsBody}</div>
        </div>`;
    }

    function wireUsersTab() {
      const openBtn = document.getElementById('invite-open');
      const formCard = document.getElementById('invite-form-card');
      if (openBtn && formCard) openBtn.addEventListener('click', () => { formCard.hidden = false; document.getElementById('invite-email')?.focus(); });
      document.getElementById('invite-cancel')?.addEventListener('click', () => { if (formCard) formCard.hidden = true; });

      const errBox = document.getElementById('invite-error');
      const showErr = (m) => { if (errBox) { errBox.textContent = m; errBox.style.display = 'block'; } };

      document.getElementById('invite-send')?.addEventListener('click', async () => {
        if (errBox) errBox.style.display = 'none';
        const email = (document.getElementById('invite-email')?.value || '').trim();
        const role = document.getElementById('invite-role')?.value;
        if (!email) { showErr('Enter an email address.'); return; }
        const btn = document.getElementById('invite-send'); btn.disabled = true; btn.textContent = 'Sending…';
        try {
          const res = await api.post('/api/invitations', { email, role });
          state.inviteLink = { accept_url: res.accept_url, email_sent: res.email_sent };
          state.invites = null; // force reload of pending list
          showToast('Invitation created');
          render();
        } catch (err) {
          btn.disabled = false; btn.textContent = 'Send invite';
          const code = err.body?.error;
          if (code === 'already_member') showErr('That person is already on the team.');
          else if (code === 'account_disabled') showErr('That account has been disabled and cannot be re-invited.');
          else if (code === 'invite_pending') {
            const id = err.body?.invitation_id;
            showErr('An invite is already pending for that email.');
            if (id && errBox) {
              const b = document.createElement('button');
              b.className = 'btn ghost'; b.style.marginTop = '8px'; b.textContent = 'Revoke pending invite';
              b.addEventListener('click', async () => {
                try { await api.del(`/api/invitations/${id}`); showToast('Revoked — try inviting again'); state.invites = null; if (errBox) errBox.style.display = 'none'; render(); }
                catch { showToast('Could not revoke'); }
              });
              errBox.appendChild(document.createElement('br')); errBox.appendChild(b);
            }
          }
          else if (err.status === 403) showErr("You don't have permission to invite that role.");
          else showErr('Could not send invite: ' + (code || err.message));
        }
      });

      // Copy / dismiss the one-time accept link
      document.getElementById('invite-copy')?.addEventListener('click', async () => {
        const input = document.getElementById('invite-link-value');
        try { await navigator.clipboard.writeText(input.value); showToast('Link copied'); }
        catch { input.select(); document.execCommand('copy'); showToast('Link copied'); }
      });
      document.getElementById('invite-link-dismiss')?.addEventListener('click', () => { state.inviteLink = null; render(); });

      // Revoke pending invites
      document.querySelectorAll('[data-revoke]').forEach(b => b.addEventListener('click', async () => {
        const id = b.getAttribute('data-revoke');
        b.disabled = true; b.textContent = 'Revoking…';
        try { await api.del(`/api/invitations/${id}`); showToast('Invitation revoked'); state.invites = null; render(); }
        catch { b.disabled = false; b.textContent = 'Revoke'; showToast('Could not revoke'); }
      }));

      // ----- Sub-turn 12a: team member editor -----
      document.querySelectorAll('[data-edit-member]').forEach(b => b.addEventListener('click', () => {
        state.editingMember = b.getAttribute('data-edit-member'); render();
      }));
      document.getElementById('member-editor-close')?.addEventListener('click', () => { state.editingMember = null; render(); });

      const memberErr = (err, fallback) => {
        const code = err.body?.error;
        showToast(({
          cannot_edit_own_permissions: "You can't edit your own permissions.",
          owner_permissions_immutable: "Owners have full access — it can't be changed.",
          cannot_grant_unheld_permission: "You can't grant a permission you don't hold.",
          cannot_deactivate_self: "You can't deactivate yourself.",
          cannot_deactivate_last_owner: "Can't deactivate the last owner.",
          cannot_change_own_role: "You can't change your own role.",
          cannot_demote_owner: "Use another owner action to change an owner.",
          only_owner_can_make_owner: 'Only an owner can promote someone to owner.',
        })[code] || (fallback + (code ? ': ' + code : '')));
      };

      // Permission checkbox toggles — save immediately.
      document.querySelectorAll('#member-perms [data-perm-key]').forEach(cb => cb.addEventListener('change', async () => {
        const key = cb.getAttribute('data-perm-key');
        const value = cb.checked;
        cb.disabled = true;
        try {
          await api.patch(`/api/members/${state.editingMember}/permissions`, { permissions: { [key]: value } });
          const m = state.members.find(x => x.user_id === state.editingMember);
          if (m) { m.permissions = m.permissions || {}; if (value) m.permissions[key] = true; else delete m.permissions[key]; }
          showToast('Permission updated');
        } catch (err) { cb.checked = !value; memberErr(err, 'Could not update permission'); }
        finally { cb.disabled = false; }
      }));

      // Role preset switch (overwrites custom permissions).
      document.getElementById('member-role-apply')?.addEventListener('click', async () => {
        const role = document.getElementById('member-role')?.value;
        if (!confirm(`Switch this member to the ${role} preset? This overwrites their current custom permissions.`)) return;
        try { await api.patch(`/api/members/${state.editingMember}/role`, { role }); showToast('Role updated'); state.members = null; render(); }
        catch (err) { memberErr(err, 'Could not change role'); }
      });

      // Deactivate / reactivate.
      document.getElementById('member-deactivate')?.addEventListener('click', async () => {
        if (!confirm('Deactivate this member? They will be signed out and unable to log in until reactivated.')) return;
        try { await api.patch(`/api/members/${state.editingMember}/status`, { status: 'deactivated' }); showToast('Member deactivated'); state.members = null; render(); }
        catch (err) { memberErr(err, 'Could not deactivate'); }
      });
      document.getElementById('member-activate')?.addEventListener('click', async () => {
        try { await api.patch(`/api/members/${state.editingMember}/status`, { status: 'active' }); showToast('Member reactivated'); state.members = null; render(); }
        catch (err) { memberErr(err, 'Could not reactivate'); }
      });

      // Make owner (owner actor only, irreversible loss of exclusivity).
      document.getElementById('member-make-owner')?.addEventListener('click', async () => {
        if (!confirm('Make this member an owner? Owners have full, unremovable access. You will no longer be the sole owner.')) return;
        try { await api.post(`/api/members/${state.editingMember}/make-owner`, {}); showToast('Member is now an owner'); state.members = null; render(); }
        catch (err) { memberErr(err, 'Could not make owner'); }
      });
    }

    // ---------- integrations tab ----------
    async function loadIntegrations() {
      try {
        const res = await api.get('/api/integrations');
        state.integrations = res.adapters || [];
        state.encKeyOk = res.enc_key_ok !== false; // proactive misconfig signal
      } catch (err) {
        state.integrations = { error: err.body?.error || err.message || 'error' };
      }
      if (state.tab === 'integrations') render();
    }

    function adapterStatus(a) {
      const cfg = a.configuration;
      if (cfg?.is_active) return { label: 'Active', cls: 'st-active' };
      if (cfg && (cfg.credentials_saved || Object.keys(cfg.config || {}).length)) return { label: 'Configured', cls: 'st-configured' };
      return { label: 'Not configured', cls: 'st-none' };
    }

    function integrationsTab() {
      if (state.integrations === null) { loadIntegrations(); return '<div class="loading">Loading integrations…</div>'; }
      if (!Array.isArray(state.integrations)) {
        return `<div class="card"><h3>Couldn't load integrations</h3><p class="card-sub">${escapeHtml(state.integrations?.error || 'error')}</p></div>`;
      }
      const canEdit = canEditMetadata();
      // Proactive server-config warning: a missing/malformed INTEGRATION_ENC_KEY
      // (must be 64-char hex) makes every credential save fail. Show it up front
      // so nobody hits a mystery error on Save.
      const encWarn = state.encKeyOk === false
        ? `<div class="notice" style="border-color:#fecaca;background:#fef2f2;color:#991b1b"><strong>⚠ Server encryption key is misconfigured</strong>Saving credentials is disabled until <code>INTEGRATION_ENC_KEY</code> is set to a valid 64-character hex string in the deployment environment (generate with <code>openssl rand -hex 32</code>), then redeploy.</div>`
        : '';
      const roleNote = canEdit ? '' : `<div class="notice">You have read-only access. Only owners and managers can configure integrations.</div>`;
      const intro = `<div class="notice"><strong>How integrations work</strong>Pick one provider per category, save its credentials, then activate it. Credentials are encrypted and never shown again. Only the <em>Noop (testing)</em> adapters are functional today — real providers are coming soon.</div>`;
      const sections = CATEGORY_ORDER.map(cat => {
        const meta = CATEGORY_LABELS[cat];
        const adapters = state.integrations.filter(a => a.category === cat);
        const cards = adapters.map(a => adapterCard(a, canEdit)).join('');
        return `<div class="card">
          <div class="section-h">${escapeHtml(meta.title)}</div>
          <p class="card-sub">${escapeHtml(meta.sub)}</p>
          <div class="adapter-grid">${cards}</div>
        </div>`;
      }).join('');
      return `${encWarn}${roleNote}${intro}${sections}`;
    }

    function adapterCard(a, canEdit) {
      const cfg = a.configuration;
      const st = adapterStatus(a);
      const soon = !a.implemented;
      const key = `${escapeAttr(a.category)}" data-provider="${escapeAttr(a.provider)}`;
      const badges = [`<span class="st-badge ${st.cls}">${escapeHtml(st.label)}</span>`];
      if (soon) badges.push('<span class="soon-badge">Coming soon</span>');
      let testLine = '';
      if (cfg?.last_test_status) {
        const cls = cfg.last_test_status === 'success' ? 'st-test-ok' : 'st-test-fail';
        testLine = `<div class="adapter-meta">Last test: <span class="st-badge ${cls}">${escapeHtml(cfg.last_test_status)}</span>${cfg.last_test_message ? ' · ' + escapeHtml(cfg.last_test_message) : ''}</div>`;
      }
      const actions = [];
      if (canEdit) {
        if (soon) {
          actions.push(`<button class="btn ghost" disabled title="Not yet available">Configure</button>`);
        } else {
          actions.push(`<button class="btn ghost" data-act="configure" data-category="${key}">Configure</button>`);
          if (cfg?.is_active) {
            actions.push(`<button class="btn ghost" data-act="deactivate" data-category="${key}">Deactivate</button>`);
          } else if (cfg) {
            actions.push(`<button class="btn primary" data-act="activate" data-category="${key}">Activate</button>`);
          }
          if (a.supportsTest && cfg) actions.push(`<button class="btn ghost" data-act="test" data-category="${key}">Test</button>`);
          if (cfg) actions.push(`<button class="btn danger" data-act="remove" data-category="${key}">Remove</button>`);
        }
      }
      return `<div class="adapter-card ${cfg?.is_active ? 'is-active' : ''} ${soon ? 'is-soon' : ''}">
        <div class="adapter-head">
          <div class="adapter-name">${escapeHtml(a.displayName)}</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${badges.join('')}</div>
        <div class="adapter-desc">${escapeHtml(a.description)}</div>
        ${testLine}
        <div class="adapter-actions">${actions.join('')}</div>
      </div>`;
    }

    function wireIntegrationsTab() {
      document.querySelectorAll('[data-act]').forEach(btn => {
        btn.addEventListener('click', () => {
          const cat = btn.dataset.category, prov = btn.dataset.provider, act = btn.dataset.act;
          if (act === 'configure') openConfigModal(cat, prov);
          else if (act === 'activate') doIntegrationAction(cat, prov, 'activate');
          else if (act === 'deactivate') doIntegrationAction(cat, prov, 'deactivate');
          else if (act === 'test') doIntegrationAction(cat, prov, 'test');
          else if (act === 'remove') removeIntegration(cat, prov);
        });
      });
    }

    function findAdapterMeta(cat, prov) {
      return (state.integrations || []).find(a => a.category === cat && a.provider === prov);
    }

    async function doIntegrationAction(cat, prov, action) {
      const a = findAdapterMeta(cat, prov);
      try {
        const res = await api.post(`/api/integrations/${cat}/${prov}/${action}`, {});
        if (action === 'test') {
          showToast(res.ok ? `Test passed: ${res.message}` : `Test failed: ${res.message}`);
        } else {
          showToast(`${a?.displayName || prov} ${action === 'activate' ? 'activated' : 'deactivated'}`);
        }
        await loadIntegrations();
      } catch (err) {
        showToast(`Could not ${action}: ` + (err.body?.error || err.message));
      }
    }

    async function removeIntegration(cat, prov) {
      const a = findAdapterMeta(cat, prov);
      if (!window.confirm(`Remove ${a?.displayName || prov} configuration? Saved credentials will be deleted.`)) return;
      try {
        await api.del(`/api/integrations/${cat}/${prov}`);
        showToast(`${a?.displayName || prov} removed`);
        await loadIntegrations();
      } catch (err) {
        showToast('Could not remove: ' + (err.body?.error || err.message));
      }
    }

    // `kind` is the field's SOURCE bucket ('credential' | 'config') — passed by the
    // caller from a.credentialFields vs a.configFields. The data-kind MUST follow
    // the bucket, NOT the input type: a credential field of type text (e.g. the
    // SMTP `username`) has to be saved into credentials, otherwise the adapter
    // can't authenticate ("Missing credentials for PLAIN"). Credential values are
    // never returned by the API, so they render blank with an "(unchanged)" hint
    // when already saved (same as passwords); leaving them blank preserves them.
    function fieldInput(f, savedConfig, credsSaved, kind) {
      const isSecret = f.type === 'password';
      const isCred = kind === 'credential';
      const cfgVal = isCred ? undefined : savedConfig?.[f.key];
      let control;
      if (f.type === 'select') {
        const opts = (f.options || []).map(o => `<option value="${escapeAttr(o)}" ${cfgVal === o ? 'selected' : ''}>${escapeHtml(o)}</option>`).join('');
        control = `<select data-key="${escapeAttr(f.key)}" data-kind="${kind}">${opts}</select>`;
      } else if (isSecret) {
        const ph = credsSaved ? '(unchanged — leave blank to keep)' : (f.placeholder || '');
        control = `<input type="password" data-key="${escapeAttr(f.key)}" data-kind="${kind}" placeholder="${escapeAttr(ph)}" autocomplete="new-password" value="">`;
      } else {
        const type = f.type === 'email' ? 'email' : (f.type === 'url' ? 'url' : 'text');
        const ph = (isCred && credsSaved) ? '(unchanged — leave blank to keep)' : (f.placeholder || '');
        const val = cfgVal ?? '';
        control = `<input type="${type}" data-key="${escapeAttr(f.key)}" data-kind="${kind}" placeholder="${escapeAttr(ph)}" value="${escapeAttr(val)}" autocomplete="off">`;
      }
      return `<div class="field">
        <label>${escapeHtml(f.label)}${f.required ? '' : '<span class="hint">optional</span>'}</label>
        ${control}
        ${f.helpText ? `<p class="card-sub" style="margin:4px 0 0">${escapeHtml(f.helpText)}</p>` : ''}
      </div>`;
    }

    function openConfigModal(cat, prov) {
      const a = findAdapterMeta(cat, prov);
      if (!a) return;
      const cfg = a.configuration;
      const savedConfig = cfg?.config || {};
      const credsSaved = !!cfg?.credentials_saved;
      const credFields = (a.credentialFields || []).map(f => fieldInput(f, savedConfig, credsSaved, 'credential')).join('');
      const confFields = (a.configFields || []).map(f => fieldInput(f, savedConfig, credsSaved, 'config')).join('');
      const testModeChecked = cfg?.test_mode ? 'checked' : '';
      const helpLink = a.helpUrl ? `<a href="${escapeAttr(a.helpUrl)}" target="_blank" rel="noopener" style="font-size:12px">Documentation ↗</a>` : '';
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal">
          <div class="modal-head">
            <h3>Configure ${escapeHtml(a.displayName)}</h3>
            <p class="card-sub">${escapeHtml(a.description)} ${helpLink}</p>
          </div>
          <div class="modal-body">
            ${credFields || confFields ? '' : '<p class="card-sub">This adapter needs no configuration.</p>'}
            ${credFields}
            ${confFields}
            <div class="field" style="display:flex;align-items:center;gap:10px;margin-top:4px">
              <label style="margin:0">Test mode</label>
              <label class="switch"><input type="checkbox" data-testmode ${testModeChecked}><span class="track"></span></label>
            </div>
          </div>
          <div class="modal-foot">
            <button class="btn ghost" data-close>Cancel</button>
            <button class="btn primary" data-save>Save</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      const close = () => overlay.remove();
      overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
      overlay.querySelector('[data-close]').addEventListener('click', close);
      overlay.querySelector('[data-save]').addEventListener('click', async () => {
        const saveBtn = overlay.querySelector('[data-save]');
        saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
        const credentials = {}, config = {};
        overlay.querySelectorAll('[data-key]').forEach(el => {
          const k = el.dataset.key, kind = el.dataset.kind, v = el.value;
          if (kind === 'credential') { if (v !== '') credentials[k] = v; }
          else { if (v !== '') config[k] = v; }
        });
        const test_mode = overlay.querySelector('[data-testmode]').checked;
        const payload = { config, test_mode };
        if (Object.keys(credentials).length) payload.credentials = credentials;
        try {
          await api.put(`/api/integrations/${cat}/${prov}`, payload);
          showToast(`${a.displayName} saved`);
          close();
          await loadIntegrations();
        } catch (err) {
          saveBtn.disabled = false; saveBtn.textContent = 'Save';
          // Structured (Item 12) errors carry error.message + reasons[]; show the
          // actionable message (e.g. "encryption key missing") not "[object Object]".
          const e = err.body && err.body.error;
          const msg = (e && typeof e === 'object')
            ? (e.reasons && e.reasons[0] && e.reasons[0].message) || e.message || e.code
            : (e || err.message);
          showToast('Save failed: ' + msg);
        }
      });
    }

    // ---------- tab switching + unsaved guard ----------
    function switchTab(tab) {
      if (tab === state.tab) return;
      if (state.tab === 'workspace' && isDirty()) {
        if (!window.confirm('You have unsaved changes. Discard them?')) return;
        resetForm();
      }
      state.tab = tab;
      history.replaceState(null, '', `#${tab}`);
      render();
    }
    const snavSearchInput = document.getElementById('snav-search-input');
    if (snavSearchInput) snavSearchInput.addEventListener('input', () => { state.navSearch = snavSearchInput.value; renderSettingsNav(); });
    window.addEventListener('beforeunload', (e) => {
      if (state.tab === 'workspace' && isDirty()) { e.preventDefault(); e.returnValue = ''; }
    });

    // ---------- helpers ----------
    function getByPath(obj, path) { return path.split('.').reduce((o, k) => (o == null ? o : o[k]), obj); }
    function setByPath(obj, path, val) {
      const keys = path.split('.'); const last = keys.pop();
      const target = keys.reduce((o, k) => (o[k] ??= {}), obj);
      target[last] = val;
    }
    function fmtDate(v) { if (!v) return '—'; const d = new Date(v); return isNaN(d) ? String(v) : d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }); }
    function showToast(msg) {
      const t = document.createElement('div'); t.className = 'toast';
      t.style.bottom = (24 + document.querySelectorAll('.toast').length * 46) + 'px';
      t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
    }
    function escapeHtml(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function escapeAttr(s) { return escapeHtml(s).replace(/`/g,'&#96;'); }

    load();
  
    // ========== notifications bell + drawer (Sub-turn 5d) ==========
    (function initNotifications() {
      const bell = document.getElementById('notif-bell');
      const badge = document.getElementById('notif-badge');
      const drawer = document.getElementById('notif-drawer');
      const drawerBody = document.getElementById('notif-drawer-body');
      const markAllBtn = document.getElementById('notif-mark-all');
      if (!bell || !drawer) return;
      let pollTimer = null;
      const esc = (typeof escapeHtml === 'function') ? escapeHtml : (s => String(s ?? ''));
      const escA = (typeof escapeAttr === 'function') ? escapeAttr : esc;

      function timeAgoN(iso) {
        const diff = Date.now() - new Date(iso).getTime();
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return 'just now';
        if (mins < 60) return mins + 'm ago';
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return hrs + 'h ago';
        return Math.floor(hrs / 24) + 'd ago';
      }
      function updateBadge(count) {
        if (count > 0) { badge.textContent = count > 99 ? '99+' : String(count); badge.hidden = false; }
        else { badge.hidden = true; }
      }
      async function fetchCount() {
        try {
          const res = await fetch('/api/notifications/unread-count', { credentials: 'include' });
          if (!res.ok) return;
          const { count } = await res.json();
          updateBadge(count);
        } catch {}
      }
      async function loadList() {
        drawerBody.innerHTML = '<div class="notif-empty">Loading…</div>';
        try {
          const res = await fetch('/api/notifications?limit=20', { credentials: 'include' });
          if (!res.ok) throw new Error();
          const { notifications } = await res.json();
          renderList(notifications);
        } catch { drawerBody.innerHTML = '<div class="notif-empty">Failed to load notifications</div>'; }
      }
      function renderList(items) {
        if (!items || items.length === 0) { drawerBody.innerHTML = '<div class="notif-empty">No notifications</div>'; return; }
        drawerBody.innerHTML = items.map(n => `
          <div class="notif-item ${n.read_at ? '' : 'unread'}" data-id="${escA(n.id)}" data-link="${escA(n.link_url || '')}">
            <div class="notif-title">${esc(n.title)}</div>
            ${n.body ? `<div class="notif-body">${esc(n.body)}</div>` : ''}
            <div class="notif-meta">${esc(n.actor_name || 'System')} · ${esc(timeAgoN(n.created_at))}</div>
          </div>`).join('');
        drawerBody.querySelectorAll('.notif-item').forEach(el => {
          el.addEventListener('click', () => {
            const id = el.dataset.id, link = el.dataset.link;
            if (el.classList.contains('unread')) {
              fetch(`/api/notifications/${id}/read`, { method: 'POST', credentials: 'include' }).then(() => fetchCount()).catch(() => {});
            }
            if (link) window.location.href = link;
          });
        });
      }
      async function markAllRead() {
        try {
          await fetch('/api/notifications/mark-all-read', { method: 'POST', credentials: 'include' });
          await fetchCount();
          await loadList();
        } catch {}
      }
      bell.addEventListener('click', (e) => {
        e.stopPropagation();
        if (drawer.hidden) { drawer.hidden = false; loadList(); } else { drawer.hidden = true; }
      });
      document.addEventListener('click', (e) => {
        if (!drawer.contains(e.target) && !bell.contains(e.target)) drawer.hidden = true;
      });
      markAllBtn.addEventListener('click', markAllRead);
      function startPolling() { if (pollTimer) return; pollTimer = setInterval(() => { if (!document.hidden) fetchCount(); }, 60000); }
      function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) stopPolling(); else { fetchCount(); startPolling(); }
      });
      fetchCount();
      startPolling();
    })();

  </script>
</body>
