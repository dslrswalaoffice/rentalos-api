<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#202058">
  <title>Settings · RentalOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23e88020'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='Space Grotesk,Inter,sans-serif' font-weight='800' font-size='19' fill='%23202058'%3ER%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --ink:#202058; --text:#464a52; --head:#26235a; --muted:#8b9199; --muted-strong:#5b616b; --muted-soft:#9aa1ad;
      --card:#ffffff; --bg:#f6f7f9; --side:#fcfcfd; --thead:#fafbfc; --border:#e6e8ec; --border-strong:#d8dbe0;
      --accent-soft:#ecebf4; --border-accent:#d7dcf7; --orange:#e88020; --orange-soft:#fbe9d7; --focus:#b9c0ee;
      --ok-solid:#1f9d57; --ok-soft:#e8f6ee; --ok-strong:#177a45;
      --warn-solid:#b9791b; --warn-soft:#fbf2e2; --warn-strong:#8a5a12;
      --bad-solid:#cc3340; --bad-soft:#fbeaeb; --bad-strong:#a3272f;
      --font-display:'Arzachel','Space Grotesk','Inter',-apple-system,sans-serif;
      --font-body:'Ponjoung','Inter',-apple-system,sans-serif;
      --font-mono:'JetBrains Mono',ui-monospace,monospace;
      --sb-w:232px;
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%}
    body{font-family:var(--font-body);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
    button,a{transition:background-color .14s,color .14s,border-color .14s,box-shadow .16s}
    ::-webkit-scrollbar{width:11px;height:11px}::-webkit-scrollbar-thumb{background:#d3d7dd;border-radius:7px;border:3px solid transparent;background-clip:padding-box}

    .app{display:grid;grid-template-columns:var(--sb-w) minmax(0,1fr);min-height:100dvh}
    /* sidebar (from orders.html) */
    .sb{background:var(--side);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 14px 14px;position:sticky;top:0;height:100dvh;overflow-y:auto}
    .sb-brand{display:flex;align-items:center;gap:10px;padding:6px 6px 20px}
    .sb-brand .logo{width:30px;height:30px;border-radius:8px;background:var(--orange);color:var(--ink);display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:17px}
    .sb-brand .word{font-family:var(--font-display);font-weight:600;font-size:17px;letter-spacing:-.01em;color:var(--ink)}
    .sb-brand .env{margin-left:auto;font-family:var(--font-mono);font-size:8.5px;font-weight:600;letter-spacing:.12em;color:var(--warn-strong);background:var(--warn-soft);padding:2px 7px;border-radius:999px}
    .sb-nav{display:flex;flex-direction:column;gap:2px}
    .sb-workspace{display:flex;align-items:baseline;gap:8px;width:100%;margin:14px 0 8px;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:inherit;text-align:left}
    .sb-workspace-name{font-family:var(--font-display);font-weight:600;font-size:12.5px;letter-spacing:.02em;color:var(--ink)}
    .sb-workspace-loc{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase}
    .sb-workspace svg{margin-left:auto;color:var(--muted);align-self:center}
    .sb-item{display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:9px;text-decoration:none;color:var(--muted-strong);font-size:13px;font-weight:500}
    .sb-item:hover{background:var(--bg);color:var(--ink)}
    .sb-item.active{background:var(--accent-soft);color:var(--head);font-weight:600}
    .sb-item .tile{width:26px;height:26px;border-radius:7px;background:#eef0f3;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:9.5px;font-weight:700}
    .sb-item.active .tile{background:var(--head);color:#fff}
    .sb-item.new .tile{background:var(--orange);color:#fff}
    .sb-user{margin-top:auto;padding:12px 8px 4px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
    .sb-user-avatar{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#26235a,#4b47a3);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:13px}
    .sb-user-name{font-size:12.5px;font-weight:600;color:var(--ink)}
    .sb-user-role{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-top:1px}

    .main{min-width:0;background:var(--bg);display:flex;flex-direction:column}
    .topbar{display:flex;align-items:center;gap:16px;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--card);position:sticky;top:0;z-index:40}
    .kicker{font-family:var(--font-mono);font-size:9.5px;font-weight:600;letter-spacing:.14em;color:var(--muted-soft);text-transform:uppercase}
    .page-title{font-family:var(--font-display);font-weight:600;font-size:17px;letter-spacing:-.005em;color:var(--ink);margin-top:1px}
    .topbar-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
    .btn{padding:8px 14px;border-radius:9px;font-family:var(--font-body);font-weight:600;font-size:12.5px;cursor:pointer;border:1px solid transparent;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
    .btn.ghost{background:var(--card);color:var(--muted-strong);border-color:var(--border)}
    .btn.ghost:hover{background:var(--bg);border-color:var(--border-strong);color:var(--ink)}
    .btn.primary{background:var(--head);color:#fff;border-color:var(--head)}
    .btn.primary:hover{background:#1a1749}
    .btn.orange{background:var(--orange);color:#fff;border-color:var(--orange)}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    /* tabs */
    .tabbar{display:flex;gap:2px;padding:0 24px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:30}
    .tab{padding:12px 16px;background:transparent;border:none;border-bottom:2px solid transparent;font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}
    .tab:hover{color:var(--ink)}
    .tab.active{color:var(--head);border-bottom-color:var(--head)}

    .content{padding:22px 24px 60px;max-width:900px;margin:0 auto;width:100%}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:16px}
    .card h3{font-family:var(--font-display);font-weight:600;font-size:14px;letter-spacing:-.005em;color:var(--ink);margin:0 0 4px}
    .card .card-sub{font-size:12px;color:var(--muted);margin:0 0 16px}
    .section-h{font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 12px}

    .field{margin-bottom:14px}
    .field label{display:block;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--muted-strong);text-transform:uppercase;margin-bottom:6px}
    .field label .hint{text-transform:none;letter-spacing:0;font-weight:400;color:var(--muted-soft);font-family:var(--font-body);font-size:11px;margin-left:6px}
    .field input,.field select,.field textarea{width:100%;padding:9px 11px;font-family:var(--font-body);font-size:13.5px;color:var(--ink);background:var(--card);border:1px solid var(--border);border-radius:9px;outline:none;transition:border-color .14s,box-shadow .14s}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--focus);box-shadow:0 0 0 4px rgba(185,192,238,.24)}
    .field input.mono{font-family:var(--font-mono);font-size:12.5px}
    .field textarea{min-height:120px;resize:vertical;font-size:13px;line-height:1.5}
    .field textarea.mono.contract-template{font-family:var(--font-mono);font-size:12px;line-height:1.5;min-height:300px}
    .template-variables{margin-bottom:8px;display:flex;flex-wrap:wrap;gap:4px}
    .var-chip{display:inline-block;padding:3px 8px;background:#eef0f3;color:var(--muted-strong);border-radius:10px;font-size:11px;font-family:var(--font-mono);}
    /* 6f: reminders */
    .template-block{border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-top:12px}
    .template-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
    .template-header h4{margin:0;font-size:13.5px;color:var(--head)}
    .switch-inline{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted-strong);cursor:pointer}
    .channel-priority{margin:10px 0}
    .mini-label{display:block;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-strong);margin-bottom:6px}
    .channel-checkboxes{display:flex;flex-direction:column;gap:6px}
    .channel-checkboxes label{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);cursor:pointer}
    .hint-sub{font-size:11px;color:var(--muted-soft);margin:6px 0 0}
    .channel-config{margin-top:10px;border-top:1px solid var(--border);padding-top:8px}
    .channel-config summary{cursor:pointer;font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--head)}
    .channel-config .field{margin-top:10px}
    /* 6g: custom fields */
    .cf-subtabs{display:flex;gap:6px;margin-bottom:14px}
    .cf-subtab{padding:7px 14px;border:1px solid var(--border);border-radius:9px;background:var(--card);font-family:var(--font-body);font-size:12.5px;font-weight:600;color:var(--muted-strong);cursor:pointer}
    .cf-subtab.active{background:var(--head);color:#fff;border-color:var(--head)}
    .cf-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    .cf-title{margin:0;font-size:15px;color:var(--ink)}
    .cf-rows{display:flex;flex-direction:column;gap:6px}
    .cf-empty{font-size:12.5px;color:var(--muted);padding:8px 0}
    .cf-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:9px}
    .cf-info{flex:1;min-width:0}
    .cf-label{font-weight:600;color:var(--head);font-size:13.5px}
    .cf-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .cf-meta code{background:#eef0f3;padding:1px 5px;border-radius:4px;font-family:var(--font-mono);font-size:10.5px}
    .cf-type{text-transform:uppercase;letter-spacing:.04em;font-family:var(--font-mono);font-size:10px}
    .cf-req{color:var(--bad-strong);font-weight:700;font-size:9.5px;font-family:var(--font-mono);text-transform:uppercase;margin-left:6px}
    .cf-actions{display:flex;gap:6px;flex-shrink:0}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .toggle-field{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 0}
    .toggle-field .tl{font-size:13px;color:var(--ink);font-weight:500}
    .collapsible summary{cursor:pointer;list-style:none;font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--head);padding:4px 0}
    .collapsible summary::-webkit-details-marker{display:none}
    .collapsible[open] summary{margin-bottom:12px}

    /* toggle switch */
    .switch{position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0}
    .switch input{opacity:0;width:0;height:0}
    .switch .track{position:absolute;inset:0;background:#d3d7dd;border-radius:999px;transition:background .16s}
    .switch .track::before{content:"";position:absolute;height:18px;width:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .16s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
    .switch input:checked+.track{background:var(--ok-solid)}
    .switch input:checked+.track::before{transform:translateX(18px)}
    .switch input:disabled+.track{opacity:.5;cursor:not-allowed}
    .switch.disabled{cursor:not-allowed}

    /* feature rows */
    .flag-row{display:flex;align-items:flex-start;gap:16px;padding:16px 0;border-top:1px solid var(--border)}
    .flag-row:first-child{border-top:none}
    .flag-main{flex:1;min-width:0}
    .flag-name{font-weight:600;color:var(--ink);font-size:13.5px;display:flex;align-items:center;gap:8px}
    .flag-desc{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5}
    .soon-badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:5px;background:var(--warn-soft);color:var(--warn-strong);font-family:var(--font-mono);font-size:8.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
    .live-badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:5px;background:var(--ok-soft);color:var(--ok-strong);font-family:var(--font-mono);font-size:8.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}

    /* integrations */
    .adapter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
    .adapter-card{border:1px solid var(--border);border-radius:12px;padding:14px 15px;background:var(--card);display:flex;flex-direction:column;gap:10px;transition:border-color .14s,box-shadow .14s}
    .adapter-card.is-active{border-color:var(--border-accent);box-shadow:0 0 0 1px var(--border-accent)}
    .adapter-card.is-soon{background:var(--thead);opacity:.75}
    .adapter-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .adapter-name{font-weight:600;color:var(--ink);font-size:13.5px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
    .adapter-desc{font-size:11.5px;color:var(--muted);line-height:1.5;flex:1}
    .adapter-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:2px}
    .adapter-actions .btn{padding:6px 11px;font-size:11.5px}
    .btn.danger{background:var(--card);color:var(--bad-strong);border-color:var(--border)}
    .btn.danger:hover{background:var(--bad-soft);border-color:var(--bad-strong)}
    .st-badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:5px;font-family:var(--font-mono);font-size:8.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
    .st-active{background:var(--ok-soft);color:var(--ok-strong)}
    .st-configured{background:var(--accent-soft);color:var(--head)}
    .st-none{background:#eef0f3;color:var(--muted-strong)}
    .st-test-ok{background:var(--ok-soft);color:var(--ok-strong)}
    .st-test-fail{background:var(--bad-soft);color:var(--bad-strong)}
    .adapter-meta{font-size:10.5px;color:var(--muted-soft);font-family:var(--font-mono)}
    /* modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(16,20,40,.42);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px}
    .modal{background:var(--card);border:1px solid var(--border-strong);border-radius:14px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px -20px rgba(16,24,40,.4)}
    .modal-head{padding:18px 20px 12px;border-bottom:1px solid var(--border)}
    .modal-head h3{margin:0;font-size:15px;color:var(--ink)}
    .modal-head .card-sub{margin:4px 0 0;font-size:12px;color:var(--muted)}
    .modal-body{padding:16px 20px}
    .modal-foot{padding:12px 20px 18px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid var(--border)}
    .modal .field{margin-bottom:12px}

    /* users table */
    table.users{width:100%;border-collapse:collapse}
    table.users th{text-align:left;padding:10px 12px;font-family:var(--font-mono);font-size:9px;font-weight:600;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--thead)}
    table.users td{padding:12px;border-top:1px solid var(--border);font-size:13px}
    table.users tr:first-child td{border-top:none}
    .role-pill{display:inline-flex;padding:2px 9px;border-radius:999px;font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
    .role-owner{background:var(--accent-soft);color:var(--head)}
    .role-manager{background:var(--orange-soft);color:var(--warn-strong)}
    .role-staff{background:#eef0f3;color:var(--muted-strong)}
    .role-client,.role-investor{background:var(--ok-soft);color:var(--ok-strong)}
    .status-dot{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted-strong)}
    .status-dot::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--ok-solid)}
    .status-dot.inactive::before{background:var(--muted-soft)}
    .notice{background:var(--accent-soft);border:1px solid var(--border-accent);border-radius:12px;padding:14px 16px;margin-bottom:16px;font-size:12.5px;color:var(--head)}
    .notice strong{display:block;margin-bottom:2px;font-size:13px}

    .loading{padding:60px;text-align:center;color:var(--muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;font-size:12px}
    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--card);border:1px solid var(--border-strong);border-radius:10px;box-shadow:0 14px 30px -12px rgba(16,24,40,.32);padding:11px 18px;font-size:13px;color:var(--ink);z-index:200}
    .tab-panel{display:none}
    .tab-panel.active{display:block}

    @media (max-width:900px){
      .app{grid-template-columns:1fr}
      .sb{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);padding:12px 16px}
      .sb-nav,.sb-user,.sb-workspace{display:none}
      .sb-brand{padding:0}
      .field-row{grid-template-columns:1fr}
      .tabbar{top:0}
    }
  
    /* ========== notifications bell + drawer (Sub-turn 5d) ========== */
    .notif-bell-wrap { position: relative; }
    .notif-bell { background: none; border: none; padding: 8px; cursor: pointer; color: var(--head); position: relative; display: flex; align-items: center; }
    .notif-bell:hover { background: var(--thead); border-radius: 6px; }
    .notif-badge { position: absolute; top: 4px; right: 4px; background: var(--bad-strong); color: #fff; border-radius: 10px; font-size: 10px; font-weight: 600; padding: 2px 5px; min-width: 16px; text-align: center; line-height: 1.2; }
    .notif-badge[hidden] { display: none; }
    .notif-drawer { position: absolute; top: 100%; right: 0; margin-top: 8px; width: 360px; max-height: 480px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 8px 24px rgba(16,24,40,0.14); z-index: 60; display: flex; flex-direction: column; }
    .notif-drawer[hidden] { display: none; }
    .notif-drawer-head { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .notif-drawer-head h3 { margin: 0; font-size: 14px; font-weight: 600; color: var(--ink); font-family: var(--font-display); }
    .notif-mark-all { background: none; border: none; color: var(--head); font-size: 12px; cursor: pointer; padding: 0; font-weight: 600; }
    .notif-mark-all:hover { text-decoration: underline; }
    .notif-drawer-body { flex: 1; overflow-y: auto; padding: 4px 0; }
    .notif-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 100ms ease; }
    .notif-item:last-child { border-bottom: none; }
    .notif-item:hover { background: var(--thead); }
    .notif-item.unread { background: rgba(59,130,246,0.05); }
    .notif-item.unread .notif-title::before { content: ''; display: inline-block; width: 6px; height: 6px; background: #3b82f6; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
    .notif-title { font-size: 13px; font-weight: 500; color: var(--head); margin-bottom: 2px; }
    .notif-body { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .notif-meta { font-size: 11px; color: var(--muted); opacity: 0.8; font-family: var(--font-mono); }
    .notif-empty { padding: 32px 16px; text-align: center; color: var(--muted); font-size: 13px; }

  </style>
</head>
<body>
  <div class="app">
    <aside class="sb">
      <div class="sb-brand">
        <span class="logo">R</span>
        <span class="word">RentalOS</span>
        <span class="env">v0.1</span>
      </div>
      <a href="/new-order.html" class="sb-item new" style="margin-bottom:6px;">
        <span class="tile">NB</span><span>New order</span>
      </a>
      <button class="sb-workspace" type="button" aria-label="Switch workspace">
        <span class="sb-workspace-name" id="ws-name">DSLRSWALA</span>
        <span class="sb-workspace-loc" id="ws-loc">Vadodara</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <nav class="sb-nav" aria-label="Main">
        <a href="/dashboard.html" class="sb-item"><span class="tile">DB</span><span>Dashboard</span></a>
        <a href="/orders.html" class="sb-item"><span class="tile">RN</span><span>Orders</span></a>
        <a href="/inventory.html" class="sb-item"><span class="tile">IN</span><span>Inventory</span></a>
        <a href="/people.html" class="sb-item"><span class="tile">PE</span><span>People</span></a>
        <a href="/calendar.html" class="sb-item"><span class="tile">CL</span><span>Calendar</span></a>
        <a href="/settings.html" class="sb-item active" aria-current="page"><span class="tile">SY</span><span>Settings</span></a>
      </nav>
      <div class="sb-user">
        <span class="sb-user-avatar" id="user-avatar">A</span>
        <div class="sb-user-info">
          <div class="sb-user-name" id="user-name">Aamir</div>
          <div class="sb-user-role" id="user-role">OWNER</div>
        </div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="page-title-block">
          <div class="kicker" id="tb-kicker">Settings</div>
          <div class="page-title">Settings</div>
        </div>
        <div class="topbar-actions" id="tb-actions">
          <div class="notif-bell-wrap">
            <button class="notif-bell" id="notif-bell" aria-label="Notifications">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M12 2a7 7 0 0 0-7 7v3.6L3 15h18l-2-2.4V9a7 7 0 0 0-7-7z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                <path d="M10 19a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.5"/>
              </svg>
              <span class="notif-badge" id="notif-badge" hidden>0</span>
            </button>
            <div class="notif-drawer" id="notif-drawer" hidden>
              <header class="notif-drawer-head">
                <h3>Notifications</h3>
                <button class="notif-mark-all" id="notif-mark-all">Mark all read</button>
              </header>
              <div class="notif-drawer-body" id="notif-drawer-body"></div>
            </div>
          </div>
</div>
      </header>
      <nav class="tabbar" id="tabbar">
        <button class="tab active" data-tab="workspace">Workspace</button>
        <button class="tab" data-tab="features">Features</button>
        <button class="tab" data-tab="integrations">Integrations</button>
        <button class="tab" data-tab="custom-fields">Custom Fields</button>
        <button class="tab" data-tab="locations">Locations</button>
        <button class="tab" data-tab="users">Users</button>
      </nav>
      <div class="content" id="content"><div class="loading">Loading settings…</div></div>
    </div>
  </div>

  <script type="module">
    import { api, ensureAuth } from '/_lib/api.js';

    const state = { data: null, tab: 'workspace', form: null, baseline: null, integrations: null };

    const CATEGORY_LABELS = {
      payment: { title: 'Payment gateway', sub: 'Collect deposits and rental payments online. One active provider at a time.' },
      whatsapp: { title: 'WhatsApp', sub: 'Send order confirmations, dispatch alerts, and reminders on WhatsApp.' },
      email: { title: 'Email', sub: 'Deliver invoices and notifications by email.' },
    };
    const CATEGORY_ORDER = ['payment', 'whatsapp', 'email'];

    const INDIAN_STATES = ['Andhra Pradesh','Arunachal Pradesh','Assam','Bihar','Chhattisgarh','Goa','Gujarat','Haryana','Himachal Pradesh','Jharkhand','Karnataka','Kerala','Madhya Pradesh','Maharashtra','Manipur','Meghalaya','Mizoram','Nagaland','Odisha','Punjab','Rajasthan','Sikkim','Tamil Nadu','Telangana','Tripura','Uttar Pradesh','Uttarakhand','West Bengal','Andaman and Nicobar Islands','Chandigarh','Dadra and Nagar Haveli and Daman and Diu','Delhi','Jammu and Kashmir','Ladakh','Lakshadweep','Puducherry'];

    const FLAGS = [
      { key:'gst_split_cgst_sgst_igst', name:'GST split (CGST+SGST / IGST)', desc:'Split tax into CGST + SGST for intra-state or IGST for inter-state customers. Required for Indian GST-registered businesses.', live:true },
      { key:'auto_close_when_all_items_terminal', name:'Auto-close ready orders', desc:'Automatically transition orders to Closed when all items reach terminal states. If off, a banner prompts the operator to confirm.', live:true },
      { key:'qr_scanning', name:'QR code scanning', desc:'Track individual sub-components (batteries, chargers, cables) via QR codes at dispatch and return.', live:false },
      { key:'otp_handover', name:'OTP handover', desc:'Legally-binding OTP-based dispatch and return verification via WhatsApp, replacing paper agreements.', live:false },
      { key:'customer_tiers', name:'Customer tiers', desc:'Normal / Premium / VIP customer classification with different payment and billing rules.', live:false },
      { key:'vip_consolidated_billing', name:'VIP consolidated billing', desc:'Monthly consolidated invoice for VIP customers with TDS deduction handling. Requires customer tiers.', live:false },
      { key:'trust_score', name:'Trust score', desc:'Algorithmic customer risk scoring based on rental history, damage rate, and payment behavior.', live:false },
      { key:'investor_module', name:'Investor equipment tracking', desc:'Tag equipment ownership to investors with revenue-share and settlement ledger.', live:false },
      { key:'cashfree_gateway', name:'Cashfree payment gateway', desc:'Accept UPI, card, and net-banking payments directly through Cashfree. Requires API credentials.', live:false },
      { key:'wati_notifications', name:'WhatsApp notifications', desc:'Send order confirmations, dispatch alerts, return reminders, and invoices via WhatsApp Business API through WATI.', live:false },
      { key:'damage_module', name:'Damage recovery', desc:'Photo evidence, damage cost estimation, and partial deposit forfeiture workflow.', live:false },
      { key:'contract_signatures', name:'Contract signatures', desc:'Capture an on-screen customer signature on a rental agreement at dispatch. Editable template in the Workspace tab.', live:true },
    ];

    // ---------- identity ----------
    function hydrateIdentity() {
      const cu = state.data.current_user;
      const ws = state.data.workspace;
      document.getElementById('ws-name').textContent = state.data.workspace.legal_name || 'Workspace';
      document.getElementById('ws-loc').textContent = ws.city || ws.place_of_supply || '';
      const first = (cu.display_name || '').split(' ')[0] || 'You';
      document.getElementById('user-name').textContent = first;
      document.getElementById('user-role').textContent = (cu.role || '').toUpperCase();
      document.getElementById('user-avatar').textContent = first[0]?.toUpperCase() ?? 'U';
      document.getElementById('tb-kicker').textContent = `${ws.legal_name || 'Workspace'}${ws.city ? ' · ' + ws.city : (ws.place_of_supply ? ' · ' + ws.place_of_supply : '')}`;
    }

    function isOwner() { return state.data?.current_user?.role === 'owner'; }
    function canEditMetadata() { return ['owner', 'manager'].includes(state.data?.current_user?.role); }

    // ---------- load ----------
    async function load() {
      try {
        await ensureAuth();
        state.data = await api.get('/api/workspace');
        resetForm();
        hydrateIdentity();
        const hash = (location.hash || '#workspace').slice(1);
        state.tab = ['workspace', 'features', 'integrations', 'custom-fields', 'locations', 'users'].includes(hash) ? hash : 'workspace';
        render();
      } catch (err) {
        document.getElementById('content').innerHTML =
          `<div class="card"><h3>Couldn't load settings</h3><p class="card-sub">${escapeHtml(err.body?.error || err.message || 'error')}</p></div>`;
      }
    }

    // Editable (non-feature) slice of state, cloned for dirty diffing.
    function resetForm() {
      const w = state.data.workspace, s = state.data.settings;
      state.form = {
        workspace: {
          legal_name: w.legal_name ?? '', gstin: w.gstin ?? '', pan: w.pan ?? '',
          place_of_supply: w.place_of_supply ?? '', phone: w.phone ?? '', email: w.email ?? '',
          address_line1: w.address_line1 ?? '', address_line2: w.address_line2 ?? '',
          city: w.city ?? '', state: w.state ?? '', postal_code: w.postal_code ?? '',
        },
        settings: {
          billing: { ...s.billing },
          tax: { ...s.tax },
          invoice: { ...s.invoice },
          bank_details: { ...s.bank_details },
          contract: { template_text: s.contract?.template_text ?? '', template_version: s.contract?.template_version ?? 'v1' },
          reminders: JSON.parse(JSON.stringify(s.reminders ?? {})),
        },
      };
      state.baseline = JSON.parse(JSON.stringify(state.form));
    }
    function isDirty() { return JSON.stringify(state.form) !== JSON.stringify(state.baseline); }

    // ---------- render ----------
    function render() {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === state.tab));
      renderTopbar();
      const el = document.getElementById('content');
      if (state.tab === 'workspace') { el.innerHTML = workspaceTab(); wireWorkspaceTab(); }
      else if (state.tab === 'features') { el.innerHTML = featuresTab(); wireFeaturesTab(); }
      else if (state.tab === 'integrations') { el.innerHTML = integrationsTab(); wireIntegrationsTab(); }
      else if (state.tab === 'custom-fields') { el.innerHTML = customFieldsTab(); wireCustomFieldsTab(); }
      else if (state.tab === 'locations') { el.innerHTML = locationsTab(); wireLocationsTab(); }
      else { el.innerHTML = usersTab(); }
    }

    function renderTopbar() {
      const wrap = document.getElementById('tb-actions');
      if (state.tab === 'workspace' && isDirty()) {
        wrap.innerHTML = `<button class="btn ghost" id="btn-discard">Discard</button><button class="btn primary" id="btn-save">Save changes</button>`;
        document.getElementById('btn-discard').addEventListener('click', () => { resetForm(); render(); });
        document.getElementById('btn-save').addEventListener('click', saveWorkspace);
      } else {
        wrap.innerHTML = '';
      }
    }

    // ---------- workspace tab ----------
    function txt(path, label, opts = {}) {
      const val = getByPath(state.form, path) ?? '';
      const dis = canEditMetadata() ? '' : 'disabled';
      const attrs = [`data-field="${path}"`, opts.mono ? 'class="mono"' : '', opts.upper ? 'data-upper="1"' : '', dis].join(' ');
      const list = opts.list ? ` list="${opts.list}"` : '';
      return `<div class="field"><label>${escapeHtml(label)}${opts.hint ? `<span class="hint">${escapeHtml(opts.hint)}</span>` : ''}</label>
        <input type="${opts.type || 'text'}" ${attrs}${list} value="${escapeAttr(val)}"${opts.min != null ? ` min="${opts.min}"` : ''}${opts.max != null ? ` max="${opts.max}"` : ''} autocomplete="off"></div>`;
    }
    function area(path, label, opts = {}) {
      const val = getByPath(state.form, path) ?? '';
      const dis = canEditMetadata() ? '' : 'disabled';
      return `<div class="field"><label>${escapeHtml(label)}${opts.hint ? `<span class="hint">${escapeHtml(opts.hint)}</span>` : ''}</label>
        <textarea data-field="${path}" ${dis}>${escapeHtml(val)}</textarea></div>`;
    }

    function workspaceTab() {
      const s = state.form.settings;
      const dis = canEditMetadata() ? '' : 'disabled';
      const roleNote = canEditMetadata() ? '' : `<div class="notice">You have read-only access. Only owners and managers can edit workspace settings.</div>`;
      return `
        ${roleNote}
        <datalist id="states-list">${INDIAN_STATES.map(st => `<option value="${escapeAttr(st)}"></option>`).join('')}</datalist>
        <div class="card">
          <div class="section-h">Business identity</div>
          ${txt('workspace.legal_name', 'Legal name')}
          <div class="field-row">
            ${txt('workspace.gstin', 'GSTIN', { upper: true })}
            ${txt('workspace.pan', 'PAN', { upper: true })}
          </div>
          ${txt('workspace.place_of_supply', 'Place of supply', { hint: 'Indian state', list: 'states-list' })}
        </div>
        <div class="card">
          <div class="section-h">Contact</div>
          <div class="field-row">
            ${txt('workspace.phone', 'Phone')}
            ${txt('workspace.email', 'Email', { type: 'email' })}
          </div>
          ${txt('workspace.address_line1', 'Address line 1')}
          ${txt('workspace.address_line2', 'Address line 2')}
          <div class="field-row">
            ${txt('workspace.city', 'City')}
            ${txt('workspace.state', 'State', { list: 'states-list' })}
          </div>
          ${txt('workspace.postal_code', 'Postal code')}
        </div>
        <div class="card">
          <div class="section-h">Billing</div>
          <div class="field">
            <label>Rounding rule</label>
            <select data-field="settings.billing.rounding_rule" ${dis}>
              <option value="24_hour_windows" ${s.billing.rounding_rule === '24_hour_windows' ? 'selected' : ''}>24-hour windows</option>
              <option value="calendar_day" ${s.billing.rounding_rule === 'calendar_day' ? 'selected' : ''}>Calendar day</option>
            </select>
          </div>
          <div class="field-row">
            ${txt('settings.billing.grace_period_hours', 'Grace period (hours)', { type: 'number', min: 0, max: 72 })}
            ${txt('settings.billing.minimum_days', 'Minimum days', { type: 'number', min: 1, max: 30 })}
          </div>
        </div>
        <div class="card">
          <div class="section-h">Tax</div>
          <div class="field-row">
            ${txt('settings.tax.default_gst_percent', 'Default GST %', { type: 'number', min: 0, max: 100 })}
            <div class="field"><label>Charge GST by default</label>
              <div class="toggle-field"><span class="tl">${s.tax.charge_gst_by_default ? 'Enabled' : 'Disabled'}</span>
                <label class="switch"><input type="checkbox" data-field="settings.tax.charge_gst_by_default" ${s.tax.charge_gst_by_default ? 'checked' : ''} ${dis}><span class="track"></span></label>
              </div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="section-h">Invoice</div>
          ${txt('settings.invoice.number_format', 'Number format', { mono: true, hint: 'Supports {order}, {seq}, {rev}, YYYY, MM, DD placeholders' })}
          ${area('settings.invoice.terms', 'Terms')}
          ${txt('settings.invoice.default_due_days', 'Default due days', { type: 'number', min: 0, max: 365 })}
        </div>
        <div class="card">
          <details class="collapsible">
            <summary>Bank details</summary>
            <div class="field-row">
              ${txt('settings.bank_details.account_name', 'Account name')}
              ${txt('settings.bank_details.bank_name', 'Bank name')}
            </div>
            <div class="field-row">
              ${txt('settings.bank_details.account_number', 'Account number')}
              ${txt('settings.bank_details.ifsc', 'IFSC', { upper: true })}
            </div>
            <div class="field-row">
              ${txt('settings.bank_details.branch', 'Branch')}
              ${txt('settings.bank_details.upi_id', 'UPI ID')}
            </div>
          </details>
        </div>
        <div class="card">
          <div class="section-h">Contract template</div>
          <p class="card-sub">Used when customers sign a rental agreement at dispatch (enable the <strong>Contract signatures</strong> feature). Insert variables in curly braces.</p>
          <div class="template-variables">
            ${['{customer_name}','{customer_phone}','{order_number}','{rental_start}','{rental_end}','{total_amount}','{deposit_required}','{items_list}','{workspace_name}'].map(v => `<span class="var-chip">${escapeHtml(v)}</span>`).join('')}
          </div>
          <div class="field">
            <textarea data-field="settings.contract.template_text" class="mono contract-template" rows="15" ${dis}>${escapeHtml(s.contract?.template_text ?? '')}</textarea>
          </div>
          <p class="card-sub">Editing this only affects contracts signed <strong>after</strong> the change — existing signed contracts stay frozen.</p>
        </div>
        ${remindersSectionHtml()}`;
    }

    function reminderTemplateBlock(key, title, tmpl, dis, extraFields) {
      const chan = (v) => (Array.isArray(tmpl.channels) && tmpl.channels.includes(v)) ? 'checked' : '';
      const varsCsv = (tmpl.whatsapp?.variable_order || []).join(', ');
      const base = `settings.reminders.templates.${key}`;
      const extra = extraFields.map(([field, label, min, max]) => `
        <div class="field field-narrow">
          <label>${escapeHtml(label)}</label>
          <input type="number" data-field="${base}.${field}" min="${min}" max="${max}" value="${escapeAttr(tmpl[field] ?? '')}" ${dis}>
        </div>`).join('');
      return `
        <div class="template-block">
          <div class="template-header">
            <h4>${escapeHtml(title)}</h4>
            <label class="switch-inline"><input type="checkbox" data-field="${base}.enabled" ${tmpl.enabled ? 'checked' : ''} ${dis}> Enabled</label>
          </div>
          <div class="field-row">${extra}</div>
          <div class="channel-priority">
            <label class="mini-label">Channel priority (tried in order, falls back if unavailable)</label>
            <div class="channel-checkboxes">
              <label><input type="checkbox" data-rem-chan="${key}" value="whatsapp" ${chan('whatsapp')} ${dis}> WhatsApp (primary)</label>
              <label><input type="checkbox" data-rem-chan="${key}" value="email" ${chan('email')} ${dis}> Email (fallback)</label>
            </div>
            <p class="hint-sub">Check both for automatic fallback. Uncheck all to disable this reminder's sends.</p>
          </div>
          <details class="channel-config" open>
            <summary>WhatsApp template</summary>
            <div class="field"><label>Template name (as approved in WATI)</label>
              <input type="text" data-field="${base}.whatsapp.template_name" value="${escapeAttr(tmpl.whatsapp?.template_name ?? '')}" placeholder="invoice_upcoming_reminder" ${dis}></div>
            <div class="field"><label>Variable order (comma-separated, must match {{1}},{{2}}… in WATI)</label>
              <input type="text" data-rem-vars="${key}" value="${escapeAttr(varsCsv)}" placeholder="customer_name, invoice_number, total_amount, due_date" ${dis}></div>
          </details>
          <details class="channel-config">
            <summary>Email template</summary>
            <div class="field"><label>Subject</label>
              <input type="text" data-field="${base}.email.subject" value="${escapeAttr(tmpl.email?.subject ?? '')}" ${dis}></div>
            <div class="field"><label>Body</label>
              <textarea class="mono" rows="8" data-field="${base}.email.body" ${dis}>${escapeHtml(tmpl.email?.body ?? '')}</textarea></div>
          </details>
        </div>`;
    }

    function remindersSectionHtml() {
      const r = state.form.settings.reminders || {};
      const t = r.templates || {};
      const dis = canEditMetadata() ? '' : 'disabled';
      return `
        <div class="card">
          <div class="section-h">Invoice reminders</div>
          <p class="card-sub">Automated reminders via WhatsApp and/or email. Configure providers in the <strong>Integrations</strong> tab first. Variables use {curly_braces}.</p>
          <div class="field">
            <label>Sender name</label>
            <input type="text" data-field="settings.reminders.sender_name" value="${escapeAttr(r.sender_name ?? '')}" placeholder="DSLRSWALA Rentals" ${dis}>
          </div>
          ${reminderTemplateBlock('invoice_upcoming', 'Upcoming due reminder', t.invoice_upcoming || {}, dis, [['days_before_due', 'Days before due', 0, 30]])}
          ${reminderTemplateBlock('invoice_overdue', 'Overdue reminder', t.invoice_overdue || {}, dis, [['days_after_due', 'Days after due', 0, 90], ['repeat_every_days', 'Repeat every N days', 1, 90]])}
          <div class="template-variables" style="margin-top:10px;">
            ${['customer_name','invoice_number','total_amount','due_date','days_overdue','order_number','rental_start','rental_end','workspace_name','workspace_email','workspace_phone'].map(v => `<span class="var-chip">${escapeHtml(v)}</span>`).join('')}
          </div>
        </div>`;
    }

    function ensureRemTemplate(key) {
      const s = state.form.settings;
      s.reminders = s.reminders || {};
      s.reminders.templates = s.reminders.templates || {};
      s.reminders.templates[key] = s.reminders.templates[key] || {};
      return s.reminders.templates[key];
    }
    function wireRemindersExtras() {
      document.querySelectorAll('[data-rem-chan]').forEach(cb => {
        cb.addEventListener('change', () => {
          const tmpl = ensureRemTemplate(cb.dataset.remChan);
          const set = new Set(Array.isArray(tmpl.channels) ? tmpl.channels : []);
          if (cb.checked) set.add(cb.value); else set.delete(cb.value);
          tmpl.channels = ['whatsapp', 'email'].filter(x => set.has(x)); // preserve priority
          renderTopbar();
        });
      });
      document.querySelectorAll('[data-rem-vars]').forEach(inp => {
        inp.addEventListener('input', () => {
          const tmpl = ensureRemTemplate(inp.dataset.remVars);
          tmpl.whatsapp = tmpl.whatsapp || {};
          tmpl.whatsapp.variable_order = inp.value.split(',').map(x => x.trim()).filter(Boolean);
          renderTopbar();
        });
      });
    }

    function wireWorkspaceTab() {
      document.querySelectorAll('[data-field]').forEach(el => {
        const path = el.dataset.field;
        const evt = (el.type === 'checkbox' || el.tagName === 'SELECT') ? 'change' : 'input';
        el.addEventListener(evt, () => {
          let v;
          if (el.type === 'checkbox') v = el.checked;
          else if (el.type === 'number') v = el.value === '' ? '' : Number(el.value);
          else {
            v = el.value;
            if (el.dataset.upper) { const p = el.selectionStart; el.value = v = v.toUpperCase(); try { el.setSelectionRange(p, p); } catch {} }
          }
          setByPath(state.form, path, v);
          renderTopbar();
        });
      });
      wireRemindersExtras();
    }

    async function saveWorkspace() {
      const btn = document.getElementById('btn-save');
      if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
      // Normalize number fields (empty → keep server default by omitting).
      const payload = { workspace: { ...state.form.workspace }, settings: JSON.parse(JSON.stringify(state.form.settings)) };
      // strip empty-string numbers so Zod doesn't choke
      for (const k of ['grace_period_hours', 'minimum_days']) if (payload.settings.billing[k] === '') delete payload.settings.billing[k];
      if (payload.settings.tax.default_gst_percent === '') delete payload.settings.tax.default_gst_percent;
      if (payload.settings.invoice.default_due_days === '') delete payload.settings.invoice.default_due_days;
      try {
        const res = await api.patch('/api/workspace/settings', payload);
        state.data = res;
        resetForm();
        hydrateIdentity();
        render();
        showToast('Settings saved');
      } catch (err) {
        if (btn) { btn.disabled = false; btn.textContent = 'Save changes'; }
        showToast('Save failed: ' + (err.body?.error || err.message));
      }
    }

    // ---------- features tab ----------
    function featuresTab() {
      const feats = state.data.settings.features || {};
      const owner = isOwner();
      const rows = FLAGS.map(f => {
        const on = feats[f.key] === true;
        const badge = f.live ? '<span class="live-badge">Live</span>' : '<span class="soon-badge">Coming soon</span>';
        const enabled = f.live && owner;
        const title = !f.live ? 'Not yet available' : (!owner ? 'Only workspace owner can change feature flags' : '');
        return `<div class="flag-row">
          <div class="flag-main">
            <div class="flag-name">${escapeHtml(f.name)} ${badge}</div>
            <div class="flag-desc">${escapeHtml(f.desc)}</div>
          </div>
          <label class="switch ${enabled ? '' : 'disabled'}" title="${escapeAttr(title)}">
            <input type="checkbox" data-flag="${escapeAttr(f.key)}" ${on ? 'checked' : ''} ${enabled ? '' : 'disabled'}>
            <span class="track"></span>
          </label>
        </div>`;
      }).join('');
      const note = owner ? '' : `<div class="notice"><strong>Feature flags are owner-only.</strong>You can view flags but only the workspace owner can toggle them.</div>`;
      return `${note}<div class="card"><h3>Feature flags</h3><p class="card-sub">Enable capabilities per workspace. Some are still in development.</p>${rows}</div>`;
    }

    function wireFeaturesTab() {
      document.querySelectorAll('[data-flag]').forEach(cb => {
        cb.addEventListener('change', () => toggleFlag(cb.dataset.flag, cb.checked, cb));
      });
    }

    async function toggleFlag(key, value, cb) {
      const meta = FLAGS.find(f => f.key === key);
      try {
        const res = await api.patch('/api/workspace/settings', { settings: { features: { [key]: value } } });
        state.data = res;
        showToast(`${meta?.name || key} ${value ? 'enabled' : 'disabled'}`);
      } catch (err) {
        cb.checked = !value; // revert
        showToast('Could not update flag: ' + (err.body?.error || err.message));
      }
    }

    // ---------- custom fields tab (Sub-turn 6g) ----------
    let cfEntity = 'order';
    let cfDefs = [];
    const CF_ENTITY_LABEL = { order: 'Orders', person: 'People', product: 'Products' };
    const CF_TYPE_LABEL = { text: 'Text', number: 'Number', date: 'Date', checkbox: 'Checkbox', dropdown: 'Dropdown' };

    function customFieldsTab() {
      const owner = canEditMetadata();
      const note = owner ? '' : `<div class="notice">Only owners and managers can manage custom fields. Values are still editable on each record.</div>`;
      const subtabs = ['order', 'person', 'product'].map(e =>
        `<button class="cf-subtab ${cfEntity === e ? 'active' : ''}" data-cf-entity="${e}">${CF_ENTITY_LABEL[e]}</button>`).join('');
      return `${note}
        <div class="cf-subtabs">${subtabs}</div>
        <div class="card">
          <div class="cf-header">
            <h3 class="cf-title">${CF_ENTITY_LABEL[cfEntity]} custom fields</h3>
            ${owner ? `<button class="btn primary" id="cf-add-btn">+ Add field</button>` : ''}
          </div>
          <div class="cf-rows" id="cf-rows"><div class="loading">Loading…</div></div>
        </div>`;
    }

    function wireCustomFieldsTab() {
      document.querySelectorAll('[data-cf-entity]').forEach(b =>
        b.addEventListener('click', () => { cfEntity = b.dataset.cfEntity; render(); }));
      const add = document.getElementById('cf-add-btn');

      loadCfDefs();
    }

    async function loadCfDefs() {
      try {
        const { definitions } = await api.get(`/api/custom-fields/definitions?entity_type=${cfEntity}`);
        cfDefs = definitions || [];
      } catch { cfDefs = []; }
      renderCfRows();
    }

    function renderCfRows() {
      const rows = document.getElementById('cf-rows');
      if (!rows) return;
      const owner = canEditMetadata();
      if (!cfDefs.length) {
        rows.innerHTML = `<div class="cf-empty">No custom fields yet. Add one to capture per-${cfEntity} data.</div>`;
        return;
      }
      rows.innerHTML = cfDefs.map(d => `
        <div class="cf-row" data-id="${escapeAttr(d.id)}">
          <div class="cf-info">
            <div class="cf-label">${escapeHtml(d.label)}${d.is_required ? ' <span class="cf-req">Required</span>' : ''}</div>
            <div class="cf-meta"><code>${escapeHtml(d.field_key)}</code> · <span class="cf-type">${escapeHtml(CF_TYPE_LABEL[d.field_type] || d.field_type)}</span>${d.field_type === 'dropdown' && Array.isArray(d.options) ? ` · ${d.options.length} option${d.options.length === 1 ? '' : 's'}` : ''}</div>
          </div>
          ${owner ? `<div class="cf-actions">
            <button class="btn ghost tiny" data-cf-edit="${escapeAttr(d.id)}">Edit</button>
            <button class="btn ghost tiny" data-cf-del="${escapeAttr(d.id)}">Delete</button>
          </div>` : ''}
        </div>`).join('');
      rows.querySelectorAll('[data-cf-edit]').forEach(b => b.addEventListener('click', () => openCfModal(b.dataset.cfEdit)));
      rows.querySelectorAll('[data-cf-del]').forEach(b => b.addEventListener('click', () => deleteCf(b.dataset.cfDel)));
    }

    function slugifyKey(s) {
      return String(s || '').toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '').replace(/^([0-9])/, 'f_$1').slice(0, 50);
    }

    function openCfModal(id) {
      const editing = id ? cfDefs.find(d => d.id === id) : null;
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal">
          <div class="modal-head">
            <h3>${editing ? 'Edit' : 'Add'} custom field</h3>
            <p class="card-sub">For ${escapeHtml(CF_ENTITY_LABEL[cfEntity])}</p>
          </div>
          <div class="modal-body">
            <div id="cf-err" class="form-error" style="display:none"></div>
            <div class="field"><label>Label *</label>
              <input type="text" id="cf-label" value="${escapeAttr(editing?.label ?? '')}" placeholder="e.g. Shoot Location"></div>
            <div class="field"><label>Field key *</label>
              <input type="text" id="cf-key" value="${escapeAttr(editing?.field_key ?? '')}" placeholder="shoot_location" ${editing ? 'disabled' : ''}>
              <p class="card-sub" style="margin:4px 0 0">Machine name — lowercase letters/numbers/underscore. ${editing ? 'Immutable after creation.' : 'Auto-fills from the label.'}</p></div>
            <div class="field"><label>Type *</label>
              <select id="cf-type">${Object.entries(CF_TYPE_LABEL).map(([v, l]) => `<option value="${v}" ${editing?.field_type === v ? 'selected' : ''}>${l}</option>`).join('')}</select></div>
            <div class="field" id="cf-options-wrap" style="display:${editing?.field_type === 'dropdown' ? 'block' : 'none'}">
              <label>Options (one per line)</label>
              <textarea id="cf-options" rows="4" placeholder="Commercial&#10;Wedding&#10;Documentary">${escapeHtml((editing?.options || []).join('\n'))}</textarea></div>
            <div class="field"><label>Help text <span class="hint">optional</span></label>
              <input type="text" id="cf-help" value="${escapeAttr(editing?.help_text ?? '')}" placeholder="Extra guidance shown below the field"></div>
            <label class="switch-inline"><input type="checkbox" id="cf-required" ${editing?.is_required ? 'checked' : ''}> Required field</label>
          </div>
          <div class="modal-foot">
            <button class="btn ghost" data-close>Cancel</button>
            <button class="btn primary" id="cf-save">Save</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      const close = () => overlay.remove();
      overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
      overlay.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', close));
      const typeSel = overlay.querySelector('#cf-type');
      typeSel.addEventListener('change', () => {
        overlay.querySelector('#cf-options-wrap').style.display = typeSel.value === 'dropdown' ? 'block' : 'none';
      });
      if (!editing) {
        const labelInp = overlay.querySelector('#cf-label');
        const keyInp = overlay.querySelector('#cf-key');
        labelInp.addEventListener('input', () => { if (!keyInp.dataset.touched) keyInp.value = slugifyKey(labelInp.value); });
        keyInp.addEventListener('input', () => { keyInp.dataset.touched = '1'; });
      }
      overlay.querySelector('#cf-save').addEventListener('click', () => saveCf(overlay, editing, close));
      setTimeout(() => overlay.querySelector('#cf-label').focus(), 40);
    }

    async function saveCf(overlay, editing, close) {
      const err = overlay.querySelector('#cf-err');
      err.style.display = 'none';
      const label = overlay.querySelector('#cf-label').value.trim();
      const field_key = overlay.querySelector('#cf-key').value.trim();
      const field_type = overlay.querySelector('#cf-type').value;
      const help_text = overlay.querySelector('#cf-help').value.trim();
      const is_required = overlay.querySelector('#cf-required').checked;
      const options = overlay.querySelector('#cf-options').value.split('\n').map(s => s.trim()).filter(Boolean);
      if (!label) { err.textContent = 'Label is required.'; err.style.display = 'block'; return; }
      if (!editing && !/^[a-z][a-z0-9_]{0,49}$/.test(field_key)) { err.textContent = 'Field key must start with a lowercase letter (lowercase letters/numbers/underscore only).'; err.style.display = 'block'; return; }
      if (field_type === 'dropdown' && !options.length) { err.textContent = 'A dropdown needs at least one option.'; err.style.display = 'block'; return; }
      const saveBtn = overlay.querySelector('#cf-save'); saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
      try {
        if (editing) {
          await api.patch(`/api/custom-fields/definitions/${editing.id}`, { label, field_type, options: field_type === 'dropdown' ? options : undefined, is_required, help_text: help_text || null });
        } else {
          await api.post('/api/custom-fields/definitions', { entity_type: cfEntity, field_key, label, field_type, options: field_type === 'dropdown' ? options : undefined, is_required, help_text: help_text || undefined });
        }
        close(); showToast('Custom field saved'); await loadCfDefs();
      } catch (ex) {
        saveBtn.disabled = false; saveBtn.textContent = 'Save';
        const code = ex.body?.error;
        err.textContent = code === 'field_key_taken' ? 'That field key is already in use for this entity.'
          : code === 'dropdown_options_required' ? 'A dropdown needs at least one option.'
          : code === 'insufficient_role' ? 'Only owners and managers can manage custom fields.'
          : ('Could not save: ' + (code || ex.message));
        err.style.display = 'block';
      }
    }

    async function deleteCf(id) {
      const d = cfDefs.find(x => x.id === id);
      if (!window.confirm(`Remove "${d?.label || 'this field'}" from forms? Existing values are preserved in the database. Continue?`)) return;
      try { await api.del(`/api/custom-fields/definitions/${id}`); showToast('Custom field removed'); await loadCfDefs(); }
      catch (ex) { showToast('Could not remove: ' + (ex.body?.error || ex.message)); }
    }

    // ---------- locations tab (Sub-turn 6i) ----------
    let locList = [];

    function locationsTab() {
      const owner = canEditMetadata();
      const note = owner ? '' : `<div class="notice">Only owners and managers can manage locations.</div>`;
      return `${note}
        <div class="card">
          <div class="cf-header">
            <div>
              <h3 class="cf-title">Locations</h3>
              <p class="card-sub" style="margin:2px 0 0">Warehouses / branches gear is stored at. Orders pick up and return from one location (Phase 1).</p>
            </div>
            ${owner ? `<button class="btn primary" id="loc-add-btn">+ Add location</button>` : ''}
          </div>
          <div class="cf-rows" id="loc-rows"><div class="loading">Loading…</div></div>
        </div>`;
    }

    function wireLocationsTab() {
      const add = document.getElementById('loc-add-btn');
      if (add) add.addEventListener('click', () => openLocModal(null));
      loadLocations();
    }

    async function loadLocations() {
      try {
        const { locations } = await api.get('/api/locations');
        locList = locations || [];
      } catch { locList = []; }
      renderLocRows();
    }

    function renderLocRows() {
      const rows = document.getElementById('loc-rows');
      if (!rows) return;
      const owner = canEditMetadata();
      if (!locList.length) {
        rows.innerHTML = `<div class="cf-empty">No locations yet.</div>`;
        return;
      }
      rows.innerHTML = locList.map(l => {
        const addr = [l.city, l.state].filter(Boolean).join(', ');
        return `
        <div class="cf-row" data-id="${escapeAttr(l.id)}">
          <div class="cf-info">
            <div class="cf-label">${escapeHtml(l.name)}
              ${l.is_default ? ' <span class="cf-req">Default</span>' : ''}
              ${!l.is_active ? ' <span class="cf-type" style="color:var(--muted)">Inactive</span>' : ''}</div>
            <div class="cf-meta">${addr ? escapeHtml(addr) + ' · ' : ''}${l.asset_count} asset${l.asset_count === 1 ? '' : 's'} · ${l.active_orders_count} active order${l.active_orders_count === 1 ? '' : 's'}</div>
          </div>
          ${owner ? `<div class="cf-actions">
            ${!l.is_default && l.is_active ? `<button class="btn ghost tiny" data-loc-default="${escapeAttr(l.id)}">Set default</button>` : ''}
            <button class="btn ghost tiny" data-loc-edit="${escapeAttr(l.id)}">Edit</button>
            ${!l.is_default ? `<button class="btn ghost tiny" data-loc-del="${escapeAttr(l.id)}">Delete</button>` : ''}
          </div>` : ''}
        </div>`;
      }).join('');
      rows.querySelectorAll('[data-loc-edit]').forEach(b => b.addEventListener('click', () => openLocModal(b.dataset.locEdit)));
      rows.querySelectorAll('[data-loc-del]').forEach(b => b.addEventListener('click', () => deleteLoc(b.dataset.locDel)));
      rows.querySelectorAll('[data-loc-default]').forEach(b => b.addEventListener('click', () => setDefaultLoc(b.dataset.locDefault)));
    }

    function openLocModal(id) {
      const editing = id ? locList.find(l => l.id === id) : null;
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal">
          <div class="modal-head">
            <h3>${editing ? 'Edit' : 'Add'} location</h3>
          </div>
          <div class="modal-body">
            <div id="loc-err" class="form-error" style="display:none"></div>
            <div class="field"><label>Name *</label>
              <input type="text" id="loc-name" value="${escapeAttr(editing?.name ?? '')}" placeholder="e.g. Vadodara Main"></div>
            <div class="field"><label>Address line 1 <span class="hint">optional</span></label>
              <input type="text" id="loc-a1" value="${escapeAttr(editing?.address_line1 ?? '')}"></div>
            <div class="field"><label>Address line 2 <span class="hint">optional</span></label>
              <input type="text" id="loc-a2" value="${escapeAttr(editing?.address_line2 ?? '')}"></div>
            <div class="field-row" style="display:flex;gap:12px">
              <div class="field" style="flex:1"><label>City <span class="hint">optional</span></label>
                <input type="text" id="loc-city" value="${escapeAttr(editing?.city ?? '')}"></div>
              <div class="field" style="flex:1"><label>State <span class="hint">optional</span></label>
                <select id="loc-state"><option value="">—</option>${INDIAN_STATES.map(s => `<option value="${escapeAttr(s)}" ${editing?.state === s ? 'selected' : ''}>${escapeHtml(s)}</option>`).join('')}</select></div>
            </div>
            <div class="field-row" style="display:flex;gap:12px">
              <div class="field" style="flex:1"><label>Postal code <span class="hint">optional</span></label>
                <input type="text" id="loc-pin" value="${escapeAttr(editing?.postal_code ?? '')}"></div>
              <div class="field" style="flex:1"><label>Phone <span class="hint">optional</span></label>
                <input type="text" id="loc-phone" value="${escapeAttr(editing?.phone ?? '')}"></div>
            </div>
            <div class="field"><label>Email <span class="hint">optional</span></label>
              <input type="text" id="loc-email" value="${escapeAttr(editing?.email ?? '')}"></div>
            <label class="switch-inline"><input type="checkbox" id="loc-default" ${editing?.is_default ? 'checked' : ''} ${editing?.is_default ? 'disabled' : ''}> Default location for new orders</label>
            ${editing && !editing.is_default ? `<label class="switch-inline"><input type="checkbox" id="loc-active" ${editing.is_active ? 'checked' : ''}> Active</label>` : ''}
          </div>
          <div class="modal-foot">
            <button class="btn ghost" data-close>Cancel</button>
            <button class="btn primary" id="loc-save">Save</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      const close = () => overlay.remove();
      overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
      overlay.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', close));
      overlay.querySelector('#loc-save').addEventListener('click', () => saveLoc(overlay, editing, close));
      setTimeout(() => overlay.querySelector('#loc-name').focus(), 40);
    }

    async function saveLoc(overlay, editing, close) {
      const err = overlay.querySelector('#loc-err');
      err.style.display = 'none';
      const val = sel => overlay.querySelector(sel).value.trim();
      const name = val('#loc-name');
      if (!name) { err.textContent = 'Name is required.'; err.style.display = 'block'; return; }
      const payload = {
        name,
        address_line1: val('#loc-a1') || null,
        address_line2: val('#loc-a2') || null,
        city: val('#loc-city') || null,
        state: val('#loc-state') || null,
        postal_code: val('#loc-pin') || null,
        phone: val('#loc-phone') || null,
        email: val('#loc-email') || null,
      };
      const defBox = overlay.querySelector('#loc-default');
      if (defBox && !defBox.disabled) payload.is_default = defBox.checked;
      const actBox = overlay.querySelector('#loc-active');
      if (actBox) payload.is_active = actBox.checked;
      const saveBtn = overlay.querySelector('#loc-save'); saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
      try {
        if (editing) await api.patch(`/api/locations/${editing.id}`, payload);
        else await api.post('/api/locations', payload);
        close(); showToast('Location saved'); await loadLocations();
      } catch (ex) {
        saveBtn.disabled = false; saveBtn.textContent = 'Save';
        const code = ex.body?.error;
        err.textContent = code === 'must_have_default' ? 'A workspace must keep one default location.'
          : code === 'cannot_deactivate_default' ? 'The default location cannot be deactivated.'
          : code === 'insufficient_role' ? 'Only owners and managers can manage locations.'
          : ('Could not save: ' + (code || ex.message));
        err.style.display = 'block';
      }
    }

    async function setDefaultLoc(id) {
      try { await api.patch(`/api/locations/${id}`, { is_default: true }); showToast('Default location updated'); await loadLocations(); }
      catch (ex) { showToast('Could not set default: ' + (ex.body?.error || ex.message)); }
    }

    async function deleteLoc(id) {
      const l = locList.find(x => x.id === id);
      const referenced = l && ((l.asset_count > 0) || (l.active_orders_count > 0));
      const msg = referenced
        ? `"${l?.name}" has assets or orders — it will be deactivated (hidden), not deleted. Continue?`
        : `Delete "${l?.name || 'this location'}"? This cannot be undone.`;
      if (!window.confirm(msg)) return;
      try {
        const res = await api.del(`/api/locations/${id}`);
        showToast(res.soft_deleted ? 'Location deactivated' : 'Location deleted');
        await loadLocations();
      } catch (ex) {
        const code = ex.body?.error;
        showToast(code === 'cannot_delete_default' ? 'The default location cannot be deleted.' : ('Could not delete: ' + (code || ex.message)));
      }
    }

    // ---------- users tab ----------
    function usersTab() {
      const users = state.data.users || [];
      const rows = users.map(u => `
        <tr>
          <td><strong>${escapeHtml(u.display_name)}</strong></td>
          <td>${escapeHtml(u.email)}</td>
          <td><span class="role-pill role-${escapeAttr(u.role)}">${escapeHtml(u.role)}</span></td>
          <td><span class="status-dot ${u.is_active ? '' : 'inactive'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>

          </table>
