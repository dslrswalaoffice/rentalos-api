name: Quote expiry monitor

# Daily: fire "expiring soon" reminders (N days before valid_until, per policy)
# and expire quotes past valid_until. Idempotent + self-throttling
# (expiry_notified_at flag + status guard).
#
# OPERATIONAL REQUIREMENT (see docs/CRON_JOBS.md):
#   REMINDER_TRIGGER_SECRET must exist BOTH as a GitHub Actions repository secret
#   (this workflow reads it) AND as a Vercel project env var (the endpoint checks
#   it), with the SAME value.
on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC ≈ 09:30 IST
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Verify REMINDER_TRIGGER_SECRET is configured
        env:
          SECRET: ${{ secrets.REMINDER_TRIGGER_SECRET }}
        run: |
          if [ -z "$SECRET" ]; then
            echo "::error title=Missing secret::REMINDER_TRIGGER_SECRET is not set in this repo's GitHub Actions secrets."
            echo "Fix: Settings -> Secrets and variables -> Actions -> New repository secret."
            echo "Name: REMINDER_TRIGGER_SECRET  |  Value: must match the REMINDER_TRIGGER_SECRET env var in the Vercel project."
            exit 1
          fi

      - name: Ping quote-tick
        env:
          SECRET: ${{ secrets.REMINDER_TRIGGER_SECRET }}
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST https://rentalos-api.vercel.app/api/cron/quote-tick \
            -H "X-Reminder-Secret: $SECRET")
          echo "HTTP $RESPONSE"
          echo "Response body:"; cat /tmp/response.json || true; echo
          if [ "$RESPONSE" != "200" ]; then
            echo "::error title=quote-tick failed::HTTP $RESPONSE - see the response body above."
            echo "401 unauthorized -> the GitHub secret differs from the Vercel env var."
            echo "503 cron_secret_not_configured -> REMINDER_TRIGGER_SECRET is missing in the Vercel project env."
            exit 1
          fi
