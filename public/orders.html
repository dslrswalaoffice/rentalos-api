<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#202058">
  <title>Orders · RentalOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23e88020'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='Space Grotesk,Inter,sans-serif' font-weight='800' font-size='19' fill='%23202058'%3ER%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --ink:            #202058;
      --text:           #464a52;
      --head:           #26235a;
      --muted:          #8b9199;
      --muted-strong:   #5b616b;
      --muted-soft:     #9aa1ad;
      --card:           #ffffff;
      --bg:             #f6f7f9;
      --side:           #fcfcfd;
      --chrome:         #f4f5f7;
      --thead:          #fafbfc;
      --border:         #e6e8ec;
      --border-strong:  #d8dbe0;
      --accent-soft:    #ecebf4;
      --border-accent:  #d7dcf7;
      --orange:         #e88020;
      --orange-soft:    #fbe9d7;
      --focus:          #b9c0ee;
      --ok-solid:       #1f9d57;
      --ok-soft:        #e8f6ee;
      --ok-strong:      #177a45;
      --warn-solid:     #b9791b;
      --warn-soft:      #fbf2e2;
      --warn-strong:    #8a5a12;
      --bad-solid:      #cc3340;
      --bad-soft:       #fbeaeb;
      --bad-strong:     #a3272f;
      --font-display: 'Arzachel', 'Space Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body:    'Ponjoung', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Consolas, monospace;
      --sb-w: 232px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: var(--font-body);
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    ::selection { background: #d9d8ea; }
    button, a { transition: background-color .14s ease, color .14s ease, border-color .14s ease, box-shadow .16s ease, transform .08s ease; }
    button:not(:disabled):active { transform: translateY(0.5px); }
    ::-webkit-scrollbar { width: 11px; height: 11px; }
    ::-webkit-scrollbar-thumb { background: #d3d7dd; border-radius: 7px; border: 3px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: #bfc4cc; border: 3px solid transparent; background-clip: padding-box; }

    /* ========== app shell ========== */
    .app { display: grid; grid-template-columns: var(--sb-w) minmax(0, 1fr); min-height: 100dvh; }

    /* ========== sidebar ========== */
    .sb { background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 18px 14px 14px; position: sticky; top: 0; height: 100dvh; overflow-y: auto; }
    .sb-brand { display: flex; align-items: center; gap: 10px; padding: 6px 6px 20px; }
    .sb-brand .logo { width: 30px; height: 30px; border-radius: 8px; background: var(--orange); color: var(--ink); display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 800; font-size: 17px; flex-shrink: 0; }
    .sb-brand .word { font-family: var(--font-display); font-weight: 600; font-size: 17px; letter-spacing: -0.01em; color: var(--ink); }
    .sb-brand .env { margin-left: auto; font-family: var(--font-mono); font-size: 8.5px; font-weight: 600; letter-spacing: 0.12em; color: var(--warn-strong); background: var(--warn-soft); padding: 2px 7px; border-radius: 999px; }
    .sb-nav { display: flex; flex-direction: column; gap: 2px; }
    .sb-workspace { display: flex; align-items: baseline; gap: 8px; width: 100%; margin: 14px 0 8px; padding: 8px 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-family: inherit; text-align: left; transition: border-color 0.14s ease, background 0.14s ease; }
    .sb-workspace:hover { border-color: var(--border-strong); background: var(--thead); }
    .sb-workspace-name { font-family: var(--font-display); font-weight: 600; font-size: 12.5px; letter-spacing: 0.02em; color: var(--ink); }
    .sb-workspace-loc { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; }
    .sb-workspace svg { margin-left: auto; color: var(--muted); align-self: center; }
    .sb-item { display: flex; align-items: center; gap: 10px; padding: 8px 8px; border-radius: 9px; text-decoration: none; color: var(--muted-strong); font-size: 13px; font-weight: 500; position: relative; }
    .sb-item:hover { background: var(--bg); color: var(--ink); }
    .sb-item.active { background: var(--accent-soft); color: var(--head); font-weight: 600; }
    .sb-item .tile { width: 26px; height: 26px; border-radius: 7px; background: #eef0f3; color: var(--muted); display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 9.5px; font-weight: 700; flex-shrink: 0; }
    .sb-item.active .tile { background: var(--head); color: #fff; }
    .sb-item.new .tile { background: var(--orange); color: #fff; }
    .sb-user { margin-top: auto; padding: 12px 8px 4px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .sb-user-avatar { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, #26235a, #4b47a3); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 13px; flex-shrink: 0; }
    .sb-user-info { min-width: 0; flex: 1; }
    .sb-user-name { font-size: 12.5px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sb-user-role { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; margin-top: 1px; }

    /* ========== main ========== */
    .main { min-width: 0; background: var(--bg); display: flex; flex-direction: column; }
    .topbar { display: flex; align-items: center; gap: 16px; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--card); position: sticky; top: 0; z-index: 40; }
    .kicker { font-family: var(--font-mono); font-size: 9.5px; font-weight: 600; letter-spacing: 0.14em; color: var(--muted-soft); text-transform: uppercase; }
    .page-title { font-family: var(--font-display); font-weight: 600; font-size: 17px; letter-spacing: -0.005em; color: var(--ink); margin-top: 1px; }
    .search { display: flex; align-items: center; gap: 8px; padding: 7px 12px; border: 1px solid var(--border); border-radius: 9px; background: var(--thead); cursor: text; min-width: 320px; color: var(--muted-soft); transition: border-color 0.14s ease, background 0.14s ease; }
    .search:hover { border-color: var(--border-strong); background: var(--card); }
    .search:focus-within { border-color: var(--focus); background: var(--card); box-shadow: 0 0 0 4px rgba(185, 192, 238, 0.24); }
    .search input { border: none; outline: none; background: transparent; font-family: var(--font-body); font-size: 12.5px; color: var(--ink); flex: 1; min-width: 0; }
    .search input::placeholder { color: var(--muted-soft); }
    .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .primary-cta { display: inline-flex; align-items: center; gap: 7px; padding: 8px 14px; background: var(--orange); color: #fff; border: none; border-radius: 9px; font-family: var(--font-body); font-weight: 600; font-size: 12.5px; cursor: pointer; text-decoration: none; box-shadow: 0 4px 12px -4px rgba(232, 128, 32, 0.5); }
    .primary-cta:hover { background: #d97517; box-shadow: 0 6px 14px -4px rgba(232, 128, 32, 0.55); }

    .content { padding: 22px 24px 40px; }

    /* Header row */
    .content-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; gap: 12px; flex-wrap: wrap; }
    .content-head h3 { font-family: var(--font-display); font-weight: 600; font-size: 15px; letter-spacing: -0.005em; color: var(--ink); margin: 0; }
    .content-head .sub { font-size: 12px; color: var(--muted); margin-left: 10px; }
    .category-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .cat-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border: 1px solid var(--border); border-radius: 999px; background: var(--card); font-family: var(--font-mono); font-size: 10.5px; font-weight: 600; letter-spacing: 0.02em; color: var(--muted-strong); cursor: pointer; text-transform: uppercase; }
    .cat-chip:hover { border-color: var(--border-strong); background: var(--thead); }
    .cat-chip.active { background: var(--head); color: #fff; border-color: var(--head); }
    .cat-chip .n { font-weight: 700; opacity: 0.65; }

    /* Orders table */
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    table.orders { width: 100%; border-collapse: collapse; }
    table.orders th { text-align: left; padding: 12px 16px; font-family: var(--font-mono); font-size: 9.5px; font-weight: 600; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); background: var(--thead); }
    table.orders td { padding: 14px 16px; border-top: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
    table.orders tr:first-child td { border-top: none; }
    table.orders tbody tr { cursor: pointer; }
    table.orders tr:hover td { background: var(--thead); }
    .order-total { font-family: var(--font-mono); font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; font-size: 13px; }
    .order-balance { font-family: var(--font-mono); font-size: 10px; color: var(--orange); margin-top: 2px; letter-spacing: 0.02em; }
    .order-num { font-family: var(--font-mono); font-weight: 700; color: var(--ink); font-size: 13.5px; letter-spacing: 0.02em; }
    .customer-name { font-weight: 600; color: var(--ink); }
    .customer-phone { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); letter-spacing: 0.03em; margin-top: 2px; }
    .rental-window { font-size: 12.5px; color: var(--muted-strong); font-variant-numeric: tabular-nums; }
    .rental-window .arrow { color: var(--muted-soft); margin: 0 4px; }
    .rental-sub { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.02em; }
    .status-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 999px; font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .status-pill::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .status-draft      { background: #eef0f3; color: var(--muted-strong); }
    .status-quoted     { background: var(--warn-soft); color: var(--warn-strong); }
    .status-confirmed  { background: var(--accent-soft); color: var(--head); }
    .status-dispatched { background: var(--orange-soft); color: var(--warn-strong); }
    .status-active     { background: var(--orange-soft); color: var(--warn-strong); }
    .status-returned   { background: var(--ok-soft); color: var(--ok-strong); }
    .status-closed     { background: var(--ok-soft); color: var(--ok-strong); }
    .status-cancelled  { background: var(--bad-soft); color: var(--bad-strong); }
    .channel-tag { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 5px; background: var(--accent-soft); color: var(--head); font-family: var(--font-mono); font-size: 9.5px; font-weight: 600; letter-spacing: 0.02em; margin-top: 3px; text-transform: uppercase; }
    .channel-tag.walk-in { background: var(--orange-soft); color: var(--warn-strong); }
    .kebab { background: transparent; border: none; padding: 6px; border-radius: 6px; cursor: pointer; color: var(--muted); }
    .kebab:hover { background: var(--bg); color: var(--ink); }

    /* Empty state */
    .empty { background: var(--card); border: 1px dashed var(--border-strong); border-radius: 14px; padding: 56px 24px; text-align: center; }
    .empty-icon { width: 56px; height: 56px; margin: 0 auto 18px; border-radius: 14px; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; color: var(--head); }
    .empty h4 { font-family: var(--font-display); font-weight: 600; font-size: 17px; color: var(--ink); margin: 0 0 6px; letter-spacing: -0.005em; }
    .empty p { font-size: 13px; color: var(--muted); margin: 0 0 22px; max-width: 420px; margin-left: auto; margin-right: auto; }
    .empty .primary-cta { display: inline-flex; }

    .loading { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; font-family: var(--font-mono); letter-spacing: 0.04em; text-transform: uppercase; }

    /* ========== responsive ========== */
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sb { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 12px 16px; }
      .sb-nav { display: none; }
      .sb-user { display: none; }
      .sb-workspace { display: none; }
      .sb-brand { padding: 0; }
      .search { min-width: 0; flex: 1; }
      table.orders th:nth-child(4), table.orders td:nth-child(4) { display: none; }
    }
    @media (max-width: 640px) {
      .content { padding: 16px; }
      .topbar { padding: 12px 16px; gap: 10px; }
      .page-title-block { display: none; }
    }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; } }
  </style>
</head>
<body>
  <div class="app">
    <!-- ============ SIDEBAR ============ -->
    <aside class="sb">
      <div class="sb-brand">
        <span class="logo">R</span>
        <span class="word">RentalOS</span>
        <span class="env">v0.1</span>
      </div>

      <a href="/new-order.html" class="sb-item new" style="margin-bottom:6px;">
        <span class="tile">NB</span>
        <span>New order</span>
      </a>

      <button class="sb-workspace" type="button" aria-label="Switch workspace">
        <span class="sb-workspace-name" id="ws-name">DSLRSWALA</span>
        <span class="sb-workspace-loc" id="ws-loc">Vadodara</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>

      <nav class="sb-nav" aria-label="Main">
        <a href="/dashboard.html" class="sb-item"><span class="tile">DB</span><span>Dashboard</span></a>
        <a href="/calendar.html" class="sb-item"><span class="tile">CL</span><span>Calendar</span></a>
        <a href="/orders.html" class="sb-item active" aria-current="page"><span class="tile">RN</span><span>Orders</span></a>
        <a href="/billing.html" class="sb-item"><span class="tile">BL</span><span>Billing</span></a>
        <a href="/inventory.html" class="sb-item"><span class="tile">IN</span><span>Inventory</span></a>
        <a href="/people.html" class="sb-item"><span class="tile">PE</span><span>People</span></a>
        <a href="/insights.html" class="sb-item"><span class="tile">IS</span><span>Insights</span></a>
        <a href="/settings.html" class="sb-item"><span class="tile">SY</span><span>Settings</span></a>
      </nav>

      <div class="sb-user">
        <span class="sb-user-avatar" id="user-avatar">A</span>
        <div class="sb-user-info">
          <div class="sb-user-name" id="user-name">Aamir</div>
          <div class="sb-user-role" id="user-role">OWNER</div>
        </div>
      </div>
    </aside>

    <!-- ============ MAIN ============ -->
    <div class="main">
      <header class="topbar">
        <div class="page-title-block">
          <div class="kicker">Orders</div>
          <div class="page-title">Every rental</div>
        </div>

        <label class="search" for="search-input">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3-3"></path></svg>
          <input id="search-input" type="search" placeholder="Search by customer or order number…" autocomplete="off">
        </label>

        <div class="topbar-actions">
          <a class="primary-cta" href="/new-order.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            New order
          </a>
        </div>
      </header>

      <div class="content">
        <div class="content-head">
          <div>
            <h3 style="display:inline;">All orders</h3>
            <span class="sub" id="orders-summary">loading…</span>
          </div>
          <div class="category-chips" id="status-chips"></div>
        </div>

        <div id="list-wrap">
          <div class="loading">Loading orders…</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { api, ensureAuth, formatINR } from '/_lib/api.js';

    // ---------- state ----------
    let allOrders = [];
    let counts = {};
    let activeStatus = null;
    let currentSearch = '';

    const STATUS_ORDER = ['draft', 'quoted', 'confirmed', 'dispatched', 'returned', 'closed'];
    const STATUS_LABELS = {
      draft: 'Draft', quoted: 'Quoted', confirmed: 'Confirmed',
      dispatched: 'Dispatched', active: 'Active', returned: 'Returned',
      closed: 'Closed', cancelled: 'Cancelled',
    };

    // ---------- hydrate identity ----------
    async function hydrateIdentity() {
      const { user, workspace } = await ensureAuth();
      document.getElementById('ws-name').textContent = workspace.name;
      document.getElementById('ws-loc').textContent = workspace.location || '';
      const first = (user.displayName || '').split(' ')[0] || 'You';
      document.getElementById('user-name').textContent = first;
      document.getElementById('user-role').textContent = user.role.toUpperCase();
      document.getElementById('user-avatar').textContent = first[0]?.toUpperCase() ?? 'U';
    }

    // ---------- fetch + render ----------
    async function loadOrders() {
      const params = new URLSearchParams();
      if (currentSearch) params.set('q', currentSearch);
      if (activeStatus) params.set('status', activeStatus);
      const url = '/api/orders' + (params.toString() ? '?' + params : '');
      const { orders, counts: c } = await api.get(url);
      allOrders = orders;
      if (!activeStatus && !currentSearch) counts = c || {};
      renderList();
      renderChips();
      renderSummary();
    }

    function renderList() {
      const wrap = document.getElementById('list-wrap');
      if (allOrders.length === 0) {
        wrap.innerHTML = currentSearch || activeStatus
          ? renderEmptyFiltered()
          : renderEmptyOrders();
        return;
      }
      wrap.innerHTML = `
        <div class="table-wrap">
          <table class="orders">
            <thead>
              <tr>
                <th style="width:90px;">Order #</th>
                <th>Customer</th>
                <th>Rental window</th>
                <th>Channel</th>
                <th>Status</th>
                <th style="text-align:right;">Total</th>
                <th style="width:44px;"></th>
              </tr>
            </thead>
            <tbody>
              ${allOrders.map(rowHtml).join('')}
            </tbody>
          </table>
        </div>
      `;
      // Whole row navigates to the order detail page.
      wrap.querySelectorAll('tbody tr[data-id]').forEach(tr => {
        tr.addEventListener('click', () => {
          location.href = '/order.html?id=' + encodeURIComponent(tr.dataset.id);
        });
      });
    }

    function rowHtml(o) {
      const window = formatWindow(o.rental_start, o.rental_end);
      const days = calcDays(o.rental_start, o.rental_end);
      const channelClass = o.channel === 'walk_in' ? 'walk-in' : '';
      return `
        <tr data-id="${o.id}">
          <td><div class="order-num">#${o.order_number}</div></td>
          <td>
            <div class="customer-name">${escapeHtml(o.customer_name)}</div>
            ${o.customer_phone ? `<div class="customer-phone">${escapeHtml(o.customer_phone)}</div>` : ''}
          </td>
          <td>
            <div class="rental-window">${window}</div>
            ${days ? `<div class="rental-sub">${days}</div>` : ''}
          </td>
          <td>
            <span class="channel-tag ${channelClass}">${escapeHtml(o.channel.replace('_', ' '))}</span>
          </td>
          <td>
            <span class="status-pill status-${escapeAttr(o.status)}">${STATUS_LABELS[o.status] || o.status}</span>
          </td>
          <td style="text-align:right;">
            <div class="order-total">${formatINR(o.total_paise)}</div>
            ${Number(o.balance_paise) > 0 ? `<div class="order-balance">balance ${formatINR(o.balance_paise)} due</div>` : ''}
          </td>
          <td>
            <button class="kebab" aria-label="More actions">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
            </button>
          </td>
        </tr>`;
    }

    function renderChips() {
      const wrap = document.getElementById('status-chips');
      const total = Number(counts.total || 0);
      if (total === 0) { wrap.innerHTML = ''; return; }
      const all = `<button class="cat-chip ${activeStatus === null ? 'active' : ''}" data-status="">All <span class="n">${total}</span></button>`;
      const items = STATUS_ORDER
        .filter(s => Number(counts[s === 'draft' ? 'drafts' : s]) > 0)
        .map(s => {
          const n = counts[s === 'draft' ? 'drafts' : s];
          return `<button class="cat-chip ${activeStatus === s ? 'active' : ''}" data-status="${s}">${STATUS_LABELS[s]} <span class="n">${n}</span></button>`;
        }).join('');
      wrap.innerHTML = all + items;
      wrap.querySelectorAll('.cat-chip').forEach(btn => {
        btn.addEventListener('click', () => {
          const s = btn.getAttribute('data-status');
          activeStatus = s || null;
          loadOrders();
        });
      });
    }

    function renderSummary() {
      const el = document.getElementById('orders-summary');
      if (allOrders.length === 0) { el.textContent = ''; return; }
      const total = Number(counts.total || allOrders.length);
      el.textContent = `${allOrders.length} showing · ${total} total`;
    }

    function renderEmptyOrders() {
      return `
        <div class="empty">
          <div class="empty-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          </div>
          <h4>No orders yet</h4>
          <p>Every rental starts here — customer, dates, gear. Draft it now, send the quote when you're ready.</p>
          <a class="primary-cta" href="/new-order.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            Create your first order
          </a>
        </div>`;
    }

    function renderEmptyFiltered() {
      return `
        <div class="empty">
          <h4 style="margin-top:0;">Nothing matches</h4>
          <p>No orders found for "${escapeHtml(currentSearch)}"${activeStatus ? ' in ' + STATUS_LABELS[activeStatus] : ''}. Try clearing the filter.</p>
        </div>`;
    }

    // ---------- formatters ----------
    function formatWindow(start, end) {
      if (!start || !end) return '<span style="color:var(--muted-soft);">Dates not set</span>';
      const s = new Date(start);
      const e = new Date(end);
      const opts = { day: 'numeric', month: 'short' };
      const sameYear = s.getFullYear() === e.getFullYear();
      const now = new Date();
      const optsWithYear = { ...opts, year: 'numeric' };
      const sFmt = s.toLocaleDateString('en-IN', sameYear && s.getFullYear() === now.getFullYear() ? opts : optsWithYear);
      const eFmt = e.toLocaleDateString('en-IN', e.getFullYear() === now.getFullYear() ? opts : optsWithYear);
      return `${sFmt}<span class="arrow">→</span>${eFmt}`;
    }

    function calcDays(start, end) {
      if (!start || !end) return null;
      const ms = new Date(end) - new Date(start);
      const days = Math.ceil(ms / (1000 * 60 * 60 * 24));
      return days === 1 ? '1 day' : `${days} days`;
    }

    // ---------- search ----------
    let searchTimer;
    document.getElementById('search-input').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        currentSearch = e.target.value.trim();
        loadOrders();
      }, 200);
    });

    // ---------- utils ----------
    function escapeHtml(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

    // ---------- go ----------
    (async () => {
      try {
        await hydrateIdentity();
        await loadOrders();
      } catch (err) {
        console.error('boot failed', err);
      }
    })();
  </script>
</body>
</html>
