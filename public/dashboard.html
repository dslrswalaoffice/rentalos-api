<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#202058">
  <title>Dashboard · RentalOS</title>
  <!-- Sub-turn 9b — preconnect to the API origin (perceived-speed). -->
  <link rel="preconnect" href="https://rentalos-api.vercel.app" crossorigin>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23e88020'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='%23ffffff'%3ER%3C/text%3E%3C/svg%3E">
  <!-- Critical CSS: system font + off-white bg → instant paint, no FOIT. -->
  <style>
    :root { --bg-page:#f7f8fa; --text-primary:#1a1f36; --font-sys: system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif; }
    html,body { margin:0; }
    body { font-family: var(--font-sys); background: var(--bg-page); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
    @view-transition { navigation: auto; }
    ::view-transition-old(root), ::view-transition-new(root) { animation-duration: 200ms; }
  </style>
  <!-- Stripe design system (Sub-turn 9b rollout). Token layer + list-page
       components; the page's retuned inline CSS stays authoritative. -->
  <link rel="stylesheet" href="/design-system.css">
  <style>
    /* Sub-turn 9b — legacy tokens remapped onto the Stripe design-system palette
       (design-system.css). Re-skins the whole page via the vars every rule
       already references — zero markup/JS changes. --head/--orange → violet
       accent, --ink → warm near-black, fonts → system stack. */
    :root {
      --ink:            #202058;
      --text:           #3f4350;
      --head:           #26235a;
      --muted:          #6b7280;
      --muted-strong:   #3f4350;
      --muted-soft:     #9aa1ad;
      --card:           #ffffff;
      --bg:             #eef0f3;
      --side:           #fcfcfd;
      --chrome:         #f1f2f4;
      --thead:          #fafbfc;
      --border:         #e3e6ea;
      --border-strong:  #d8dbe0;
      --accent-soft:    #fbe9d7;
      --border-accent:  #c7cdf5;
      --orange:         #e88020;
      --orange-soft:    #fbeee0;
      --focus:          #b9c0ee;

      --ok-solid:       #177a45;
      --ok-soft:        #e8f6ee;
      --ok-strong:      #177a45;
      --warn-solid:     #b9791b;
      --warn-soft:      #fbf2e2;
      --warn-strong:    #8a5a12;
      --bad-solid:      #b42318;
      --bad-soft:       #fdecec;
      --bad-strong:     #b42318;

      --font-display: 'Space Grotesk', 'Arzachel', system-ui, -apple-system, sans-serif;
      --font-body:    'Manrope', 'Ponjoung', system-ui, -apple-system, sans-serif;
      --font-mono:    'JetBrains Mono', ui-monospace, monospace;

      --sb-w: 232px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: var(--font-body);
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    ::selection { background: #d9d8ea; }

    /* base transitions match prototype */
    button, a { transition: background-color .14s ease, color .14s ease, border-color .14s ease, box-shadow .16s ease, transform .08s ease; }
    button:not(:disabled):active { transform: translateY(0.5px); }
    ::-webkit-scrollbar { width: 11px; height: 11px; }
    ::-webkit-scrollbar-thumb { background: #d3d7dd; border-radius: 7px; border: 3px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: #bfc4cc; border: 3px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* ========== app shell ========== */
    .app {
      display: grid;
      grid-template-columns: var(--sb-w) minmax(0, 1fr);
      min-height: 100dvh;
    }

    /* ========== sidebar ========== */
    .sb {
      background: var(--side);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 18px 14px 14px;
      position: sticky;
      top: 0;
      height: 100dvh;
      overflow-y: auto;
    }
    .sb-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 6px 20px;
    }
    .sb-brand .logo {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: var(--orange);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 17px;
      letter-spacing: 0;
      flex-shrink: 0;
    }
    .sb-brand .word {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 17px;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .sb-brand .env {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 8.5px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--warn-strong);
      background: var(--warn-soft);
      padding: 2px 7px;
      border-radius: 999px;
    }
    .sb-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    /* workspace switcher — for now single-tenant, but the affordance is there */
    .sb-workspace {
      display: flex;
      align-items: baseline;
      gap: 8px;
      width: 100%;
      margin: 14px 0 8px;
      padding: 8px 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      transition: border-color 0.14s ease, background 0.14s ease;
    }
    .sb-workspace:hover { border-color: var(--border-strong); background: var(--thead); }
    .sb-workspace-name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 12.5px;
      letter-spacing: 0.02em;
      color: var(--ink);
    }
    .sb-workspace-loc {
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .sb-workspace svg {
      margin-left: auto;
      color: var(--muted);
      align-self: center;
    }
    .sb-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 8px;
      border-radius: 9px;
      text-decoration: none;
      color: var(--muted-strong);
      font-size: 13px;
      font-weight: 500;
      position: relative;
    }
    .sb-item:hover { background: var(--bg); color: var(--ink); }
    .sb-item.active {
      background: var(--accent-soft);
      color: var(--head);
      font-weight: 600;
    }
    .sb-item .tile {
      width: 26px; height: 26px;
      border-radius: 7px;
      background: #eef0f3;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 9.5px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .sb-item.active .tile { background: var(--head); color: #fff; }
    .sb-item.new .tile { background: var(--orange); color: #fff; }
    .sb-user {
      margin-top: auto;
      padding: 12px 8px 4px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sb-user-avatar {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, #26235a, #4b47a3);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
    }
    .sb-user-info {
      min-width: 0;
      flex: 1;
    }
    .sb-user-name {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sb-user-role {
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 1px;
    }
    .sb-user-menu {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 4px;
      border-radius: 6px;
      cursor: pointer;
    }
    .sb-user-menu:hover { background: var(--bg); color: var(--ink); }

    /* ========== main region ========== */
    .main {
      min-width: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    /* ---- top bar ---- */
    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      position: sticky;
      top: 0;
      z-index: 40;
    }
    .greeting-kicker {
      font-family: var(--font-mono);
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--muted-soft);
      text-transform: uppercase;
    }
    .greeting {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 17px;
      letter-spacing: -0.005em;
      color: var(--ink);
      margin-top: 1px;
    }
    .search {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px 7px 12px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--thead);
      cursor: text;
      min-width: 260px;
      color: var(--muted-soft);
      transition: border-color 0.14s ease, background 0.14s ease;
    }
    .search:hover { border-color: var(--border-strong); background: var(--card); }
    .search:focus-within {
      border-color: var(--focus);
      background: var(--card);
      box-shadow: 0 0 0 4px rgba(185, 192, 238, 0.24);
    }
    .search input {
      border: none;
      outline: none;
      background: transparent;
      font-family: var(--font-body);
      font-size: 12.5px;
      color: var(--ink);
      flex: 1;
      min-width: 0;
    }
    .search input::placeholder { color: var(--muted-soft); }
    .search kbd {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 4px;
    }
    .topbar-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .iconbtn {
      position: relative;
      width: 34px; height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      cursor: pointer;
      color: var(--muted-strong);
    }
    .iconbtn:hover { background: var(--bg); border-color: var(--border-strong); color: var(--ink); }
    .iconbtn .badge {
      position: absolute;
      top: 3px;
      right: 4px;
      min-width: 14px;
      height: 14px;
      padding: 0 3px;
      border-radius: 999px;
      background: var(--bad-solid);
      color: #fff;
      font-family: var(--font-mono);
      font-size: 8px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .primary-cta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 12.5px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 12px -4px rgba(232, 128, 32, 0.5);
    }
    .primary-cta:hover { background: #d97517; box-shadow: 0 6px 14px -4px rgba(232, 128, 32, 0.55); }

    /* notification dropdown */
    .notif-wrap { position: relative; }
    .notif-drop {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 344px;
      background: var(--card);
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      box-shadow: 0 20px 44px -14px rgba(16, 24, 40, 0.4);
      z-index: 70;
      overflow: hidden;
    }
    .notif-wrap.open .notif-drop { display: block; }
    .notif-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    .notif-head-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14px;
      color: var(--ink);
    }
    .notif-head-count {
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.08em;
      color: var(--muted-soft);
    }
    .notif-item {
      display: flex;
      gap: 10px;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      align-items: flex-start;
      color: inherit;
    }
    .notif-item:hover { background: var(--thead); }
    .notif-item-icon {
      width: 22px; height: 22px;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 9.5px;
      font-weight: 700;
    }
    .notif-item-body { min-width: 0; flex: 1; }
    .notif-item-title {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--head);
    }
    .notif-item-desc {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }
    .notif-item-time {
      font-family: var(--font-mono);
      font-size: 9px;
      color: #c2c7ce;
      flex-shrink: 0;
    }
    .notif-foot {
      display: block;
      text-align: center;
      padding: 12px;
      font-weight: 600;
      font-size: 12.5px;
      color: var(--head);
      text-decoration: none;
      background: var(--thead);
    }

    /* ---- content ---- */
    .content { padding: 22px 24px 32px; }

    .section-title {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin: 22px 0 12px;
    }
    .section-title h3 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.005em;
      color: var(--ink);
      margin: 0;
    }
    .section-title .sub {
      font-size: 12px;
      color: var(--muted);
    }
    .section-title:first-child { margin-top: 0; }

    /* attention tray — the "what needs my action right now" layer */
    .attention-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .attention {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px 14px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--muted-soft);
      border-radius: 11px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.14s ease, box-shadow 0.16s ease, transform 0.08s ease;
    }
    .attention:hover {
      box-shadow: 0 10px 24px -14px rgba(16, 24, 40, 0.28);
      transform: translateY(-1px);
    }
    .attention.bad  { border-left-color: var(--bad-solid); }
    .attention.warn { border-left-color: var(--warn-solid); }
    .attention-badge {
      width: 34px; height: 34px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15px;
      font-variant-numeric: tabular-nums;
    }
    .attention.bad  .attention-badge { background: var(--bad-soft);  color: var(--bad-strong); }
    .attention.warn .attention-badge { background: var(--warn-soft); color: var(--warn-strong); }
    .attention-body { flex: 1; min-width: 0; }
    .attention-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 13.5px;
      line-height: 1.25;
      color: var(--ink);
      letter-spacing: -0.005em;
    }
    .attention-meta {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 0.02em;
    }
    .attention-action {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 12px;
      color: var(--head);
      padding: 6px 4px 6px 8px;
      transition: transform 0.12s ease;
    }
    .attention:hover .attention-action { transform: translateX(2px); }

    @media (max-width: 900px) {
      .attention-grid { grid-template-columns: 1fr; }
    }

    /* KPI grid */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }
    .kpi {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 17px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      color: var(--ink);
      text-decoration: none;
      transition: box-shadow 0.16s ease, border-color 0.16s ease, transform 0.1s ease;
    }
    .kpi:hover {
      box-shadow: 0 12px 26px -14px rgba(16, 24, 40, 0.30);
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }
    .kpi-label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .kpi-value {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 26px;
      line-height: 1.05;
      letter-spacing: -0.015em;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }
    .kpi-sub {
      font-size: 11.5px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .kpi-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 999px;
    }
    .kpi-chip.up   { background: var(--ok-soft);   color: var(--ok-strong); }
    .kpi-chip.down { background: var(--bad-soft);  color: var(--bad-strong); }
    .kpi-chip.warn { background: var(--warn-soft); color: var(--warn-strong); }
    .kpi-chip.flat { background: #eceef1;          color: var(--muted-strong); }
    .kpi-spark {
      margin-top: auto;
      width: 100%;
      height: 30px;
      display: block;
    }
    .kpi.alert { border-top: 3px solid var(--bad-solid); }

    /* secondary KPI row (smaller tiles) */
    .kpi-mini-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }
    .kpi-mini {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 15px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .kpi-mini-label {
      font-family: var(--font-mono);
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .kpi-mini-value {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: -0.005em;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      margin-top: 2px;
    }
    .kpi-mini-sub {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }
    .kpi-mini-sub-txt {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    /* two-column: going out / coming back */
    .split-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .panel-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.005em;
      color: var(--ink);
    }
    .panel-count {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--muted);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 999px;
    }
    .range-picker {
      position: relative;
      margin-left: auto;
    }
    .range-picker-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px 5px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--thead);
      font-family: var(--font-mono);
      font-size: 10.5px;
      font-weight: 600;
      color: var(--muted-strong);
      text-transform: uppercase;
      letter-spacing: 0.04em;

  <script type="module">
    import { ensureAuth, formatINR, installPrefetch } from '/_lib/api.js';

    // Prefetch a linked order's detail page when a widget row is hovered (PR4).
    installPrefetch(el => el.dataset.href || null);

    const STATUS_LABELS = { draft:'Draft', quoted:'Quoted', confirmed:'Confirmed', dispatched:'Dispatched', active:'Active', returned:'Returned', closed:'Closed', cancelled:'Cancelled' };
    const MAX_ROWS = 10;

    const state = { dashboard: { data: null, loading: false, loaded_at: null } };

    // ---------- helpers ----------
    function escapeHtml(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function escapeAttr(s){ return escapeHtml(s).replace(/`/g,'&#96;'); }
    function fmtTime(iso){ const d=new Date(iso); if(isNaN(d)) return ''; return d.toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit',hour12:true}); }
    function fmtDayShort(iso){ const d=new Date(iso); if(isNaN(d)) return ''; return d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'}); }
    function timeAgo(date){ const secs=Math.round((Date.now()-date.getTime())/1000); if(secs<45) return 'just now'; const m=Math.round(secs/60); if(m<60) return `${m} min ago`; const h=Math.round(m/60); if(h<24) return `${h}h ago`; return date.toLocaleDateString('en-IN',{day:'numeric',month:'short'}); }
    function pill(status){ const s=String(status||'').toLowerCase(); return `<span class="wr-pill ${escapeAttr(s)}">${escapeHtml(STATUS_LABELS[s]||s)}</span>`; }

    // ---------- widget builders ----------
    function widgetShell(title, countText, bodyHtml, footHtml, alert){
      return `<div class="widget${alert?' alert':''}">
        <div class="widget-head"><h3 class="widget-title">${escapeHtml(title)}</h3>${countText!==''?`<span class="widget-count">${escapeHtml(String(countText))}</span>`:''}</div>
        <div class="widget-body">${bodyHtml}</div>
        ${footHtml?`<div class="widget-foot">${footHtml}</div>`:''}
      </div>`;
    }
    function emptyState(msg){ return `<div class="widget-empty">${escapeHtml(msg)} ✓</div>`; }

    function orderRows(orders, metaFn){
      let html = orders.slice(0, MAX_ROWS).map(o => `
        <div class="widget-row" data-href="/order-360.html?id=${escapeAttr(o.id)}">
          <span class="wr-num">#${escapeHtml(String(o.order_number))}</span>
          <div class="wr-main">
            <div class="wr-name">${escapeHtml(o.customer_name || 'Unknown')}</div>
            <div class="wr-meta">${metaFn(o)}</div>
          </div>
          <span class="wr-right">${pill(o.status)}</span>
        </div>`).join('');
      if (orders.length > MAX_ROWS) html += `<div class="wr-more">+${orders.length - MAX_ROWS} more</div>`;
      return html;
    }

    function renderReturningToday(w){
      const body = w.count ? orderRows(w.orders, o => `${o.pending_count} item${o.pending_count===1?'':'s'} · ${fmtTime(o.rental_end)}`) : emptyState('Nothing due back today');
      return widgetShell('Returning today', `${w.count} order${w.count===1?'':'s'}`, body, '<a href="/calendar.html?view=day">Open calendar →</a>');
    }
    function renderDispatchingToday(w){
      const body = w.count ? orderRows(w.orders, o => `${o.pending_count} item${o.pending_count===1?'':'s'} · ${fmtTime(o.rental_start)}`) : emptyState('Nothing to hand over today');
      return widgetShell('Dispatching today', `${w.count} order${w.count===1?'':'s'}`, body, '<a href="/calendar.html?view=day">Open calendar →</a>');
    }
    function renderOverdue(w){
      const body = w.count ? (w.orders.slice(0,MAX_ROWS).map(o => `
        <div class="widget-row" data-href="/order-360.html?id=${escapeAttr(o.id)}">
          <span class="wr-num">#${escapeHtml(String(o.order_number))}</span>
          <div class="wr-main"><div class="wr-name">${escapeHtml(o.customer_name||'Unknown')}</div>
          <div class="wr-meta">${o.pending_count} item${o.pending_count===1?'':'s'} · <span class="wr-overdue">${Math.floor(o.days_overdue)} day${Math.floor(o.days_overdue)===1?'':'s'} overdue</span></div></div>
          <span class="wr-right">${pill(o.status)}</span>
        </div>`).join('') + (w.count>MAX_ROWS?`<div class="wr-more">+${w.count-MAX_ROWS} more</div>`:'')) : emptyState('No overdue returns');
      return widgetShell('Overdue returns', `${w.count}`, body, '<a href="/orders.html?status=dispatched">View orders →</a>', w.count>0);
    }
    function renderOverbook(w){
      const body = w.count ? (w.warnings.slice(0,MAX_ROWS).map(cf => `
        <div class="widget-row" data-href="/calendar.html?view=week&date=${escapeAttr((cf.conflict_start||'').slice(0,10))}">
          <div class="wr-main"><div class="wr-name">${escapeHtml(cf.product_name)}</div>
          <div class="wr-meta">${cf.total_units} cap · ${cf.requested_units} booked · ${fmtDayShort(cf.conflict_start)} → ${fmtDayShort(cf.conflict_end)}</div></div>
          <span class="wr-right"><span class="wr-overdue">⚠</span></span>
        </div>`).join('') + (w.count>MAX_ROWS?`<div class="wr-more">+${w.count-MAX_ROWS} more</div>`:'')) : emptyState('No conflicts in the next 14 days');
      return widgetShell('Overbook warnings', `${w.count}`, body, '<a href="/calendar.html?view=week">Open calendar →</a>', w.count>0);
    }
    function renderUnpaid(w){
      const total = w.total_unpaid_paise || 0;
      let body;
      if (total > 0){
        const rows = (w.top_5||[]).map(o=>`
          <div class="widget-row" data-href="/order-360.html?id=${escapeAttr(o.id)}">
            <span class="wr-num">#${escapeHtml(String(o.order_number))}</span>
            <div class="wr-main"><div class="wr-name">${escapeHtml(o.customer_name||'Unknown')}</div></div>
            <span class="wr-right"><span class="wr-amount">${formatINR(o.balance_paise)}</span></span>
          </div>`).join('');
        body = `<div class="widget-big-number">${formatINR(total)}</div><div class="widget-big-sub">outstanding across active orders</div>${rows}`;
      } else body = emptyState('No outstanding balance');
      return widgetShell('Unpaid balance', '', body, '<a href="/orders.html">Open orders →</a>');
    }
    function renderRevenue(w){
      const tw = w.this_week_paise || 0, lw = w.last_week_paise || 0;
      let body;
      if (tw === 0 && lw === 0){
        body = `<div class="widget-big-number">${formatINR(0)}</div><div class="widget-big-sub">No payments recorded yet this week</div>`;
      } else {
        let cmp;
        if (w.delta_pct === null || lw === 0){ cmp = `<div class="widget-comparison">— no baseline last week</div>`; }
        else { const up = w.delta_pct >= 0; cmp = `<div class="widget-comparison ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(w.delta_pct)}% vs last week</div>`; }
        body = `<div class="widget-big-number">${formatINR(tw)}</div><div class="widget-big-sub">Last week: ${formatINR(lw)}</div>${cmp}`;
      }
      return widgetShell("This week's revenue", '', body, '<a href="/analytics.html">Open insights →</a>');
    }

    // ---------- render ----------
    function render(){
      const grid = document.getElementById('widget-grid');
      const d = state.dashboard.data;
      if (state.dashboard.loading && !d){
        grid.innerHTML = Array.from({length:6}).map(()=>`<div class="widget"><div class="widget-body"><div class="widget-skel">Loading…</div></div></div>`).join('');
        return;
      }
      if (!d){ grid.innerHTML = `<div class="widget"><div class="widget-body"><div class="widget-skel">Couldn't load — hit refresh</div></div></div>`; return; }
      grid.innerHTML = [
        renderReturningToday(d.returning_today),
        renderDispatchingToday(d.dispatching_today),
        renderOverdue(d.overdue_returns),
        renderOverbook(d.overbook_warnings),
        renderUnpaid(d.unpaid_balance),
        renderRevenue(d.revenue_week),
      ].join('');
      grid.querySelectorAll('.widget-row[data-href]').forEach(row=>{
        row.addEventListener('click', ()=>{ location.href = row.dataset.href; });
      });
      updateStamp();
    }

    function updateStamp(){
      const el = document.getElementById('dash-updated');
      el.textContent = state.dashboard.loaded_at ? 'Updated ' + timeAgo(state.dashboard.loaded_at) : '';
    }

    async function loadDashboard(){
      state.dashboard.loading = true;
      document.getElementById('dash-refresh').classList.add('spinning');
      render();
      try {
        const res = await fetch('/api/dashboard', { credentials:'include' });
        if (res.status === 401){ window.location.replace('/index.html'); return; }
        if (!res.ok) throw new Error('dashboard fetch failed: ' + res.status);
        state.dashboard.data = await res.json();
        state.dashboard.loaded_at = new Date();
      } catch (err){
        console.error(err);
      } finally {
        state.dashboard.loading = false;
        document.getElementById('dash-refresh').classList.remove('spinning');
        render();
      }
    }

    document.getElementById('dash-refresh').addEventListener('click', loadDashboard);
    setInterval(updateStamp, 60000);

    // (legacy fake-notification dropdown removed — real bell wired below)

    // ---------- identity hydration + greeting, then load ----------
    (async () => {
      // Kick off the dashboard data immediately so it loads in parallel with
      // identity hydration. loadDashboard is self-contained and handles its
      // own 401 redirect, so it's safe to start before ensureAuth resolves.
      loadDashboard();
      let firstName = 'Aamir';
      try {
        const { user, workspace } = await ensureAuth();
        firstName = (user.displayName || '').split(' ')[0] || 'You';
        document.getElementById('ws-name').textContent = workspace.name;
        document.getElementById('ws-loc').textContent = workspace.location || '';
        document.getElementById('user-name').textContent = firstName;
        document.getElementById('user-role').textContent = user.role[0].toUpperCase() + user.role.slice(1);
        document.getElementById('user-avatar').textContent = firstName[0]?.toUpperCase() ?? 'U';
      } catch (err) {
        if (err.status !== 401) console.error('identity hydration failed', err);
      }
      const h = new Date().getHours();
      let g;
      if (h < 5)  g = `Working late, ${firstName}`;
      else if (h < 12) g = `Good morning, ${firstName}`;
      else if (h < 17) g = `Good afternoon, ${firstName}`;
      else if (h < 22) g = `Good evening, ${firstName}`;
      else g = `Working late, ${firstName}`;
      document.getElementById('greeting').textContent = g;
    })();

    // ---------- keyboard shortcut: / or ⌘K to focus search ----------
    document.addEventListener('keydown', function (e) {
      const isMetaK = (e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k';
      const isSlash = e.key === '/' && !e.metaKey && !e.ctrlKey && !e.altKey;
      const tag = (e.target && e.target.tagName || '').toLowerCase();
      const inField = tag === 'input' || tag === 'textarea';
      if (isMetaK || (isSlash && !inField)) {
        e.preventDefault();
        document.getElementById('global-search').focus();
      }
    });

  
    // ========== notifications bell + drawer (Sub-turn 5d) ==========
    (function initNotifications() {
      const bell = document.getElementById('notif-bell');
      const badge = document.getElementById('notif-badge');
      const drawer = document.getElementById('notif-drawer');
      const drawerBody = document.getElementById('notif-drawer-body');
      const markAllBtn = document.getElementById('notif-mark-all');
      if (!bell || !drawer) return;
      let pollTimer = null;
      const esc = (typeof escapeHtml === 'function') ? escapeHtml : (s => String(s ?? ''));
      const escA = (typeof escapeAttr === 'function') ? escapeAttr : esc;

      function timeAgoN(iso) {
        const diff = Date.now() - new Date(iso).getTime();
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return 'just now';
        if (mins < 60) return mins + 'm ago';
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return hrs + 'h ago';
        return Math.floor(hrs / 24) + 'd ago';
      }
      function updateBadge(count) {
        if (count > 0) { badge.textContent = count > 99 ? '99+' : String(count); badge.hidden = false; }
        else { badge.hidden = true; }
      }
      async function fetchCount() {
        try {
          const res = await fetch('/api/notifications/unread-count', { credentials: 'include' });
          if (!res.ok) return;
          const { count } = await res.json();
          updateBadge(count);
        } catch {}
      }
      async function loadList() {
        drawerBody.innerHTML = '<div class="notif-empty">Loading…</div>';
        try {
          const res = await fetch('/api/notifications?limit=20', { credentials: 'include' });
          if (!res.ok) throw new Error();
          const { notifications } = await res.json();
          renderList(notifications);
        } catch { drawerBody.innerHTML = '<div class="notif-empty">Failed to load notifications</div>'; }
      }
      function renderList(items) {
        if (!items || items.length === 0) { drawerBody.innerHTML = '<div class="notif-empty">No notifications</div>'; return; }
        drawerBody.innerHTML = items.map(n => `
          <div class="notif-item ${n.read_at ? '' : 'unread'}" data-id="${escA(n.id)}" data-link="${escA(n.link_url || '')}">
            <div class="notif-title">${esc(n.title)}</div>
            ${n.body ? `<div class="notif-body">${esc(n.body)}</div>` : ''}
            <div class="notif-meta">${esc(n.actor_name || 'System')} · ${esc(timeAgoN(n.created_at))}</div>
          </div>`).join('');
        drawerBody.querySelectorAll('.notif-item').forEach(el => {
          el.addEventListener('click', () => {
            const id = el.dataset.id, link = el.dataset.link;
            if (el.classList.contains('unread')) {
              fetch(`/api/notifications/${id}/read`, { method: 'POST', credentials: 'include' }).then(() => fetchCount()).catch(() => {});
            }
            if (link) window.location.href = link;
          });
        });
      }
      async function markAllRead() {
        try {
          await fetch('/api/notifications/mark-all-read', { method: 'POST', credentials: 'include' });
          await fetchCount();
          await loadList();
        } catch {}
      }
      bell.addEventListener('click', (e) => {
        e.stopPropagation();
        if (drawer.hidden) { drawer.hidden = false; loadList(); } else { drawer.hidden = true; }
      });
      document.addEventListener('click', (e) => {
        if (!drawer.contains(e.target) && !bell.contains(e.target)) drawer.hidden = true;
      });
      markAllBtn.addEventListener('click', markAllRead);
      function startPolling() { if (pollTimer) return; pollTimer = setInterval(() => { if (!document.hidden) fetchCount(); }, 60000); }
      function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) stopPolling(); else { fetchCount(); startPolling(); }
      });
      fetchCount();
      startPolling();
    })();

  </script>
</body>
</html>
