name: Invoice reminder trigger

# Hourly cron that pings the reminder scheduler. The endpoint is idempotent and
# self-throttling (per-type dedup + 24h cooldown live in SQL), so an hourly ping
# is safe. REMINDER_TRIGGER_SECRET must be set as a GitHub Actions secret and as
# a Vercel env var (same value).
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Ping reminder endpoint
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST https://rentalos-api.vercel.app/api/reminders/trigger \
            -H "X-Reminder-Secret: ${{ secrets.REMINDER_TRIGGER_SECRET }}")
          echo "HTTP $RESPONSE"
          cat /tmp/response.json || true
          echo
          if [ "$RESPONSE" != "200" ]; then
            echo "Reminder trigger failed with HTTP $RESPONSE"
            exit 1
          fi
